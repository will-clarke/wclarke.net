<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="color-scheme" content="light dark" />
<script>
  (function(){try{
    var t=localStorage.getItem('theme');
    if(t!=='light'&&t!=='dark'){
      t=(window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';
    }
    document.documentElement.setAttribute('data-theme',t);
  }catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
</script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23171b23'/%3E%3Crect x='15' y='3' width='2' height='26' rx='1' fill='%23ffb43a' opacity='.45'/%3E%3Crect x='3' y='15' width='26' height='2' rx='1' fill='%23ffb43a' opacity='.45'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23ffb43a'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23ffe6b0'/%3E%3C/svg%3E" />
<title>Lumen</title>
<style>
  :root{
    --accent:#ffb43a;
    --on-accent:#141414;
    --amber:#ffb43a;      /* amber player's light */
    --cyan:#22c8ff;       /* cyan player's light */
    --contested:#a07bff;  /* lit by both - worthless */
  }
  :root[data-theme="dark"]{
    --bg:#171b23; --bg-top:#212734;
    --surface:#232a38; --raised:#2b3342;
    --cell:#1e2531;
    --ink:#eaeef6; --muted:#a2adc0;
    --line:rgba(255,255,255,.14); --line-strong:rgba(255,255,255,.26);
    --shadow:rgba(0,0,0,.45);
  }
  :root[data-theme="light"]{
    --bg:#eef1f7; --bg-top:#ffffff;
    --surface:#ffffff; --raised:#eef1f7;
    --cell:#f6f8fc;
    --ink:#1b2431; --muted:#5a6575;
    --line:rgba(22,30,48,.15); --line-strong:rgba(22,30,48,.28);
    --shadow:rgba(30,40,70,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 120% at 50% 0%, var(--bg-top) 0%, var(--bg) 62%);
    color:var(--ink);
    font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;padding:60px 12px 40px;gap:14px;
  }

  .topbar{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;
    justify-content:flex-end;padding:12px 14px;pointer-events:none}
  .topbar .navbtn{pointer-events:auto}
  .navbtn{display:inline-flex;align-items:center;justify-content:center;
    width:40px;height:40px;padding:0;border-radius:11px;
    background:var(--surface);border:1px solid var(--line);color:var(--ink);
    font-size:18px;line-height:1;cursor:pointer;text-decoration:none;
    box-shadow:0 2px 10px var(--shadow);transition:transform .15s,border-color .15s,background .15s}
  .navbtn:hover{border-color:var(--line-strong);transform:translateY(-1px)}
  .navbtn:active{transform:translateY(0)}

  h1{margin:4px 0 0;font-weight:700;letter-spacing:.28em;font-size:22px;text-transform:uppercase}
  h1 span{color:var(--amber);text-shadow:0 0 18px var(--amber)}
  .sub{color:var(--muted);font-size:12px;letter-spacing:.05em;margin-top:-6px;text-align:center;max-width:420px}

  .scores{display:flex;gap:10px;width:100%;max-width:420px}
  .score{
    flex:1;border:1px solid var(--line);border-radius:14px;padding:10px 12px;
    background:var(--surface);transition:.2s;
  }
  .score.active{border-color:currentColor;box-shadow:0 0 24px -6px currentColor}
  .score.b{color:var(--amber)}
  .score.w{color:var(--cyan)}
  .score .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:6px}
  .score .lbl .swatch{width:12px;height:12px;border-radius:50%;background:currentColor;box-shadow:0 0 10px currentColor;flex:0 0 auto;margin-right:auto}
  .score .lbl .left{opacity:.7;font-weight:600;letter-spacing:.06em}
  .score .num{font-size:30px;font-weight:700;color:var(--ink);line-height:1.1}
  .score .num small{font-size:12px;font-weight:500;color:var(--muted)}

  .board-wrap{position:relative;touch-action:manipulation}
  #board{
    display:grid;gap:0;border-radius:16px;overflow:hidden;
    background:var(--raised);
    box-shadow:0 20px 60px -22px var(--shadow), inset 0 0 0 1px var(--line);
  }
  .cell{
    position:relative;width:var(--cs);height:var(--cs);
    border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:background .18s ease;
  }
  .cell.nr{border-right:none}
  .cell.nb{border-bottom:none}
  .cell:hover:not(.filled){background:var(--line)}
  .cell.filled{cursor:default}

  /* light fills applied via inline background */
  .cell .lit{position:absolute;inset:0;pointer-events:none;transition:opacity .25s}

  .stone{
    width:76%;height:76%;border-radius:50%;position:relative;z-index:2;
    transition:transform .12s ease;
  }
  .stone.pop{animation:pop .18s ease}
  @keyframes pop{from{transform:scale(.4)}to{transform:scale(1)}}
  /* The two emitters ARE their light colour, but read as glossy beads sitting
     ON the tile: white glint + dark rim separate the lamp from its own glow. */
  .stone.b{
    background:radial-gradient(circle at 34% 28%, #ffffff 0%, #ffd27a 34%, var(--amber) 66%, #d9880f 100%);
    box-shadow:0 0 0 2px rgba(0,0,0,.38), 0 3px 7px rgba(0,0,0,.5), 0 0 26px -3px var(--amber);
  }
  .stone.w{
    background:radial-gradient(circle at 34% 28%, #ffffff 0%, #b6ecff 34%, var(--cyan) 66%, #0e8fc6 100%);
    box-shadow:0 0 0 2px rgba(0,0,0,.38), 0 3px 7px rgba(0,0,0,.5), 0 0 26px -3px var(--cyan);
  }
  /* preview stone on hover */
  .cell:hover:not(.filled) .ghost{opacity:.4}
  .ghost{opacity:0;transition:opacity .12s}

  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:420px}
  button{
    font:inherit;color:var(--ink);background:var(--surface);
    border:1px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer;
    transition:.15s;letter-spacing:.03em;
  }
  button:hover{background:var(--raised);border-color:var(--line-strong)}
  button.primary{background:var(--amber);color:#141414;border-color:transparent;font-weight:600}
  button.primary.w{background:var(--cyan)}
  button:disabled{opacity:.3;cursor:default}

  .banner{
    min-height:20px;font-size:13px;letter-spacing:.04em;text-align:center;color:var(--muted);
    max-width:420px;
  }
  .banner.win{font-size:18px;font-weight:700}
  select{font:inherit;background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:9px 10px}
</style>
</head>
<body>
  <div class="topbar">
    <button class="navbtn" id="themeToggle" type="button" aria-label="Toggle light or dark" title="Light / dark"></button>
  </div>

  <h1><span>L</span>umen</h1>
  <div class="sub">Every stone is a lamp and a wall. Light along its row &amp; column until blocked. Cells lit by only you are yours; lit by both, worthless. Most territory wins.</div>

  <div class="scores">
    <div class="score b" id="sB"><div class="lbl"><span class="swatch"></span><span id="labB">Amber</span><span class="left" id="rB"></span></div><div class="num" id="nB">0</div></div>
    <div class="score w" id="sW"><div class="lbl"><span class="swatch"></span><span id="labW">Cyan</span><span class="left" id="rW"></span></div><div class="num" id="nW">0</div></div>
  </div>

  <div class="board-wrap"><div id="board"></div></div>

  <div class="banner" id="banner"></div>

  <div class="controls">
    <button class="primary" id="pieBtn" style="display:none">Pie rule: swap sides</button>
    <button id="undoBtn">Undo</button>
    <button id="resetBtn">New game</button>
    <select id="sizeSel">
      <option value="7">7 × 7</option>
      <option value="9">9 × 9</option>
    </select>
    <select id="countSel">
      <option value="8">8 stones</option>
      <option value="12" selected>12 stones</option>
      <option value="16">16 stones</option>
    </select>
    <select id="oppSel">
      <option value="">2 players</option>
      <option value="W">vs CPU · you're Amber</option>
      <option value="B" selected>vs CPU · you're Cyan</option>
    </select>
    <select id="diffSel">
      <option value="easy">Easy</option>
      <option value="medium" selected>Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>

<script>
(() => {
  const boardEl = document.getElementById('board');
  const banner  = document.getElementById('banner');
  const pieBtn  = document.getElementById('pieBtn');

  let SIZE = 7, MAX = 12;
  let grid, turn, placed, history, pieAvailable, over;
  let aiSide = null, aiDiff = 'medium', thinking = false;

  function reset(){
    SIZE  = +document.getElementById('sizeSel').value;
    MAX   = +document.getElementById('countSel').value;
    const opp = document.getElementById('oppSel').value;
    aiSide = opp || null;                 // '' → 2 players, else AI's colour
    aiDiff = document.getElementById('diffSel').value;
    grid  = Array.from({length:SIZE}, () => Array(SIZE).fill(null));
    turn  = 'B';
    placed = {B:0, W:0};
    history = [];
    pieAvailable = false;
    over = false;
    thinking = false;
    buildBoard();
    render();
    maybeAI();
  }

  function buildBoard(){
    const cs = Math.min(64, Math.floor((Math.min(window.innerWidth-32, 460)) / SIZE));
    boardEl.style.setProperty('--cs', cs + 'px');
    boardEl.style.gridTemplateColumns = `repeat(${SIZE}, var(--cs))`;
    boardEl.innerHTML = '';
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      const d = document.createElement('div');
      d.className = 'cell' + (c===SIZE-1?' nr':'') + (r===SIZE-1?' nb':'');
      d.dataset.r=r; d.dataset.c=c;
      d.innerHTML = '<div class="lit"></div>';
      d.addEventListener('click', () => play(r,c));
      boardEl.appendChild(d);
    }
  }

  // Cast light: each stone shoots 4 rays until it hits any stone (exclusive).
  function computeLightG(g){
    const lit = Array.from({length:SIZE}, () => Array.from({length:SIZE}, () => ({B:false,W:false})));
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      const col = g[r][c];
      if(!col) continue;
      for(const [dr,dc] of dirs){
        let nr=r+dr, nc=c+dc;
        while(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE && !g[nr][nc]){
          lit[nr][nc][col] = true;
          nr+=dr; nc+=dc;
        }
      }
    }
    return lit;
  }
  const computeLight = () => computeLightG(grid);

  function scores(lit){
    const s = {B:0, W:0, contested:0};
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      if(grid[r][c]) continue;            // stone cells aren't territory
      const {B,W} = lit[r][c];
      if(B&&W) s.contested++;
      else if(B) s.B++;
      else if(W) s.W++;
    }
    return s;
  }

  /* ---------- AI ---------- */
  // Territory (owned by exactly one side) net, from `side`'s perspective.
  function evalFor(g, side){
    const lit = computeLightG(g);
    let B=0, W=0;
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      if(g[r][c]) continue;
      const {B:b,W:w} = lit[r][c];
      if(b&&w) continue;
      else if(b) B++; else if(w) W++;
    }
    return side==='B' ? B-W : W-B;
  }

  function candidates(g){
    const out=[];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!g[r][c]) out.push([r,c]);
    return out;
  }

  // Rank empty cells by the immediate territory swing for `side` (also the
  // alpha-beta move ordering). Returns [{r,c,v}] sorted best-first.
  function ranked(g, side){
    const out = candidates(g).map(([r,c]) => {
      g[r][c]=side; const v=evalFor(g,side); g[r][c]=null;
      return {r,c,v};
    });
    out.sort((a,b)=>b.v-a.v);
    return out;
  }

  // Negamax + alpha-beta over a beam of the K most promising moves.
  function negamax(g, side, remB, remW, depth, alpha, beta, K){
    if(remB+remW===0 || depth===0) return evalFor(g, side);
    const other = side==='B'?'W':'B';
    const moves = ranked(g, side).slice(0, K);
    let best = -Infinity;
    for(const {r,c} of moves){
      g[r][c]=side;
      const val = -negamax(g, other, side==='B'?remB-1:remB, side==='W'?remW-1:remW,
                           depth-1, -beta, -alpha, K);
      g[r][c]=null;
      if(val>best) best=val;
      if(best>alpha) alpha=best;
      if(alpha>=beta) break;
    }
    return best;
  }

  function searchRoot(g, side, remB, remW, depth, K){
    const other = side==='B'?'W':'B';
    const moves = ranked(g, side).slice(0, K);
    let best=-Infinity, bestMove=moves[0]&&[moves[0].r,moves[0].c], alpha=-Infinity;
    for(const {r,c} of moves){
      g[r][c]=side;
      const val = -negamax(g, other, side==='B'?remB-1:remB, side==='W'?remW-1:remW,
                           depth-1, -Infinity, -alpha, K);
      g[r][c]=null;
      if(val>best){ best=val; bestMove=[r,c]; }
      if(best>alpha) alpha=best;
    }
    return {move:bestMove, value:best};
  }

  // Pick the AI's move for the live board. Difficulty tunes depth/beam/noise.
  function chooseAIMove(side){
    const g = grid.map(row=>row.slice());
    const remB = MAX-placed.B, remW = MAX-placed.W;
    const maxD = remB+remW;

    if(aiDiff==='easy'){
      // greedy, but wander among the top few so it's beatable
      const top = ranked(g, side).slice(0,3);
      return top[Math.floor(Math.random()*top.length)] || null;
    }
    if(aiDiff==='medium'){
      return posFromRoot(searchRoot(g, side, remB, remW, Math.min(2,maxD), 14));
    }
    // hard: deeper look-ahead, capped so a move never stalls (~0.1-0.25s)
    return posFromRoot(searchRoot(g, side, remB, remW, Math.min(5,maxD), 10));
  }
  const posFromRoot = res => res.move && {r:res.move[0], c:res.move[1]};

  function play(r,c,byAI){
    if(over || grid[r][c]) return;
    if(!byAI && aiSide && turn===aiSide) return;   // hands off during AI's turn
    grid[r][c] = turn;
    placed[turn]++;
    history.push([r,c,turn]);
    // pie rule: offered only right after the very first stone
    pieAvailable = (history.length === 1);
    turn = turn==='B' ? 'W' : 'B';
    if(placed.B>=MAX && placed.W>=MAX) over = true;
    render(r,c);
    maybeAI();
  }

  // If it's the AI's move, think (async so the board can paint) then play.
  function maybeAI(){
    if(over || !aiSide || turn!==aiSide) return;
    thinking = true;
    render();
    setTimeout(() => {
      if(over || turn!==aiSide) { thinking=false; return; }
      const side = aiSide;
      // pie rule: as second player (Cyan), decide whether to swap the opener.
      if(pieAvailable && side==='W'){
        const g = grid.map(row=>row.slice());
        const place = searchRoot(g, 'W', MAX-placed.B, MAX-placed.W, 2, 12).value;
        const gs = grid.map(row=>row.slice());
        const [fr,fc] = history[0]; gs[fr][fc]='W';
        const swap = -searchRoot(gs, 'B', MAX, MAX-1, 2, 12).value;  // W's view
        if(swap > place){ thinking=false; swapPie(); return; }
      }
      const m = chooseAIMove(side);
      thinking = false;
      if(m) play(m.r, m.c, true);
    }, 60);
  }

  function swapPie(){
    if(!pieAvailable) return;
    // second player "takes" the first move: flip the lone stone's colour,
    // keep it White's move-count, and it's now Black to play again...
    // simplest faithful swap: recolour the single stone, counts follow.
    const [r,c] = history[0];
    grid[r][c] = 'W';
    history[0][2] = 'W';
    placed = {B:0, W:1};
    turn = 'B';
    pieAvailable = false;
    render(r,c);
    maybeAI();
  }

  function undo(){
    if(!history.length || thinking) return;
    do {
      const [r,c,col] = history.pop();
      grid[r][c] = null;
      placed[col]--;
      turn = col;
      // in AI mode, keep stepping back until it's the human's turn again
    } while(aiSide && turn===aiSide && history.length);
    over = false;
    pieAvailable = (history.length === 1);
    render();
  }

  function render(lastR, lastC){
    const lit = computeLight();
    const cells = boardEl.children;
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      const cell = cells[r*SIZE + c];
      const {B,W} = lit[r][c];
      const litEl = cell.querySelector('.lit');
      let bg = 'transparent';
      if(B&&W) bg = 'radial-gradient(circle, rgba(160,123,255,.42), rgba(160,123,255,.14))';
      else if(B) bg = 'radial-gradient(circle, rgba(255,180,58,.42), rgba(255,180,58,.14))';
      else if(W) bg = 'radial-gradient(circle, rgba(34,200,255,.42), rgba(34,200,255,.14))';
      litEl.style.background = bg;

      // stone / ghost
      const existing = cell.querySelector('.stone');
      if(grid[r][c]){
        cell.classList.add('filled');
        const cls = 'stone ' + grid[r][c].toLowerCase() +
          ((r===lastR&&c===lastC)?' pop':'');
        if(existing) existing.className = cls;   // reuse element, but drop any 'ghost'
        else { const s=document.createElement('div'); s.className=cls; cell.appendChild(s); }
      } else {
        cell.classList.remove('filled');
        if(existing && !existing.classList.contains('ghost')) existing.remove();
        const ghost = cell.querySelector('.ghost');
        const noGhost = over || (aiSide && turn===aiSide);   // no preview on AI's turn
        if(noGhost){ if(ghost) ghost.remove(); }
        else if(ghost){ ghost.className = 'stone ghost ' + turn.toLowerCase(); }
        else { const g=document.createElement('div'); g.className='stone ghost '+turn.toLowerCase(); cell.appendChild(g); }
      }
    }

    const s = scores(lit);
    document.getElementById('nB').innerHTML = s.B + ' <small>lit</small>';
    document.getElementById('nW').innerHTML = s.W + ' <small>lit</small>';
    document.getElementById('rB').textContent = (MAX - placed.B) + ' left';
    document.getElementById('rW').textContent = (MAX - placed.W) + ' left';
    document.getElementById('sB').classList.toggle('active', !over && turn==='B');
    document.getElementById('sW').classList.toggle('active', !over && turn==='W');

    // pie button is for the human only; the AI decides its own swap
    document.getElementById('labB').textContent = 'Amber' + (aiSide==='B'?' · CPU':'');
    document.getElementById('labW').textContent = 'Cyan'  + (aiSide==='W'?' · CPU':'');
    const aiTurn = !!aiSide && turn===aiSide;
    pieBtn.style.display = (pieAvailable && !aiTurn) ? '' : 'none';
    pieBtn.className = 'primary' + (turn==='W'?' w':'');

    if(over){
      banner.className = 'banner win';
      if(s.B===s.W) banner.textContent = `Tie — ${s.B} each.`;
      else banner.textContent = (s.B>s.W?'Amber':'Cyan') + ` wins ${Math.max(s.B,s.W)} – ${Math.min(s.B,s.W)}` +
        (s.contested?`  (${s.contested} contested)`:'');
      banner.style.color = s.B===s.W ? 'var(--ink)' : (s.B>s.W?'var(--amber)':'var(--cyan)');
    } else if(thinking){
      banner.className = 'banner';
      banner.style.color = '';
      banner.textContent = (turn==='B'?'Amber':'Cyan') + ' (CPU) is thinking…';
    } else {
      banner.className = 'banner';
      banner.style.color = '';
      banner.textContent = (turn==='B'?'Amber':'Cyan') + ' to place' +
        (pieAvailable && !aiTurn ?' — or Cyan may swap sides.':'') +
        `   ·   ${s.contested} contested`;
    }
  }

  pieBtn.onclick = swapPie;
  document.getElementById('undoBtn').onclick = undo;
  document.getElementById('resetBtn').onclick = reset;
  document.getElementById('sizeSel').onchange = reset;
  document.getElementById('countSel').onchange = reset;
  const diffSel = document.getElementById('diffSel');
  document.getElementById('oppSel').onchange = e => {
    diffSel.style.display = e.target.value ? '' : 'none';
    reset();
  };
  diffSel.onchange = reset;
  window.addEventListener('resize', () => { buildBoard(); render(); });

  reset();

  (function(){
    var btn=document.getElementById('themeToggle');
    if(!btn)return;
    function glyph(){btn.textContent=
      document.documentElement.getAttribute('data-theme')==='dark'?'☀':'☾';}
    glyph();
    btn.addEventListener('click',function(){
      var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme',next);
      try{localStorage.setItem('theme',next);}catch(e){}
      glyph();
      window.dispatchEvent(new Event('themechange'));
    });
  })();
})();
</script>
</body>
</html>
