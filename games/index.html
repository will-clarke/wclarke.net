  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23171b23'/%3E%3Ctext x='16' y='22' font-family='system-ui,sans-serif' font-size='18' font-weight='700' text-anchor='middle' fill='%233ad9ff'%3EG%3C/text%3E%3C/svg%3E" />
  <script>
  (function () {
    var t = localStorage.getItem("theme");
    if (t) document.documentElement.dataset.theme = t;
    window.toggleTheme = function () {
      var el = document.documentElement;
      var dark = el.dataset.theme
        ? el.dataset.theme === "dark"
        : matchMedia("(prefers-color-scheme: dark)").matches;
      el.dataset.theme = dark ? "light" : "dark";
      localStorage.setItem("theme", el.dataset.theme);
    };
  })();
  </script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="hexhome">

<div id="field"></div>

<nav class="mark" aria-label="site">
  <a class="wordmark" href="/">← will clarke</a>
  <span class="controls">
    <a class="plainlink" href="/projects.html">list view</a>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="toggle dark mode" title="toggle dark mode">◐</button>
  </span>
</nav>

<script src="/js/hexfield.js" defer></script>
