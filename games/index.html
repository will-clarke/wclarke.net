<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Games</title>
<style>
  :root{
    --bg:#0a0c12;
    --line:rgba(255,255,255,.08);
    --panel:rgba(255,255,255,.02);
    --ink:#e7ecf5;
    --accent:#3ad9ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 120% at 50% 0%, #12151f 0%, var(--bg) 60%);
    color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;padding:40px 16px 64px;gap:8px;
  }
  h1{margin:0;font-weight:700;letter-spacing:.42em;font-size:26px;text-transform:uppercase}
  h1 b{color:var(--accent);text-shadow:0 0 18px var(--accent);font-weight:700}
  .sub{opacity:.5;font-size:12px;letter-spacing:.05em;margin:2px 0 26px;text-align:center;max-width:460px}

  .grid{width:100%;max-width:720px;display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}

  .card{
    display:block;text-decoration:none;color:inherit;
    border:1px solid var(--line);border-radius:16px;
    background:var(--panel);
    padding:18px 18px 20px;
    position:relative;overflow:hidden;
    transition:border-color .2s,transform .2s,box-shadow .2s;
  }
  .card::before{
    content:"";position:absolute;inset:0;border-radius:16px;
    background:radial-gradient(120% 100% at 0% 0%, var(--c) 0%, transparent 45%);
    opacity:.10;pointer-events:none;transition:opacity .2s;
  }
  .card:hover{border-color:var(--c);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .card:hover::before{opacity:.22}

  .name{font-weight:700;letter-spacing:.28em;font-size:19px;text-transform:uppercase;margin:0 0 8px}
  .name b{color:var(--c);text-shadow:0 0 16px var(--c);font-weight:700}
  .tag{opacity:.62;font-size:13px;margin:0}
  .dot{
    position:absolute;top:20px;right:20px;width:9px;height:9px;border-radius:50%;
    background:var(--c);box-shadow:0 0 12px var(--c);
  }

  .empty{opacity:.6;font-size:14px;text-align:center;margin-top:20px;max-width:420px}
  .empty code{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:5px}
  footer{opacity:.32;font-size:11px;letter-spacing:.06em;margin-top:36px;text-align:center}
</style>
</head>
<body>
  <h1><b>G</b>ames</h1>
  <p class="sub">Small, deep, beautiful abstract strategy - one file each, no build, play on a phone.</p>
  <div class="grid" id="grid"></div>
  <footer>drop a folder + add an entry to <code style="background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px">games.json</code></footer>

<script>
  // First letter of the name is highlighted as a wordmark, matching each game's own <h1>.
  function wordmark(name){
    return "<b>" + name[0] + "</b>" + name.slice(1);
  }

  fetch("games.json")
    .then(r => r.json())
    .then(({games}) => {
      const grid = document.getElementById("grid");
      if(!games || !games.length){
        grid.innerHTML = '<p class="empty">No games yet. Add one to <code>games.json</code>.</p>';
        return;
      }
      grid.innerHTML = games.map(g => `
        <a class="card" href="${g.slug}/" style="--c:${g.accent||'#3ad9ff'}">
          <span class="dot"></span>
          <p class="name">${wordmark(g.name)}</p>
          <p class="tag">${g.tagline||''}</p>
        </a>`).join("");
    })
    .catch(() => {
      document.getElementById("grid").innerHTML =
        '<p class="empty">Could not load <code>games.json</code>. Serve this folder over HTTP - run <code>make serve</code> - rather than opening the file directly.</p>';
    });
</script>
</body>
</html>
