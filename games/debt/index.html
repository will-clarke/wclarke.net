<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#07090e">
<title>debt</title>
<style>
:root{
  --bg:#07090e; --floor:#10151f; --line:#1b2432; --card:#0d1119;
  --ink:#cfe3f5; --mut:#5a6b80;
  --cy:#6ee7ff; --am:#ffc861; --vio:#b48cff; --grn:#7dffa8; --red:#ff5a6e;
  --ts:44px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--ink);
  font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  display:flex; flex-direction:column; align-items:center;
  height:100dvh; overflow:hidden; touch-action:manipulation;
  user-select:none; -webkit-user-select:none;
}
header{
  width:100%; max-width:560px; display:flex; align-items:baseline; gap:12px;
  padding:10px 14px 4px;
}
header .home{color:var(--mut); text-decoration:none; font-size:16px}
header .brand{
  font-size:20px; letter-spacing:.25em; color:var(--cy);
  text-shadow:0 0 14px rgba(110,231,255,.55);
}
header .lvl{margin-left:auto; color:var(--mut); font-size:12px}
#status{
  width:100%; max-width:560px; min-height:30px;
  display:flex; align-items:center; gap:8px; padding:2px 14px;
}
.chip{
  border:1px solid var(--line); border-radius:20px; padding:2px 10px;
  font-size:12px; color:var(--mut); background:var(--card);
}
.chip.debt{
  color:#e6d9ff; border-color:#4a3d70;
  box-shadow:0 0 10px rgba(180,140,255,.25);
  animation:debtpulse 1.8s ease-in-out infinite;
}
.chip.inv{color:var(--am); border-color:#5c4a26}
@keyframes debtpulse{0%,100%{box-shadow:0 0 6px rgba(180,140,255,.15)}50%{box-shadow:0 0 14px rgba(180,140,255,.45)}}
#status .right{margin-left:auto; display:flex; gap:8px}
#wrap{
  flex:1; width:100%; display:grid; place-items:center;
  touch-action:none; position:relative; min-height:0;
}
#board{position:relative}
.t{position:absolute; left:0; top:0; width:var(--ts); height:var(--ts)}
.cell{
  background:var(--floor); border-radius:18%;
  box-shadow:inset 0 0 0 1px var(--line), inset 0 8px 14px -10px rgba(255,255,255,.05);
}
.plate::after{
  content:''; position:absolute; inset:28%;
  border:2px solid var(--mut); border-radius:50%; opacity:.8;
  transition:all .2s;
}
.plate.pressed::after{
  border-color:var(--grn); box-shadow:0 0 10px rgba(125,255,168,.5), inset 0 0 6px rgba(125,255,168,.35);
  inset:31%;
}
.gate{overflow:hidden; border-radius:18%}
.gate::before{
  content:''; position:absolute; inset:8% 18%;
  background:repeating-linear-gradient(90deg, rgba(255,90,110,.85) 0 3px, transparent 3px 9px);
  box-shadow:0 0 12px rgba(255,90,110,.35);
  transition:transform .28s ease, opacity .28s;
  transform-origin:top;
}
.gate.open::before{transform:scaleY(0); opacity:0}
.door{
  background:linear-gradient(160deg, rgba(255,200,97,.28), rgba(255,200,97,.08));
  box-shadow:inset 0 0 0 2px var(--am); border-radius:18%;
  transition:opacity .35s;
}
.door::after{
  content:''; position:absolute; left:50%; top:38%; width:18%; height:34%;
  transform:translateX(-50%);
  background:radial-gradient(circle at 50% 28%, var(--am) 0 26%, transparent 30%),
             linear-gradient(var(--am),var(--am)) 50% 60%/12% 55% no-repeat;
  opacity:.9;
}
.door.open{opacity:.12}
.pit{
  background:radial-gradient(circle at 50% 45%, #000 0 40%, #0b0f16 72%, var(--floor) 100%);
  border-radius:18%; box-shadow:inset 0 4px 14px rgba(0,0,0,.9), inset 0 0 0 1px var(--line);
}
.pit.filled{
  background:linear-gradient(160deg,#8a6a42,#5c452c);
  box-shadow:inset 0 0 0 1px #00000088, inset 0 3px 6px -2px rgba(255,255,255,.18);
}
.portal::before{
  content:''; position:absolute; inset:10%; border-radius:50%;
  background:conic-gradient(from 0deg, transparent 0 30deg, var(--cy) 90deg, transparent 150deg,
             transparent 190deg, var(--vio) 265deg, transparent 330deg);
  -webkit-mask:radial-gradient(circle, transparent 0 36%, #000 43%);
  mask:radial-gradient(circle, transparent 0 36%, #000 43%);
  animation:spin 2.8s linear infinite; opacity:.55;
}
.portal.armed::before{opacity:1; filter:drop-shadow(0 0 8px rgba(110,231,255,.7))}
.portal.armed::after{
  content:''; position:absolute; inset:38%; border-radius:50%;
  background:radial-gradient(circle,rgba(180,140,255,.8),transparent 70%);
  animation:debtpulse 1.4s ease-in-out infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.exit::before{
  content:''; position:absolute; inset:16%; border-radius:50%;
  border:2px dashed var(--mut); opacity:.7; transition:all .3s;
}
.exit::after{
  content:''; position:absolute; inset:38%; border-radius:50%;
  background:var(--mut); opacity:.4; transition:all .3s;
}
.exit.armed::before{border:2px solid var(--grn); box-shadow:0 0 16px rgba(125,255,168,.6); opacity:1; animation:exitpulse 1.6s ease-in-out infinite}
.exit.armed::after{background:var(--grn); opacity:1; box-shadow:0 0 10px rgba(125,255,168,.9)}
@keyframes exitpulse{0%,100%{box-shadow:0 0 8px rgba(125,255,168,.35)}50%{box-shadow:0 0 20px rgba(125,255,168,.75)}}
.crate{
  transition:transform .12s ease;
  z-index:3;
}
.crate::before{
  content:''; position:absolute; inset:11%; border-radius:16%;
  background:linear-gradient(160deg,#caa06a,#8a6a42);
  box-shadow:inset 0 2px 4px rgba(255,255,255,.35), inset 0 -3px 5px rgba(0,0,0,.45), 0 2px 6px rgba(0,0,0,.5);
}
.crate::after{
  content:''; position:absolute; inset:11%; border-radius:16%;
  background:linear-gradient(90deg,transparent 0 46%,rgba(0,0,0,.28) 46% 54%,transparent 54%),
             linear-gradient(0deg,transparent 0 46%,rgba(0,0,0,.28) 46% 54%,transparent 54%);
}
.crate.spectral::before{
  background:linear-gradient(160deg,#b48cff,#6f4fd0);
  box-shadow:inset 0 2px 4px rgba(255,255,255,.4), 0 0 12px rgba(180,140,255,.5);
  outline:2px dashed rgba(230,217,255,.7); outline-offset:-2px;
  animation:shimmer 2.2s ease-in-out infinite;
}
@keyframes shimmer{0%,100%{opacity:.95; filter:hue-rotate(0deg)}50%{opacity:.7; filter:hue-rotate(-18deg)}}
.crate.gone{transform-origin:center; opacity:0; scale:.15; transition:scale .3s ease-in, opacity .3s ease-in, transform .12s}
.keyItem{
  display:grid; place-items:center; z-index:2;
  font-size:calc(var(--ts)*.5);
  filter:drop-shadow(0 0 6px rgba(255,200,97,.8));
  animation:bob 2s ease-in-out infinite;
  transition:opacity .2s, scale .2s;
}
@keyframes bob{0%,100%{translate:0 -4%}50%{translate:0 5%}}
.keyItem.taken{opacity:0; scale:.2}
.player{
  z-index:5; transition:transform .12s ease; pointer-events:none;
}
.player::before{
  content:''; position:absolute; inset:19%; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #fff, #9feaff 42%, #2aa8d0 75%);
  box-shadow:0 0 14px rgba(110,231,255,.65), 0 3px 8px rgba(0,0,0,.5);
}
.hl{
  z-index:6; border:2px dashed var(--vio); border-radius:18%;
  animation:hlpulse .9s ease-in-out infinite; cursor:pointer;
  background:rgba(180,140,255,.12);
}
@keyframes hlpulse{0%,100%{opacity:.5}50%{opacity:1}}
.burst{z-index:7; pointer-events:none}
.burst::before{
  content:''; position:absolute; inset:10%; border-radius:50%;
  border:3px solid var(--vio);
  animation:burst .65s ease-out forwards;
}
.burst::after{
  content:''; position:absolute; inset:10%; border-radius:50%;
  border:2px solid var(--cy);
  animation:burst .65s .12s ease-out forwards; opacity:0;
}
@keyframes burst{0%{transform:scale(.3); opacity:1}100%{transform:scale(2.1); opacity:0}}
#msg{
  min-height:22px; max-width:560px; width:100%; text-align:center;
  color:var(--mut); font-size:12px; padding:0 14px;
  opacity:0; transition:opacity .25s;
}
#msg.show{opacity:1}
#msg.toast{color:#d9c2ff; text-shadow:0 0 10px rgba(180,140,255,.4)}
#hint{
  min-height:20px; max-width:560px; width:100%; text-align:center;
  color:#3d4a5c; font-size:11px; font-style:italic; padding:0 14px 2px;
}
#controls{
  display:flex; gap:8px; padding:8px 12px calc(10px + env(safe-area-inset-bottom));
  width:100%; max-width:560px; justify-content:center; position:relative;
}
button{
  font:inherit; font-size:12px; color:var(--ink);
  background:var(--card); border:1px solid var(--line); border-radius:10px;
  padding:9px 12px; cursor:pointer; transition:all .15s;
}
button:active{scale:.94}
button.accent{
  color:var(--vio); border-color:#4a3d70;
  box-shadow:0 0 10px rgba(180,140,255,.25);
}
button.accent:disabled{opacity:.35; box-shadow:none}
button.dim{opacity:.45}
#pop{
  position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
  display:none; gap:8px; padding:8px; background:var(--card);
  border:1px solid #4a3d70; border-radius:12px; margin-bottom:6px;
  box-shadow:0 6px 24px rgba(0,0,0,.6), 0 0 14px rgba(180,140,255,.2);
  z-index:20;
}
#pop.show{display:flex}
#overlay{
  position:fixed; inset:0; background:rgba(4,6,10,.84);
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  display:none; place-items:center; z-index:50; padding:18px;
}
#overlay.show{display:grid}
.card{
  background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:22px; max-width:360px; width:100%;
  box-shadow:0 12px 50px rgba(0,0,0,.7);
  text-align:center;
}
.card h2{font-size:18px; letter-spacing:.15em; margin-bottom:12px}
.card h2.grn{color:var(--grn); text-shadow:0 0 16px rgba(125,255,168,.6)}
.card h2.cy{color:var(--cy); text-shadow:0 0 16px rgba(110,231,255,.5)}
.card p{color:var(--mut); font-size:12.5px; margin:8px 0; text-align:left}
.card p.c{text-align:center}
.card .rule{display:flex; gap:10px; align-items:center; text-align:left; margin:9px 0; color:var(--mut); font-size:12px}
.card .rule span:not(.ic){flex:1}
.card .rule .ic{flex:0 0 26px; text-align:center; font-size:15px}
.card .btns{display:flex; gap:8px; justify-content:center; margin-top:16px; flex-wrap:wrap}
.lvlgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:12px}
.lvlgrid button{padding:12px 4px}
.lvlgrid button.solved{color:var(--grn); border-color:#2c5c3c}
.lvlgrid button.locked{opacity:.28; pointer-events:none}
.shake{animation:shake .3s}
@keyframes shake{0%,100%{translate:0}25%{translate:-3px 0}75%{translate:3px 0}}
</style>
</head>
<body>
<header>
  <a class="home" href="../">&#8962;</a>
  <div class="brand">debt</div>
  <div class="lvl" id="lvlLabel"></div>
</header>
<div id="status">
  <span id="ledger"></span>
  <div class="right" id="inv"></div>
</div>
<main id="wrap"><div id="board"></div></main>
<div id="msg"></div>
<div id="hint"></div>
<nav id="controls">
  <button id="bUndo">undo</button>
  <button id="bReset">reset</button>
  <button id="bBorrow" class="accent">borrow</button>
  <button id="bLevels">levels</button>
  <button id="bHelp">?</button>
  <button id="bSound">&#9834;</button>
  <div id="pop"></div>
</nav>
<div id="overlay"></div>

<script>
'use strict';
/* ================= levels ================= */
/*__LEVELS__*/
const LEVELS=[
{ name:'the key',
  hint:'tap to walk. keys are spent opening doors.',
  lend:[],
  map:[
  '########',
  '#@..K..#',
  '#......#',
  '####D###',
  '#...X..#',
  '########']},
{ name:'weight',
  hint:'walk into the crate to push it. weight holds gates open.',
  lend:[],
  map:[
  '########',
  '#@.....#',
  '#...C..#',
  '#...P..#',
  '###G####',
  '#..X...#',
  '########']},
{ name:'bootstrap',
  hint:'no key exists on this side. borrow one from the future - then send one back.',
  lend:['key'],
  map:[
  '#######',
  '#@....#',
  '#.....#',
  '###D###',
  '#K.O.X#',
  '#######']},
{ name:'inheritance',
  hint:'history has already lent you this crate. you owe the past.',
  lend:[],
  map:[
  '########',
  '#@...&.#',
  '#......#',
  '##G#####',
  '#.C....#',
  '#.O..X.#',
  '########']},
{ name:'loan',
  hint:'the only crate is on the far side of the gate.',
  lend:['crate'],
  map:[
  '########',
  '#@.P...#',
  '#......#',
  '###G####',
  '#..C...#',
  '#..O.X.#',
  '########']},
{ name:'collateral',
  hint:'the pit swallows one crate forever.',
  lend:['crate'],
  map:[
  '#########',
  '#@......#',
  '#.....P.#',
  '##G##G###',
  '#..C..C.#',
  '#....~..#',
  '#....O.X#',
  '#########']},
{ name:'refinance',
  hint:'one loan only. choose carefully what the future sends.',
  lend:['key','crate'],
  map:[
  '#########',
  '#@......#',
  '#..CP...#',
  '##G######',
  '#.......#',
  '####D####',
  '#.K.O..X#',
  '#########']},
{ name:'ouroboros',
  hint:'close the old loop before you may open a new one.',
  lend:['key'],
  map:[
  '#########',
  '#.@...&.#',
  '#.......#',
  '####G####',
  '#...C...#',
  '#.......#',
  '##O###D##',
  '#....#KX#',
  '#########']},
];
/*__END_LEVELS__*/

/* ================= parsing & state ================= */
let L=null, idx=0, ts=44;
function parseLevel(def){
  const l={name:def.name,hint:def.hint,lend:def.lend.slice(),charges:def.lend.length?1:0,
    w:def.map[0].length,h:def.map.length,walls:new Set(),
    plates:[],gates:[],pits:[],doors:[],keys:[],crates:[],portal:null,exit:null,
    px:0,py:0,inv:0,debts:[],won:false};
  def.map.forEach((row,y)=>{for(let x=0;x<row.length;x++){const c=row[x];
    if(c==='#'){l.walls.add(x+','+y);continue;}
    if(c==='@'){l.px=x;l.py=y;}
    else if(c==='K')l.keys.push({x,y,taken:false});
    else if(c==='D')l.doors.push({x,y,open:false});
    else if(c==='C')l.crates.push({x,y,b:false,gone:false});
    else if(c==='%'){l.crates.push({x,y,b:true,gone:false});l.debts.push('crate');}
    else if(c==='&'){l.plates.push({x,y});l.crates.push({x,y,b:true,gone:false});l.debts.push('crate');}
    else if(c==='P')l.plates.push({x,y});
    else if(c==='G')l.gates.push({x,y});
    else if(c==='~')l.pits.push({x,y,filled:false});
    else if(c==='O')l.portal={x,y};
    else if(c==='X')l.exit={x,y};
  }});
  return l;
}
const isWall=(x,y)=>L.walls.has(x+','+y)||x<0||y<0||x>=L.w||y>=L.h;
const crateAt=(x,y)=>L.crates.find(c=>!c.gone&&c.x===x&&c.y===y);
const doorAt=(x,y)=>L.doors.find(d=>d.x===x&&d.y===y);
const keyAt=(x,y)=>L.keys.find(k=>!k.taken&&k.x===x&&k.y===y);
const pitAt=(x,y)=>L.pits.find(p=>p.x===x&&p.y===y);
const gateAt=(x,y)=>L.gates.find(g=>g.x===x&&g.y===y);
const plateAt=(x,y)=>L.plates.find(p=>p.x===x&&p.y===y);
const gatesOpen=()=>L.plates.length>0&&L.plates.every(p=>crateAt(p.x,p.y)||(L.px===p.x&&L.py===p.y));

/* ================= undo ================= */
let undoStack=[];
function serialize(){return JSON.stringify({px:L.px,py:L.py,inv:L.inv,debts:L.debts,charges:L.charges,
  keys:L.keys.map(k=>k.taken),doors:L.doors.map(d=>d.open),pits:L.pits.map(p=>p.filled),
  crates:L.crates.map(c=>({x:c.x,y:c.y,b:c.b,gone:c.gone}))});}
function snap(){undoStack.push(serialize());if(undoStack.length>400)undoStack.shift();}
function restore(s){const o=JSON.parse(s);
  L.px=o.px;L.py=o.py;L.inv=o.inv;L.debts=o.debts;L.charges=o.charges;
  L.keys.forEach((k,i)=>k.taken=o.keys[i]);
  L.doors.forEach((d,i)=>d.open=o.doors[i]);
  L.pits.forEach((p,i)=>p.filled=o.pits[i]);
  L.crates.forEach((c,i)=>{c.x=o.crates[i].x;c.y=o.crates[i].y;c.gone=o.crates[i].gone;});
  L.won=false;placing=null;update();}
function undo(){stopWalk();if(!undoStack.length){S.no();return;}restore(undoStack.pop());}

/* ================= core rules ================= */
function step(dx,dy){
  if(L.won||placing)return false;
  const nx=L.px+dx,ny=L.py+dy;
  if(isWall(nx,ny)){S.no();return false;}
  const g=gateAt(nx,ny);
  if(g&&!gatesOpen()){S.no();msg('the gate is shut. weight opens it.');return false;}
  const d=doorAt(nx,ny);
  if(d&&!d.open){
    if(L.inv>0){snap();L.inv--;d.open=true;S.unlock();movePlayer(nx,ny);return true;}
    S.no();msg('locked. a key is spent to open it.');return false;}
  const pt=pitAt(nx,ny);
  if(pt&&!pt.filled){S.no();msg('a pit. you are not a crate.');return false;}
  const c=crateAt(nx,ny);
  if(c){
    const tx=nx+dx,ty=ny+dy;
    if(isWall(tx,ty)||crateAt(tx,ty)||keyAt(tx,ty)){S.no();return false;}
    const d2=doorAt(tx,ty); if(d2&&!d2.open){S.no();return false;}
    const g2=gateAt(tx,ty); if(g2&&!gatesOpen()){S.no();return false;}
    if(L.exit.x===tx&&L.exit.y===ty){S.no();msg('the exit is not storage.');return false;}
    const p2=pitAt(tx,ty);
    if(p2&&!p2.filled){snap();c.x=tx;c.y=ty;c.gone=true;p2.filled=true;S.pit();
      msg('the pit keeps it. forever.');movePlayer(nx,ny);return true;}
    if(L.portal&&L.portal.x===tx&&L.portal.y===ty){
      const di=L.debts.indexOf('crate');
      if(di<0){S.no();msg('nothing is owed. the portal stays shut.');return false;}
      snap();c.x=tx;c.y=ty;c.gone=true;L.debts.splice(di,1);S.repay();repayFX();
      toastOnce('rc','loop closed - the crate you sent back is the crate you borrowed.');
      movePlayer(nx,ny);return true;}
    snap();c.x=tx;c.y=ty;S.push();movePlayer(nx,ny);return true;
  }
  if(L.exit.x===nx&&L.exit.y===ny){
    if(L.debts.length){S.no();msg('the exit refuses - the ledger holds an unpaid loop.');flashLedger();return false;}
    snap();movePlayer(nx,ny);win();return true;}
  snap();movePlayer(nx,ny);return true;
}
function movePlayer(nx,ny){
  L.px=nx;L.py=ny;
  const k=keyAt(nx,ny);
  if(k){k.taken=true;L.inv++;S.key();}
  if(L.portal&&L.portal.x===nx&&L.portal.y===ny){
    const di=L.debts.indexOf('key');
    if(di>=0&&L.inv>0){L.inv--;L.debts.splice(di,1);S.repay();repayFX();
      toastOnce('rk','loop closed - the key you sent back becomes the key you borrowed.');}}
  update();
}

/* ================= borrowing ================= */
let placing=null;
function borrowClick(){
  if(!L.lend.length||L.won)return;
  if(placing){placing=null;update();return;}
  hidePop();
  if(L.debts.length){S.no();msg('one open loop at a time - close this one first.');flashLedger();return;}
  if(L.charges<1){S.no();msg('the future has stopped lending here.');return;}
  if(L.lend.length>1){showPop();return;}
  doBorrow(L.lend[0]);
}
function doBorrow(type){
  hidePop();
  if(type==='key'){
    snap();L.charges--;L.inv++;L.debts.push('key');S.borrow();
    toastOnce('bk','borrowed from the future. the ledger remembers.');update();return;}
  const cands=[[1,0],[-1,0],[0,1],[0,-1]].map(([dx,dy])=>({x:L.px+dx,y:L.py+dy}))
    .filter(p=>freeForCrate(p.x,p.y));
  if(!cands.length){S.no();msg('no room beside you for a crate.');return;}
  placing=cands;S.borrow();msg('tap a glowing square - the future delivers there.');update();
}
function freeForCrate(x,y){
  if(isWall(x,y)||crateAt(x,y)||keyAt(x,y)||doorAt(x,y)||gateAt(x,y))return false;
  const p=pitAt(x,y); if(p&&!p.filled)return false;
  if(L.portal&&L.portal.x===x&&L.portal.y===y)return false;
  if(L.exit.x===x&&L.exit.y===y)return false;
  if(L.px===x&&L.py===y)return false;
  return true;
}
function placeCrate(p){
  snap();L.crates.push({x:p.x,y:p.y,b:true,gone:false});
  L.charges--;L.debts.push('crate');placing=null;
  toastOnce('bc','borrowed from the future. the ledger remembers.');
  buildBoard();update();
}

/* ================= pathfinding & walking ================= */
let walkQueue=[],walkT=null;
function stopWalk(){if(walkT){clearInterval(walkT);walkT=null;}walkQueue=[];}
function passableInterior(x,y){
  if(isWall(x,y)||crateAt(x,y))return false;
  const d=doorAt(x,y); if(d&&!d.open)return false;
  const g=gateAt(x,y); if(g&&!gatesOpen())return false;
  const p=pitAt(x,y); if(p&&!p.filled)return false;
  if(L.portal&&L.portal.x===x&&L.portal.y===y)return false;
  if(L.exit.x===x&&L.exit.y===y)return false;
  return true;
}
function goalAllowed(x,y){
  if(passableInterior(x,y))return true;
  if(L.portal&&L.portal.x===x&&L.portal.y===y)return true;
  if(L.exit.x===x&&L.exit.y===y)return true;
  const d=doorAt(x,y); if(d&&!d.open)return true;
  return false;
}
function findPath(gx,gy){
  if(!goalAllowed(gx,gy))return null;
  const key=(x,y)=>x+','+y, prev={}, q=[[L.px,L.py]], seen=new Set([key(L.px,L.py)]);
  while(q.length){
    const [x,y]=q.shift();
    if(x===gx&&y===gy){
      const path=[];let c=key(x,y);
      while(prev[c]){path.unshift(prev[c][1]);c=prev[c][0];}
      return path;}
    for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=x+dx,ny=y+dy,k2=key(nx,ny);
      if(seen.has(k2))continue;
      const ok=(nx===gx&&ny===gy)?goalAllowed(nx,ny):passableInterior(nx,ny);
      if(!ok)continue;
      seen.add(k2);prev[k2]=[key(x,y),[dx,dy]];q.push([nx,ny]);}}
  return null;
}
function tapCell(cx,cy){
  if(L.won)return;
  if(placing){
    const hit=placing.find(p=>p.x===cx&&p.y===cy);
    if(hit)placeCrate(hit); else {placing=null;update();}
    return;}
  const c=crateAt(cx,cy);
  if(c){
    const dx=cx-L.px,dy=cy-L.py;
    if(Math.abs(dx)+Math.abs(dy)===1){stopWalk();step(dx,dy);}
    else msg('stand beside a crate to push it.');
    return;}
  if(cx===L.px&&cy===L.py)return;
  stopWalk();
  const path=findPath(cx,cy);
  if(!path){S.no();return;}
  walkQueue=path;
  walkT=setInterval(()=>{
    if(!walkQueue.length||L.won){stopWalk();return;}
    const [dx,dy]=walkQueue.shift();
    if(!step(dx,dy))stopWalk();
  },110);
}

/* ================= rendering ================= */
const $=id=>document.getElementById(id);
const board=$('board'),wrap=$('wrap');
let playerEl=null,hlEls=[];
function el(cls,parent){const d=document.createElement('div');d.className='t '+cls;(parent||board).appendChild(d);return d;}
function pos(d,x,y,s){d.style.transform=`translate(${x*ts}px,${y*ts}px)`+(s?` scale(${s})`:'');}
function computeTs(){
  const aw=Math.min(wrap.clientWidth,560)-16, ah=wrap.clientHeight-12;
  ts=Math.max(26,Math.min(Math.floor(aw/L.w),Math.floor(ah/L.h),64));
  document.documentElement.style.setProperty('--ts',ts+'px');
}
function buildBoard(){
  computeTs();
  board.innerHTML='';hlEls=[];
  board.style.width=L.w*ts+'px';board.style.height=L.h*ts+'px';
  for(let y=0;y<L.h;y++)for(let x=0;x<L.w;x++){
    if(L.walls.has(x+','+y))continue;
    pos(el('cell'),x,y,.94);
  }
  L.plates.forEach(p=>{p.el=el('plate');pos(p.el,p.x,p.y);});
  L.pits.forEach(p=>{p.el=el('pit');pos(p.el,p.x,p.y,.94);});
  if(L.portal){L.portalEl=el('portal');pos(L.portalEl,L.portal.x,L.portal.y);}
  L.exitEl=el('exit');pos(L.exitEl,L.exit.x,L.exit.y);
  L.gates.forEach(g=>{g.el=el('gate');pos(g.el,g.x,g.y,.94);});
  L.doors.forEach(d=>{d.el=el('door');pos(d.el,d.x,d.y,.94);});
  L.keys.forEach(k=>{k.el=el('keyItem');k.el.textContent='\u{1F5DD}';pos(k.el,k.x,k.y);});
  L.crates.forEach(c=>{c.el=el('crate'+(c.b?' spectral':''));pos(c.el,c.x,c.y);});
  playerEl=el('player');pos(playerEl,L.px,L.py);
}
function update(){
  pos(playerEl,L.px,L.py);
  L.keys.forEach(k=>k.el.classList.toggle('taken',k.taken));
  L.crates.forEach(c=>{pos(c.el,c.x,c.y);c.el.classList.toggle('gone',c.gone);});
  L.doors.forEach(d=>d.el.classList.toggle('open',d.open));
  const go=gatesOpen();
  L.gates.forEach(g=>g.el.classList.toggle('open',go));
  L.pits.forEach(p=>p.el.classList.toggle('filled',p.filled));
  L.plates.forEach(p=>p.el.classList.toggle('pressed',!!(crateAt(p.x,p.y)||(L.px===p.x&&L.py===p.y))));
  if(L.portalEl)L.portalEl.classList.toggle('armed',L.debts.length>0);
  L.exitEl.classList.toggle('armed',L.debts.length===0);
  hlEls.forEach(h=>h.remove());hlEls=[];
  if(placing)placing.forEach(p=>{const h=el('hl');pos(h,p.x,p.y);hlEls.push(h);});
  // hud
  $('lvlLabel').textContent=(idx+1)+' · '+L.name;
  $('ledger').innerHTML=L.debts.length
    ? L.debts.map(t=>`<span class="chip debt">owes ${t==='key'?'\u{1F5DD} a key':'▣ a crate'}</span>`).join(' ')
    : '<span class="chip">ledger clear</span>';
  $('inv').innerHTML=L.inv>0?`<span class="chip inv">\u{1F5DD} ×${L.inv}</span>`:'';
  const bb=$('bBorrow');
  bb.style.display=L.lend.length?'':'none';
  bb.textContent=placing?'cancel':'borrow ·'+L.charges;
  bb.disabled=!placing&&L.charges<1;
  $('hint').textContent=L.hint;
}
function repayFX(){
  if(!L.portal)return;
  const b=el('burst');pos(b,L.portal.x,L.portal.y);
  setTimeout(()=>b.remove(),800);
}
function flashLedger(){
  const c=$('ledger');c.classList.remove('shake');void c.offsetWidth;c.classList.add('shake');
}
/* messages */
let msgT=null;
function msg(t,cls,dur){
  const m=$('msg');m.textContent=t;m.className='show '+(cls||'');
  clearTimeout(msgT);msgT=setTimeout(()=>m.className='',dur||2600);
}
const seenToasts={};
function toastOnce(k,t){if(seenToasts[k]){return;}seenToasts[k]=1;msg(t,'toast',4500);}

/* ================= sound ================= */
const S=(()=>{
  let ctx=null,on=localStorage.getItem('debt.sound')!=='0';
  function ac(){if(!ctx)ctx=new (window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended')ctx.resume();return ctx;}
  function tone(f,d,type,v,dl,f2){
    if(!on)return;try{
      const c=ac(),t=c.currentTime+(dl||0);
      const o=c.createOscillator(),g=c.createGain();
      o.type=type||'sine';o.frequency.setValueAtTime(f,t);
      if(f2)o.frequency.exponentialRampToValueAtTime(f2,t+d);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(v||.12,t+.008);
      g.gain.exponentialRampToValueAtTime(.0001,t+d);
      o.connect(g).connect(c.destination);o.start(t);o.stop(t+d+.05);
    }catch(e){}}
  return {
    get on(){return on;},
    toggle(){on=!on;localStorage.setItem('debt.sound',on?'1':'0');return on;},
    push(){tone(80,.08,'triangle',.2);},
    key(){tone(920,.12,'sine',.14);tone(1380,.18,'sine',.1,.06);},
    unlock(){tone(300,.1,'triangle',.16);tone(452,.16,'triangle',.12,.08);},
    borrow(){[1560,1160,860,640].forEach((f,i)=>tone(f,.16,'sine',.09,i*.055));},
    repay(){tone(220,.4,'sine',.1);[440,660,880,1320].forEach((f,i)=>tone(f,.18,'sine',.11,i*.07));},
    pit(){tone(150,.35,'sine',.18,0,55);},
    win(){[523,659,784,1047,1319].forEach((f,i)=>tone(f,.28,'sine',.12,i*.09));},
    no(){tone(120,.1,'square',.07);},
  };
})();

/* ================= progress / overlays ================= */
let progress={unlocked:0,solved:[]};
try{const p=JSON.parse(localStorage.getItem('debt.progress'));if(p)progress=p;}catch(e){}
function save(){localStorage.setItem('debt.progress',JSON.stringify(progress));}
const overlay=$('overlay');
function showOverlay(html){overlay.innerHTML='<div class="card">'+html+'</div>';overlay.classList.add('show');}
function hideOverlay(){overlay.classList.remove('show');}
overlay.addEventListener('click',e=>{if(e.target===overlay)hideOverlay();});
function showHelp(){
  showOverlay(`<h2 class="cy">debt</h2>
  <p class="c">a puzzle about borrowing from the future.</p>
  <div class="rule"><span class="ic">\u{1F446}</span><span>tap to walk. swipe to step. walk into crates to push them.</span></div>
  <div class="rule"><span class="ic">\u{1F5DD}</span><span>keys open doors - and are spent.</span></div>
  <div class="rule"><span class="ic">◎</span><span>plates hold gates open while something heavy sits on them.</span></div>
  <div class="rule"><span class="ic">✦</span><span><b>borrow</b> summons a thing from the future. that opens a loop - a debt on the ledger.</span></div>
  <div class="rule"><span class="ic">◌</span><span>send a matching thing into the time portal to close the loop. what you send back <i>becomes</i> what you borrowed.</span></div>
  <div class="rule"><span class="ic">✖</span><span>the exit only works when the ledger is clear.</span></div>
  <p class="c" style="margin-top:12px">undo is infinite. paradox is impossible.<br>debt is forever - until it isn't.</p>
  <div class="btns"><button onclick="hideOverlay()">begin</button></div>`);
}
function showLevels(){
  const btns=LEVELS.map((l,i)=>{
    const cls=(progress.solved[i]?'solved ':'')+(i>progress.unlocked?'locked':'');
    return `<button class="${cls}" onclick="startLevel(${i});hideOverlay()">${i+1}${progress.solved[i]?' ✓':''}</button>`;
  }).join('');
  showOverlay(`<h2 class="cy">loops</h2><div class="lvlgrid">${btns}</div>
  <div class="btns"><button onclick="hideOverlay()">back</button></div>`);
}
function win(){
  L.won=true;stopWalk();S.win();
  progress.solved[idx]=true;
  progress.unlocked=Math.max(progress.unlocked,Math.min(idx+1,LEVELS.length-1));
  save();
  setTimeout(()=>{
    if(idx===LEVELS.length-1){
      showOverlay(`<h2 class="grn">every loop is closed</h2>
      <p class="c">the ledger is clean.</p>
      <p class="c">everything you borrowed was<br>always its own source.</p>
      <div class="btns"><button onclick="startLevel(0);hideOverlay()">again</button>
      <button onclick="showLevels()">loops</button></div>`);
    }else{
      showOverlay(`<h2 class="grn">loop closed</h2>
      <p class="c">${idx+1} · ${L.name}</p>
      <div class="btns"><button class="accent" onclick="startLevel(${idx+1});hideOverlay()">next loop</button>
      <button onclick="showLevels()">loops</button></div>`);
    }
  },700);
}

/* ================= level lifecycle ================= */
function startLevel(i){
  idx=Math.max(0,Math.min(i,LEVELS.length-1));
  L=parseLevel(LEVELS[idx]);
  undoStack=[];placing=null;stopWalk();hidePop();
  buildBoard();update();
  if(L.debts.length)setTimeout(()=>toastOnce('inh'+idx,'history already lent you this - the spectral crate is borrowed. you owe the past.'),400);
}
function resetLevel(){snap();const s=serialize;L.won=false;
  const fresh=parseLevel(LEVELS[idx]);
  const keep=undoStack;L=fresh;undoStack=keep;placing=null;stopWalk();
  buildBoard();update();}

/* ================= input ================= */
let pd=null;
wrap.addEventListener('pointerdown',e=>{pd={x:e.clientX,y:e.clientY,t:Date.now()};});
wrap.addEventListener('pointerup',e=>{
  if(!pd)return;
  const dx=e.clientX-pd.x,dy=e.clientY-pd.y;pd=null;
  if(Math.hypot(dx,dy)>26){
    stopWalk();
    if(Math.abs(dx)>Math.abs(dy))step(Math.sign(dx),0);else step(0,Math.sign(dy));
    return;}
  const r=board.getBoundingClientRect();
  const cx=Math.floor((e.clientX-r.left)/ts),cy=Math.floor((e.clientY-r.top)/ts);
  if(cx>=0&&cy>=0&&cx<L.w&&cy<L.h)tapCell(cx,cy);
});
document.addEventListener('keydown',e=>{
  if(overlay.classList.contains('show'))return;
  const k=e.key;
  const dirs={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
    w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
  if(dirs[k]){e.preventDefault();stopWalk();step(...dirs[k]);}
  else if(k==='z'||k==='u')undo();
  else if(k==='r')resetLevel();
  else if(k==='b')borrowClick();
});
function showPop(){
  const p=$('pop');
  p.innerHTML=L.lend.map(t=>
    `<button onclick="doBorrow('${t}')">${t==='key'?'\u{1F5DD} a key':'▣ a crate'}</button>`).join('');
  p.classList.add('show');
}
function hidePop(){$('pop').classList.remove('show');}
$('bUndo').onclick=undo;
$('bReset').onclick=resetLevel;
$('bBorrow').onclick=borrowClick;
$('bLevels').onclick=showLevels;
$('bHelp').onclick=showHelp;
$('bSound').onclick=function(){this.classList.toggle('dim',!S.toggle());};
$('bSound').classList.toggle('dim',!S.on);
window.addEventListener('resize',()=>{if(L){buildBoard();update();}});

/* ================= boot ================= */
const urlL=new URLSearchParams(location.search).get('l');
startLevel(urlL!==null?parseInt(urlL,10):Math.min(progress.unlocked,LEVELS.length-1));
if(!localStorage.getItem('debt.helped')){localStorage.setItem('debt.helped','1');showHelp();}
</script>
