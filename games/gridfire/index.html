<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="color-scheme" content="dark" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23171b23'/%3E%3Ctext x='16' y='22' font-family='system-ui,sans-serif' font-size='19' font-weight='700' text-anchor='middle' fill='%23ff7a45'%3EG%3C/text%3E%3C/svg%3E" />
<title>Gridfire</title>
<style>
  :root{
    --accent:#ff7a45;
    --bg:#10141c; --bg-top:#1a2130;
    --surface:#1d2432; --raised:#273043;
    --ink:#eaeef6; --muted:#93a0b8;
    --line:rgba(255,255,255,.12); --line-strong:rgba(255,255,255,.26);
    --gold:#ffd166; --life:#ff5d8f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{margin:0;height:100%;overflow:hidden}
  body{
    background:radial-gradient(130% 100% at 50% 0%, var(--bg-top) 0%, var(--bg) 60%);
    color:var(--ink);
    font:14px/1.35 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;
  }
  #hud{display:flex;align-items:center;gap:10px;padding:8px 10px;flex:0 0 auto}
  #hud .title{font-weight:700;letter-spacing:.22em;font-size:13px;text-transform:uppercase}
  #hud .title b{color:var(--accent);text-shadow:0 0 14px var(--accent)}
  #hud .spacer{flex:1}
  .stat{display:inline-flex;align-items:center;gap:4px;font-variant-numeric:tabular-nums;
    font-weight:600;font-size:13px;padding:4px 8px;border-radius:9px;background:var(--surface);
    border:1px solid var(--line)}
  .stat .ic{font-size:12px}
  #lives .ic{color:var(--life)} #gold .ic{color:var(--gold)} #wave .ic{color:#63d7f2}
  #wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;position:relative}
  canvas#game{display:block;touch-action:none}

  #preview{flex:0 0 auto;text-align:center;color:var(--muted);font-size:12px;
    letter-spacing:.04em;padding:2px 8px 4px;min-height:18px}
  #preview b{color:var(--ink)}

  #tray{flex:0 0 auto;display:flex;gap:8px;align-items:stretch;padding:0 10px calc(10px + env(safe-area-inset-bottom))}
  .slot{position:relative;width:64px;height:76px;border-radius:12px;background:var(--surface);
    border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;
    justify-content:flex-start;padding-top:4px;cursor:grab;touch-action:none;
    transition:transform .1s,border-color .15s}
  .slot canvas{width:52px;height:48px;pointer-events:none}
  .slot .cost{font-size:11px;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums;pointer-events:none}
  .slot.sel{border-color:var(--line-strong);transform:translateY(-3px);
    box-shadow:0 4px 16px rgba(0,0,0,.5)}
  .slot.broke{opacity:.38}
  .slot.broke .cost{color:var(--life)}
  #reroll{width:56px;border-radius:12px;background:var(--surface);border:1px solid var(--line);
    color:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;font-size:18px;cursor:pointer}
  #reroll small{font-size:10px;color:var(--gold);font-weight:700}
  #go{flex:1;border-radius:12px;border:1px solid var(--line-strong);cursor:pointer;
    background:linear-gradient(180deg,#2b3852,#222b3e);color:var(--ink);
    font-weight:800;font-size:16px;letter-spacing:.14em;text-transform:uppercase}
  #go:not(:disabled){box-shadow:0 0 18px rgba(99,215,242,.25), inset 0 0 12px rgba(99,215,242,.12);
    border-color:rgba(99,215,242,.5)}
  #go:disabled{opacity:.45;cursor:default}
  button{font:inherit}

  /* block inspector: lives inside the tray row, never overlays the grid */
  #blockBar{display:none;flex:1;min-height:76px;align-items:center;gap:10px;flex-wrap:wrap;
    border-radius:12px;background:var(--surface);border:1px solid var(--line-strong);padding:8px 14px}
  #blockBar .bbInfo{flex:1;min-width:0}
  #blockBar .bbTitle{font-weight:700}
  #blockBar .bbSub{color:var(--muted);font-size:12px;margin-top:3px}
  #blockBar .row{display:flex;gap:8px;flex:1 1 auto;flex-wrap:wrap;justify-content:flex-end}
  #blockBar button{padding:10px 16px;border-radius:10px;border:1px solid var(--line-strong);
    background:var(--raised);color:var(--ink);cursor:pointer;font-weight:600}
  #blockBar #sellBtn{color:var(--gold)}
  #blockBar #upgradeBtn{color:#8affc0;border-color:#2e6b4d}
  #blockBar .specBtn{display:none;flex-direction:column;align-items:flex-start;gap:1px;
    padding:7px 11px;line-height:1.1;color:#cfe6ff;border-color:#3a5170}
  #blockBar .specBtn b{font-size:13px}
  #blockBar .specBtn small{color:var(--muted);font-weight:500;font-size:10px}
  #blockBar button:disabled{opacity:.4;cursor:default}
  #tray.inspect .slot, #tray.inspect #reroll, #tray.inspect #go{display:none}
  #tray.inspect #blockBar{display:flex}

  #overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(10,13,20,.82);backdrop-filter:blur(4px);z-index:50}
  #overlay .card{text-align:center;padding:30px 34px;border-radius:18px;background:var(--surface);
    border:1px solid var(--line-strong);box-shadow:0 10px 50px rgba(0,0,0,.6);max-width:320px}
  #overlay h2{margin:0 0 6px;letter-spacing:.18em;text-transform:uppercase;font-size:20px}
  #overlay h2.win{color:#57e08a;text-shadow:0 0 22px rgba(87,224,138,.6)}
  #overlay h2.lose{color:var(--life);text-shadow:0 0 22px rgba(255,93,143,.6)}
  #overlay p{color:var(--muted);margin:4px 0 16px;font-size:13px}
  #overlay button{padding:11px 30px;border-radius:12px;border:1px solid var(--line-strong);
    background:var(--raised);color:var(--ink);font-weight:700;font-size:15px;cursor:pointer;
    letter-spacing:.08em}
</style>
</head>
<body>
  <div id="hud">
    <span class="title"><b>G</b>RIDFIRE</span>
    <span class="spacer"></span>
    <span class="stat" id="wave"><span class="ic">&#9737;</span><span id="waveTxt">1/20</span></span>
    <span class="stat" id="gold"><span class="ic">&#9670;</span><span id="goldTxt">0</span></span>
    <span class="stat" id="lives"><span class="ic">&#10084;</span><span id="livesTxt">10</span></span>
  </div>

  <div id="wrap">
    <canvas id="game"></canvas>
  </div>

  <div id="preview"></div>

  <div id="tray">
    <div class="slot" data-i="0"><canvas width="104" height="96"></canvas><span class="cost"></span></div>
    <div class="slot" data-i="1"><canvas width="104" height="96"></canvas><span class="cost"></span></div>
    <div class="slot" data-i="2"><canvas width="104" height="96"></canvas><span class="cost"></span></div>
    <button id="reroll">&#8634;<small id="rerollCost">5</small></button>
    <button id="go">Go</button>
    <div id="blockBar">
      <div class="bbInfo">
        <div class="bbTitle" id="ipTitle">Block</div>
        <div class="bbSub" id="ipSub"></div>
      </div>
      <div class="row">
        <button id="upgradeBtn">Upgrade</button>
        <button id="spec0" class="specBtn"></button>
        <button id="spec1" class="specBtn"></button>
        <button id="sellBtn">Sell</button>
        <button id="ipClose">Close</button>
      </div>
    </div>
  </div>

  <div id="overlay"><div class="card">
    <h2 id="ovTitle"></h2>
    <p id="ovSub"></p>
    <button id="restart">Play again</button>
  </div></div>

<script>
'use strict';
/* ---------------- constants ---------------- */
const COLS=8, ROWS=12;
const SPAWN={x:3,y:0}, GOAL={x:4,y:11};
const STEP=1/60;
const START_GOLD=50, START_LIVES=10;
const N_WAVES=20;
const GHOST_OFFSET=80;      // px the drag ghost floats above the finger
const SNAP_R2=2.4*2.4;      // snap radius², in cells
const BULLET_TIME=0.15;     // sim speed while dragging during a wave

const DIRS=[[0,-1],[1,0],[0,1],[-1,0]]; // up right down left

const SHAPES={ // dir0: base firing dir at rot 0; only I & T are directional
  P:{cells:[[0,0]],em:0,cost:5},
  I:{cells:[[0,0],[1,0],[2,0],[3,0]],em:3,cost:12,dir0:1},        // fires right out of the end cell
  O:{cells:[[0,0],[1,0],[0,1],[1,1]],em:1,cost:12},
  T:{cells:[[0,0],[1,0],[2,0],[1,1]],em:1,cost:12,dir0:0},        // em = bar middle, fires up (opposite the stem)
  L:{cells:[[0,0],[0,1],[0,2],[1,2]],em:3,cost:12},
  J:{cells:[[1,0],[1,1],[1,2],[0,2]],em:3,cost:12},
  S:{cells:[[1,0],[2,0],[0,1],[1,1]],em:0,cost:12},
  Z:{cells:[[0,0],[1,0],[1,1],[2,1]],em:1,cost:12},
};
// shape = HOW a tower attacks (element = damage type). all numbers are T4-tunable.
const PATTERNS={
  P:{kind:'nova',   radius:1.5,             cd:1.6, mult:1.1}, // pulse around itself, hits all in radius
  O:{kind:'mortar', radius:3.0, splash:1.2, cd:2.8, mult:1.6}, // lobbed AoE shell at the first target
  I:{kind:'lane',   range:6,                cd:2.2, mult:1.3}, // piercing shot along its axis, hits all in the lane
  T:{kind:'cone',   depth:2, width:3,       cd:1.9, mult:1.2}, // blast out the front
  L:{kind:'turret', radius:2.2,             cd:0.9, mult:0.8}, // fast single-target
  J:{kind:'turret', radius:2.2,             cd:0.9, mult:0.8},
  S:{kind:'turret', radius:2.2,             cd:0.9, mult:0.8},
  Z:{kind:'turret', radius:2.2,             cd:0.9, mult:0.8},
};
const ELEMS={ // dmg tuned in T4: volt has no status utility so it carries via raw punch
  plain:{name:'Stone', color:'#6b7689', cost:0},
  frost:{name:'Frost', color:'#63d7f2', cost:8,  dmg:4},
  fire: {name:'Fire',  color:'#ff7a45', cost:15, dmg:2, burnDps:6, burnDur:4},
  volt: {name:'Volt',  color:'#ffe066', cost:12, dmg:10},
};
const SLOW_F=0.26, SLOW_DUR=2.8; // strong slow is the maze enabler (long path compounds it)
// Kingdom-Rush tiers 1-3 (T5). dmg x1.5/tier; tier 3 also stretches geometry.
// mult/r3Radius bumped from the spec's 1.5/0.5 guesses so I5 holds (2 tier-3 ~= 8 tier-1 same spend).
const TIER={mult:1.6, r3Radius:1.0, r3Range:2, r3Depth:1, slowPerTier:0.3};
// Tier-4 specialisations (T6): at tier 3, pick 1 of 2 per element. Cost 3x base.
// Deterministic-only: freeze/overcharge use per-block hit/shot counters, never Math.random.
const SPECS={
  frost:[{key:'deepfreeze',name:'Deep Freeze',fx:'every 5th hit freezes 0.8s'},
         {key:'permafrost',name:'Permafrost',fx:'leaves icy slow-fields'}],
  fire: [{key:'wildfire',  name:'Wildfire',  fx:'burn spreads on kill'},
         {key:'napalm',    name:'Napalm',    fx:'2x burn + 15% slow'}],
  volt: [{key:'overcharge',name:'Overcharge',fx:'every 4th shot x3'},
         {key:'static',    name:'Static',    fx:'each hit stuns 0.25s'}],
};
const SPEC={freezeEvery:5, freezeDur:0.8, freezeCd:3, fieldDur:2.5, wildfireR:1.2,
  napalmBurnMult:2, napalmSlowF:0.85, overEvery:4, overMult:3, staticDur:0.25, staticCd:2};
// shop element odds (no gale): plain .34, frost .24, volt .22, fire .20
const ELEM_ODDS=[['plain',.34],['frost',.24],['volt',.22],['fire',.20]];

const ENEMY_TYPES={
  runt:   {hp:8,  sp:2.2, r:0.17, gold:1, col:'#ff5d8f'},
  skitter:{hp:6,  sp:3.4, r:0.14, gold:1, col:'#ff5dde'},
  shell:  {hp:26, sp:1.0, r:0.24, gold:3, col:'#5c7cfa', armor:2},
  brute:  {hp:46, sp:0.85,r:0.30, gold:4, col:'#c084fc'},
};
const TYPE_LABEL={runt:'runts',skitter:'skitters',shell:'shells',brute:'brutes'};
// spawn cadence per type: [interval, startOffset]
const CADENCE={runt:[0.55,0], skitter:[0.38,0.8], shell:[2.4,1.2], brute:[3.2,2]};
const WAVES=[
  {runt:8},{runt:12},{runt:10,brute:2},{runt:8,skitter:4},{runt:14,brute:3},
  {skitter:10,brute:2},{runt:16,shell:3},{runt:12,skitter:8,brute:3},{shell:6,skitter:6},{runt:20,brute:6},
  {runt:16,skitter:10,shell:4},{brute:8,shell:6},{runt:24,skitter:12},{shell:10,brute:6},{runt:20,skitter:14,brute:6},
  {runt:26,shell:8,brute:6},{skitter:20,shell:8},{runt:30,brute:10,skitter:10},{shell:12,brute:10,runt:20},{runt:30,skitter:16,shell:10,brute:12},
];

/* ---------------- state ---------------- */
let S=null;
function newState(){
  return {
    phase:'build',           // build | wave | over
    wave:0,
    gold:START_GOLD, lives:START_LIVES,
    grid:new Array(COLS*ROWS).fill(null),
    blocks:new Map(), nextId:1, structVer:0,
    shop:[rollPiece(),rollPiece(),rollPiece()],
    rerolls:0,
    selected:null,
    path:[],                 // current spawn->goal path (cells)
    wavePath:null,           // with off-grid entry/exit, used for spawning
    enemies:[], queue:[], waveT:0, fields:[],   // fields: Permafrost icy ground slow-tiles
    kills:0, dealtTotal:0,
    speed:1,                 // wave speed 1x/2x/3x, persists across the run
    goalDist:null, goalDistVer:-1,   // dist-to-goal field, cached per structVer (targeting)
  };
}
function idx(x,y){return y*COLS+x;}
function inGrid(x,y){return x>=0&&x<COLS&&y>=0&&y<ROWS;}

/* ---------------- shop ---------------- */
function rollElem(){
  const r=Math.random(); let acc=0;
  for(const [el,p] of ELEM_ODDS){acc+=p;if(r<acc)return el;}
  return ELEM_ODDS[ELEM_ODDS.length-1][0];
}
function rollPiece(){
  const shapeKeys=Object.keys(SHAPES);
  const shape=Math.random()<0.15?'P':shapeKeys[1+Math.floor(Math.random()*(shapeKeys.length-1))];
  const elem=rollElem();
  return {shape, elem, rot:0, cost:SHAPES[shape].cost+ELEMS[elem].cost};
}
function rerollCost(){return 5+5*S.rerolls;}

/* ---------------- rotation ---------------- */
function rotOnce(cells,em){ // rotate CW, normalized; emitter index follows its cell
  const rot=cells.map(([x,y])=>[-y,x]);
  const mx=Math.min(...rot.map(c=>c[0])), my=Math.min(...rot.map(c=>c[1]));
  const emCell=rot[em];
  const out=rot.map(([x,y])=>[x-mx,y-my]);
  return {cells:out, em:out.findIndex(c=>c[0]===emCell[0]-mx&&c[1]===emCell[1]-my)};
}
function orient(shape,rot){ // shape key + rotation count -> {cells, em, dir}
  let cells=SHAPES[shape].cells.map(c=>c.slice()), em=SHAPES[shape].em;
  for(let i=0;i<(rot%4+4)%4;i++){const r=rotOnce(cells,em);cells=r.cells;em=r.em;}
  return {cells, em, dir:(((SHAPES[shape].dir0||0)+rot)%4+4)%4};
}

/* ---------------- pathfinding ---------------- */
function blockedSet(extra){
  const b=new Set();
  for(let i=0;i<S.grid.length;i++) if(S.grid[i]!==null) b.add(i);
  if(extra) for(const [x,y] of extra) b.add(idx(x,y));
  return b;
}
function bfsPath(blockedExtra){ // spawn -> goal, or null
  const blocked=blockedSet(blockedExtra);
  if(blocked.has(idx(SPAWN.x,SPAWN.y))||blocked.has(idx(GOAL.x,GOAL.y))) return null;
  const prev=new Array(COLS*ROWS).fill(-1);
  const q=[idx(SPAWN.x,SPAWN.y)]; prev[q[0]]=q[0];
  const ORDER=[[0,1],[1,0],[-1,0],[0,-1]];
  for(let h=0;h<q.length;h++){
    const cur=q[h], cx=cur%COLS, cy=(cur-cx)/COLS;
    if(cur===idx(GOAL.x,GOAL.y)){
      const path=[]; let c=cur;
      while(c!==idx(SPAWN.x,SPAWN.y)){path.push([c%COLS,(c-c%COLS)/COLS]); c=prev[c];}
      path.push([SPAWN.x,SPAWN.y]); path.reverse();
      return path;
    }
    for(const [dx,dy] of ORDER){
      const nx=cx+dx, ny=cy+dy;
      if(!inGrid(nx,ny)) continue;
      const ni=idx(nx,ny);
      if(prev[ni]!==-1||blocked.has(ni)) continue;
      prev[ni]=cur; q.push(ni);
    }
  }
  return null;
}
function distFromGoal(blockedExtra){ // dist field to goal, -1 unreachable
  const blocked=blockedSet(blockedExtra);
  const dist=new Array(COLS*ROWS).fill(-1);
  if(blocked.has(idx(GOAL.x,GOAL.y))) return dist;
  const q=[idx(GOAL.x,GOAL.y)]; dist[q[0]]=0;
  for(let h=0;h<q.length;h++){
    const cur=q[h], cx=cur%COLS, cy=(cur-cx)/COLS;
    for(const [dx,dy] of [[0,-1],[1,0],[-1,0],[0,1]]){
      const nx=cx+dx, ny=cy+dy;
      if(!inGrid(nx,ny)) continue;
      const ni=idx(nx,ny);
      if(dist[ni]!==-1||blocked.has(ni)) continue;
      dist[ni]=dist[cur]+1; q.push(ni);
    }
  }
  return dist;
}
function descend(dist,x,y){ // greedy walk down the dist field to goal
  const path=[[x,y]];
  while(!(x===GOAL.x&&y===GOAL.y)){
    let best=null,bd=dist[idx(x,y)];
    for(const [dx,dy] of [[0,1],[1,0],[-1,0],[0,-1]]){
      const nx=x+dx, ny=y+dy;
      if(!inGrid(nx,ny)||dist[idx(nx,ny)]===-1) continue;
      if(dist[idx(nx,ny)]<bd){bd=dist[idx(nx,ny)];best=[nx,ny];}
    }
    if(!best) return null;
    x=best[0];y=best[1];path.push([x,y]);
  }
  return path;
}
function refreshPath(){S.path=bfsPath(null)||[];}

/* ---------------- blocks & chains ---------------- */
function cellsFree(cellsAbs){
  for(const [x,y] of cellsAbs){
    if(!inGrid(x,y)) return false;
    if(S.grid[idx(x,y)]!==null) return false;
    if((x===SPAWN.x&&y===SPAWN.y)||(x===GOAL.x&&y===GOAL.y)) return false;
  }
  return true;
}
let placeCache=null; // {key, list:[{x,y}]}: structurally legal positions for a piece orientation
function legalPositions(cells){
  const w=Math.max(...cells.map(c=>c[0]))+1, h=Math.max(...cells.map(c=>c[1]))+1;
  const list=[];
  for(let y=0;y<=ROWS-h;y++)for(let x=0;x<=COLS-w;x++){
    const abs=cells.map(([cx,cy])=>[x+cx,y+cy]);
    if(!cellsFree(abs)) continue;
    if(bfsPath(abs)===null) continue;
    list.push({x,y});
  }
  return list;
}
function waveSafe(cellsAbs){ // during a wave: no enemy underneath, nobody gets trapped
  const cellSet=new Set(cellsAbs.map(([x,y])=>x+','+y));
  const dist=distFromGoal(cellsAbs);
  if(dist[idx(SPAWN.x,SPAWN.y)]===-1) return false;
  for(const e of S.enemies){
    if(!e.alive) continue;
    const [x,y]=enemyPos(e), cx=Math.round(x), cy=Math.round(y);
    if(cellSet.has(cx+','+cy)) return false;
    if(inGrid(cx,cy)&&dist[idx(cx,cy)]===-1) return false;
  }
  return true;
}
function placePiece(shape,elem,cost,x,y,rot){
  const o=orient(shape,rot);
  const cells=o.cells.map(([cx,cy])=>[x+cx,y+cy]);
  const id=S.nextId++;
  const b={id, shape, elem, cells, cost, invested:cost, tier:1, spec:null, hitN:0, shots:0, em:o.em, dir:o.dir,
    fresh:S.phase==='build', dealt:0, cd:0, flash:0, kind:null, center:[0,0], coverage:[], radius:0, role:'wall'};
  for(const [cx,cy] of cells) S.grid[idx(cx,cy)]=id;
  S.blocks.set(id,b);
  S.structVer++;
  recomputeTowers(); refreshPath();
  if(S.phase==='wave') repathEnemies();
  return b;
}
function tierMult(b){return Math.pow(TIER.mult,b.tier-1);}
function upgradeCost(b){return b.tier===1?b.cost:b.tier===2?b.cost*2:Infinity;} // t2=base, t3=2x base
function upgradeBlock(id){
  const b=S.blocks.get(id); if(!b||b.elem==='plain'||b.tier>=3) return;
  const c=upgradeCost(b); if(S.gold<c) return;
  S.gold-=c; b.tier++; b.invested+=c;
  recomputeTowers(); syncUI();
}
function specCost(b){return b.cost*3;} // tier-4 specialisation
function chooseSpec(id,key){
  const b=S.blocks.get(id); if(!b||b.tier!==3||b.spec) return;
  const opts=SPECS[b.elem]; if(!opts||!opts.some(o=>o.key===key)) return;
  const c=specCost(b); if(S.gold<c) return;
  S.gold-=c; b.spec=key; b.invested+=c;
  recomputeTowers(); syncUI();
}
function sellBlock(id){
  const b=S.blocks.get(id); if(!b) return;
  S.gold+=b.fresh?b.invested:Math.floor(b.invested/2);
  for(const [x,y] of b.cells) S.grid[idx(x,y)]=null;
  S.blocks.delete(id);
  S.selected=null;
  S.structVer++;
  recomputeTowers(); refreshPath();
  if(S.phase==='wave') repathEnemies();
  syncUI();
}
function traceBeam(b,maxLen){
  const [ex,ey]=b.cells[b.em], [dx,dy]=DIRS[b.dir];
  const cells=[]; let x=ex+dx, y=ey+dy;
  while(inGrid(x,y)&&cells.length<maxLen){
    const oid=S.grid[idx(x,y)];
    if(oid!==null&&oid!==b.id) return {cells, hit:S.blocks.get(oid), hitCell:[x,y]};
    if(oid===b.id) return {cells, hit:null, hitCell:null};
    cells.push([x,y]); x+=dx; y+=dy;
  }
  return {cells, hit:null, hitCell:null};
}
function bboxCenter(cells){ // geometric centre in enemyPos/px cell-units
  const xs=cells.map(c=>c[0]), ys=cells.map(c=>c[1]);
  return [(Math.min(...xs)+Math.max(...xs))/2, (Math.min(...ys)+Math.max(...ys))/2];
}
function coneCellsAbs(emCell,dir,depth,own){ // 3-wide blast out the front, skipping own/blocked cells
  const [ex,ey]=emCell, [dx,dy]=DIRS[dir], pdx=-dy, pdy=dx;
  const out=[];
  for(let d=1;d<=depth;d++)for(let o=-1;o<=1;o++){
    const x=ex+dx*d+pdx*o, y=ey+dy*d+pdy*o;
    if(!inGrid(x,y)) continue;
    if(own.has(x+','+y)) continue;
    if(S.grid[idx(x,y)]!==null) continue;
    out.push([x,y]);
  }
  return out;
}
function recomputeTowers(){
  for(const b of S.blocks.values()){
    if(b.elem==='plain'){b.role='wall';continue;}
    const P=PATTERNS[b.shape], t3=b.tier>=3; // tier 3 stretches range/radius/depth
    b.kind=P.kind; b.center=bboxCenter(b.cells);
    if(P.kind==='lane'){
      b.coverage=traceBeam(b,P.range+(t3?TIER.r3Range:0)).cells; b.radius=0;
      b.role=b.coverage.length?'tower':'idle';   // only lanes can be walled off
    }else if(P.kind==='cone'){
      b.coverage=coneCellsAbs(b.cells[b.em],b.dir,P.depth+(t3?TIER.r3Depth:0),new Set(b.cells.map(([x,y])=>x+','+y)));
      b.radius=0; b.role='tower';                 // cone is never idle
    }else{ // nova / turret / mortar: radius from centre, shoots over walls
      b.coverage=[]; b.radius=P.radius+(t3?TIER.r3Radius:0); b.role='tower';
    }
  }
  S.goalDist=distFromGoal(null); S.goalDistVer=S.structVer;
}

/* ---------------- waves & enemies ---------------- */
function buildWavePath(cells){ // cells path -> with off-grid entry/exit
  return [[SPAWN.x,SPAWN.y-1.4],...cells,[GOAL.x,GOAL.y+1.4]];
}
function startWave(){
  if(S.phase!=='build') return;
  const p=bfsPath(null); if(!p) return;
  S.selected=null;
  S.path=p; S.wavePath=buildWavePath(p);
  const w=WAVES[S.wave], q=[];
  for(const type in w){
    const [iv,off]=CADENCE[type];
    for(let i=0;i<w[type];i++) q.push({t:off+i*iv, type});
  }
  q.sort((a,b)=>a.t-b.t);
  S.queue=q; S.enemies=[]; S.waveT=0;
  for(const b of S.blocks.values()){b.fresh=false;b.cd=0;}
  S.phase='wave'; syncUI();
}
function hpScale(){return Math.pow(1.115,S.wave);} // T4-tuned: gentle curve keeps waves 10-14 reachable
function spawnEnemy(type){
  const base=ENEMY_TYPES[type];
  S.enemies.push({type, hp:base.hp*hpScale(), maxhp:base.hp*hpScale(),
    path:S.wavePath, prog:0, slowT:0, slowF:1, burnT:0, burnDps:0, alive:true, hitFx:0,
    stopT:0, freezeCd:0, stunCd:0, wildfire:false});
  syncUI();
}
function enemyPos(e){
  const p=e.path, i=Math.min(Math.floor(e.prog),p.length-2), f=e.prog-i;
  return [p[i][0]+(p[i+1][0]-p[i][0])*f, p[i][1]+(p[i+1][1]-p[i][1])*f];
}
function repathEnemies(){ // after a mid-wave placement/sale
  const dist=distFromGoal(null);
  const main=descend(dist,SPAWN.x,SPAWN.y);
  if(main){S.path=main;S.wavePath=buildWavePath(main);}
  for(const e of S.enemies){
    if(!e.alive) continue;
    const [x,y]=enemyPos(e);
    const cx=Math.round(x), cy=Math.round(y);
    if(!inGrid(cx,cy)){ // still entering / already exiting
      if(cy<0){e.path=S.wavePath;e.prog=Math.min(e.prog,0.99);}
      continue;
    }
    const tail=descend(dist,cx,cy);
    if(!tail) continue; // shouldn't happen (placement was vetted)
    e.path=[[x,y],...tail,[GOAL.x,GOAL.y+1.4]];
    e.prog=0;
  }
}
function damage(e,amt,src){
  e.hp-=amt; e.hitFx=0.15;
  if(src){src.dealt+=amt;} S.dealtTotal+=amt;
  if(e.hp<=0&&e.alive){
    e.alive=false; S.kills++;
    const g=ENEMY_TYPES[e.type].gold;
    S.gold+=g;
    const [x,y]=enemyPos(e);
    if(e.wildfire&&e.burnT>0){ // Wildfire: burn jumps to nearby enemies on death
      const r2=SPEC.wildfireR*SPEC.wildfireR;
      for(const o of S.enemies){ if(!o.alive||o===e) continue;
        const [ox,oy]=enemyPos(o);
        if((ox-x)*(ox-x)+(oy-y)*(oy-y)<=r2){o.burnDps=Math.max(o.burnDps,e.burnDps);o.burnT=Math.max(o.burnT,ELEMS.fire.burnDur);o.wildfire=true;}
      }
    }
    addFloater(x,y,'+'+g,'#ffd166');
    burst(x,y,ENEMY_TYPES[e.type].col,e.type==='brute'?26:12);
    syncUI();
  }
}
function applySlow(e,dur){
  const f=e.type==='skitter'?(1+SLOW_F)/2:SLOW_F; // skitters shrug off half the slow
  e.slowF=Math.min(e.slowF,f); e.slowT=Math.max(e.slowT,dur);
}
function stopEnemy(e,dur){e.stopT=Math.max(e.stopT,dur);} // freeze/stun: hard halt
function applyElem(b,e,dmg){ // one hit: armor + element status + tier-4 spec
  const armor=ENEMY_TYPES[e.type].armor||0;
  if(armor&&b.elem!=='volt') dmg=Math.max(0.4,dmg-armor); // volt ignores armor
  damage(e,dmg,b);
  if(!e.alive) return;
  if(b.elem==='frost'){
    applySlow(e,SLOW_DUR+TIER.slowPerTier*(b.tier-1));
    if(b.spec==='deepfreeze'&&(++b.hitN)%SPEC.freezeEvery===0&&e.freezeCd<=0){stopEnemy(e,SPEC.freezeDur);e.freezeCd=SPEC.freezeCd;}
  }
  if(b.elem==='fire'){
    const bm=b.spec==='napalm'?SPEC.napalmBurnMult:1;
    e.burnDps=Math.max(e.burnDps,ELEMS.fire.burnDps*tierMult(b)*bm); e.burnT=ELEMS.fire.burnDur;
    if(b.spec==='wildfire') e.wildfire=true;
    if(b.spec==='napalm'){e.slowF=Math.min(e.slowF,SPEC.napalmSlowF);e.slowT=Math.max(e.slowT,ELEMS.fire.burnDur);}
  }
  if(b.elem==='volt'&&b.spec==='static'&&e.stunCd<=0){stopEnemy(e,SPEC.staticDur);e.stunCd=SPEC.staticCd;}
  const [x,y]=enemyPos(e);
  burst(x,y,ELEMS[b.elem].color,3);
}
function enemiesInCells(cells){
  const set=new Set(cells.map(([x,y])=>x+','+y)), out=[];
  for(const e of S.enemies){ if(!e.alive) continue;
    const [x,y]=enemyPos(e);
    if(set.has(Math.round(x)+','+Math.round(y))) out.push(e);
  }
  return out;
}
function enemiesInRadius(center,r){
  const [cx,cy]=center, r2=r*r, out=[];
  for(const e of S.enemies){ if(!e.alive) continue;
    const [x,y]=enemyPos(e);
    if((x-cx)*(x-cx)+(y-cy)*(y-cy)<=r2) out.push(e);
  }
  return out;
}
function firstToGoal(list){ // 'first' targeting: enemy nearest the goal by the cached dist field
  const dist=S.goalDist; let best=null, bd=Infinity;
  for(const e of list){
    const [x,y]=enemyPos(e), cx=Math.round(x), cy=Math.round(y);
    const d=(inGrid(cx,cy)&&dist&&dist[idx(cx,cy)]>=0)?dist[idx(cx,cy)]:999;
    if(d<bd){bd=d;best=e;}
  }
  return best;
}
function addField(x,y){ // Permafrost: icy slow-tile, refreshed if already there
  if(!inGrid(x,y)) return;
  const f=S.fields.find(f=>f.x===x&&f.y===y);
  if(f) f.t=Math.max(f.t,SPEC.fieldDur); else S.fields.push({x,y,t:SPEC.fieldDur});
}
function fireTower(b){ // dispatch on kind; returns true if it hit something
  const P=PATTERNS[b.shape]; let dmg=ELEMS[b.elem].dmg*P.mult*tierMult(b), hit;
  if(b.kind==='nova'||b.kind==='lane'||b.kind==='cone'){
    const list=b.kind==='nova'?enemiesInRadius(b.center,b.radius):enemiesInCells(b.coverage);
    if(!list.length) return false;
    if(b.spec==='overcharge'&&(++b.shots)%SPEC.overEvery===0) dmg*=SPEC.overMult;
    for(const e of list) applyElem(b,e,dmg);   // hit all
    hit=list;
  }else{ // turret / mortar: single first-target
    const t=firstToGoal(enemiesInRadius(b.center,b.radius));
    if(!t) return false;
    if(b.spec==='overcharge'&&(++b.shots)%SPEC.overEvery===0) dmg*=SPEC.overMult;
    applyElem(b,t,dmg); hit=[t];
    if(b.kind==='mortar'){
      const [tx,ty]=enemyPos(t), sp2=P.splash*P.splash;
      for(const e of S.enemies){ if(!e.alive||e===t) continue;
        const [x,y]=enemyPos(e);
        if((x-tx)*(x-tx)+(y-ty)*(y-ty)<=sp2){applyElem(b,e,dmg*0.6); hit.push(e);}
      }
    }
  }
  if(b.spec==='permafrost') for(const e of hit){const [x,y]=enemyPos(e); addField(Math.round(x),Math.round(y));}
  return true;
}
function simTick(dt){
  S.waveT+=dt;
  while(S.queue.length&&S.queue[0].t<=S.waveT){spawnEnemy(S.queue.shift().type);}
  for(let i=S.fields.length-1;i>=0;i--){if((S.fields[i].t-=dt)<=0)S.fields.splice(i,1);}
  for(const e of S.enemies){
    if(!e.alive) continue;
    if(e.freezeCd>0)e.freezeCd-=dt;
    if(e.stunCd>0)e.stunCd-=dt;
    if(e.slowT>0){e.slowT-=dt;if(e.slowT<=0)e.slowF=1;}
    if(e.burnT>0){e.burnT-=dt;damage(e,e.burnDps*dt,null);if(!e.alive)continue;}
    e.hitFx=Math.max(0,e.hitFx-dt);
    if(e.stopT>0){e.stopT-=dt;continue;}   // frozen / stunned: no movement this tick
    const [ex,ey]=enemyPos(e);
    if(S.fields.length&&S.fields.some(f=>f.x===Math.round(ex)&&f.y===Math.round(ey))) applySlow(e,0.3);
    e.prog+=ENEMY_TYPES[e.type].sp*e.slowF*dt;
    if(e.prog>=e.path.length-1){
      e.alive=false; S.lives--;
      burst(GOAL.x,GOAL.y+1,'#ff5d8f',18);
      syncUI();
      if(S.lives<=0){endRun(false);return;}
    }
  }
  for(const b of S.blocks.values()){
    b.flash=Math.max(0,b.flash-dt);
    if(b.role!=='tower') continue;
    b.cd-=dt;
    if(b.cd>0) continue;
    if(fireTower(b)){b.cd=PATTERNS[b.shape].cd;b.flash=0.28;}
  }
  if(!S.queue.length&&S.enemies.every(e=>!e.alive)){
    const bonus=11+3*(S.wave+1);
    S.gold+=bonus;
    addFloater(GOAL.x,ROWS/2,'wave clear +'+bonus,'#ffd166');
    S.wave++;
    if(S.wave>=N_WAVES){endRun(true);return;}
    S.phase='build'; S.rerolls=0; S.enemies=[];
    refreshPath(); syncUI();
  }
}
function endRun(won){
  S.phase='over';
  cancelDrag();
  try{
    const best=+localStorage.getItem('gridfire.best')||0;
    if(S.wave>best) localStorage.setItem('gridfire.best',String(S.wave));
  }catch(e){}
  const t=document.getElementById('ovTitle'), s=document.getElementById('ovSub');
  t.textContent=won?'Grid held':'Overrun';
  t.className=won?'win':'lose';
  s.textContent=(won?'All '+N_WAVES+' waves survived. ':'Fell on wave '+(S.wave+1)+'. ')
    +S.kills+' kills · '+Math.round(S.dealtTotal)+' damage dealt';
  document.getElementById('overlay').style.display='flex';
}

/* ---------------- fx ---------------- */
const parts=[], floaters=[];
function burst(cx,cy,color,n){
  for(let i=0;i<n;i++){
    if(parts.length>600) parts.shift();
    const a=Math.random()*Math.PI*2, v=0.5+Math.random()*2.2;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*v,vy:Math.sin(a)*v,t:0,life:0.3+Math.random()*0.4,color});
  }
}
function addFloater(cx,cy,txt,color){floaters.push({x:cx,y:cy,txt,color,t:0});}

/* ---------------- canvas & render ---------------- */
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
let cell=40, padX=8, padY=14, dpr=1;
function resize(){
  const wrap=document.getElementById('wrap');
  const aw=wrap.clientWidth-12, ah=wrap.clientHeight-8;
  cell=Math.floor(Math.min(aw/COLS,(ah-2*14)/ROWS));
  padX=8; padY=Math.floor(cell*0.55);
  const w=COLS*cell+2*padX, h=ROWS*cell+2*padY;
  dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=w*dpr; cv.height=h*dpr;
  cv.style.width=w+'px'; cv.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
function px(cx){return padX+cx*cell+cell/2;}
function py(cy){return padY+cy*cell+cell/2;}
function cellAt(mx,my){return [Math.floor((mx-padX)/cell),Math.floor((my-padY)/cell)];}

let animT=0;
function render(dt){
  animT+=dt;
  const W=cv.width/dpr, H=cv.height/dpr;
  ctx.clearRect(0,0,W,H);
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    ctx.fillStyle=(x+y)%2?'rgba(255,255,255,.022)':'rgba(255,255,255,.038)';
    ctx.fillRect(padX+x*cell+1,padY+y*cell+1,cell-2,cell-2);
  }
  const pulse=0.55+0.45*Math.sin(animT*2.4);
  drawPortal(px(SPAWN.x),padY-2,'#ff5d8f',pulse);
  drawPortal(px(GOAL.x),padY+ROWS*cell+2,'#63d7f2',pulse);
  // path
  const g=drag&&drag.active?dragGhost():null;
  const previewPath=g?(bfsPath(g.cellsAbs)||null):(S.path.length?S.path:null);
  if(previewPath) drawPath(previewPath, g?0.85:(S.phase==='wave'?0.14:0.35));
  // permafrost icy fields
  for(const f of S.fields){
    ctx.fillStyle=hexA('#63d7f2',0.14*Math.min(1,f.t/SPEC.fieldDur));
    ctx.fillRect(padX+f.x*cell+1,padY+f.y*cell+1,cell-2,cell-2);
  }
  // coverage preview for the selected tower
  if(S.selected!==null&&!g){
    const sb=S.blocks.get(S.selected);
    if(sb&&sb.elem!=='plain') drawCoverage(sb,ELEMS[sb.elem].color);
  }
  for(const b of S.blocks.values()) drawBlock(b,1,b.id===S.selected);
  // firing beams (lanes only)
  for(const b of S.blocks.values()){
    if(b.kind!=='lane'||b.role!=='tower'||b.flash<=0||!b.coverage.length) continue;
    const [ex,ey]=b.cells[b.em];
    const last=b.coverage[b.coverage.length-1];
    drawBeam(px(ex),py(ey),px(last[0]),py(last[1]),ELEMS[b.elem].color,b.flash/0.28);
  }
  // enemies
  for(const e of S.enemies){
    if(!e.alive) continue;
    drawEnemy(e);
  }
  if(g) drawGhostG(g);
  // particles
  ctx.globalCompositeOperation='lighter';
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.t+=dt;
    if(p.t>=p.life){parts.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    ctx.globalAlpha=(1-p.t/p.life)*0.9; ctx.fillStyle=p.color;
    ctx.fillRect(px(p.x)-1.5,py(p.y)-1.5,3,3);
  }
  ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  // floaters
  ctx.textAlign='center'; ctx.font='700 12px -apple-system,sans-serif';
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i]; f.t+=dt;
    if(f.t>1.4){floaters.splice(i,1);continue;}
    ctx.globalAlpha=Math.min(1,2*(1.4-f.t));
    ctx.fillStyle=f.color;
    ctx.fillText(f.txt,px(f.x),py(f.y)-f.t*22);
  }
  ctx.globalAlpha=1;
  // bullet-time vignette
  if(S.phase==='wave'&&drag&&drag.active){
    ctx.save();
    ctx.strokeStyle='rgba(99,215,242,.5)';ctx.lineWidth=3;
    ctx.strokeRect(1.5,1.5,W-3,H-3);
    ctx.restore();
  }
}
function drawEnemy(e){
  const [x,y]=enemyPos(e), base=ENEMY_TYPES[e.type];
  const exx=px(x), eyy=py(y), r=base.r*cell;
  ctx.save();
  if(e.slowF<1){ctx.shadowColor='#63d7f2';ctx.shadowBlur=8;}
  if(e.burnT>0){ctx.shadowColor='#ff7a45';ctx.shadowBlur=10;}
  if(e.stopT>0){ctx.shadowColor='#bfefff';ctx.shadowBlur=13;} // frozen / stunned
  ctx.fillStyle=e.hitFx>0?'#ffffff':(e.stopT>0?'#cdeeff':base.col);
  ctx.beginPath();
  if(e.type==='skitter'){ // triangle
    ctx.moveTo(exx,eyy-r*1.2);ctx.lineTo(exx+r*1.1,eyy+r*0.9);ctx.lineTo(exx-r*1.1,eyy+r*0.9);ctx.closePath();
  }else if(e.type==='shell'){ // hexagon
    for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;
      i?ctx.lineTo(exx+r*1.15*Math.cos(a),eyy+r*1.15*Math.sin(a)):ctx.moveTo(exx+r*1.15*Math.cos(a),eyy+r*1.15*Math.sin(a));}
    ctx.closePath();
  }else ctx.arc(exx,eyy,r,0,7);
  ctx.fill();
  ctx.restore();
  const f=Math.max(0,e.hp/e.maxhp);
  if(f<1){
    ctx.strokeStyle='rgba(0,0,0,.55)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(exx,eyy,r+4,0,7);ctx.stroke();
    ctx.strokeStyle=f>0.4?'#57e08a':'#ff5d8f';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(exx,eyy,r+4,-Math.PI/2,-Math.PI/2+f*Math.PI*2);ctx.stroke();
  }
}
function drawPortal(x,y,color,pulse){
  ctx.save();
  ctx.shadowColor=color; ctx.shadowBlur=14*pulse;
  ctx.strokeStyle=color; ctx.lineWidth=3; ctx.globalAlpha=0.5+0.5*pulse;
  ctx.beginPath(); ctx.ellipse(x,y,cell*0.55,cell*0.2,0,0,7); ctx.stroke();
  ctx.restore();
}
function drawPath(path,alpha){
  ctx.save();
  ctx.strokeStyle='rgba(143,216,255,'+alpha+')';
  ctx.lineWidth=2.5; ctx.setLineDash([5,7]); ctx.lineDashOffset=-animT*22;
  ctx.beginPath();
  ctx.moveTo(px(path[0][0]),padY-4);
  for(const [x,y] of path) ctx.lineTo(px(x),py(y));
  ctx.lineTo(px(path[path.length-1][0]),padY+ROWS*cell+4);
  ctx.stroke();
  ctx.restore();
}
function drawBeam(x1,y1,x2,y2,color,a){
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  ctx.strokeStyle=color;
  ctx.shadowColor=color; ctx.shadowBlur=12;
  ctx.globalAlpha=a*0.9; ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.globalAlpha=a; ctx.strokeStyle='#fff'; ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.restore();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}
function drawBlockCells(cellsAbs,color,alpha){
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.fillStyle=color;
  const set=new Set(cellsAbs.map(([x,y])=>x+','+y));
  for(const [x,y] of cellsAbs){
    const rx=padX+x*cell, ry=padY+y*cell;
    roundRect(rx+2.5,ry+2.5,cell-5,cell-5,6); ctx.fill();
    if(set.has((x+1)+','+y)) ctx.fillRect(rx+cell-4,ry+3,8,cell-6);
    if(set.has(x+','+(y+1))) ctx.fillRect(rx+3,ry+cell-4,cell-6,8);
  }
  ctx.restore();
}
function drawBlock(b,alpha,selected){
  const el=ELEMS[b.elem];
  drawBlockCells(b.cells, b.elem==='plain'?'#39424f':shade(el.color,-55), alpha);
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.fillStyle=b.elem==='plain'?'rgba(255,255,255,.05)':hexA(el.color,0.18);
  for(const [x,y] of b.cells){
    roundRect(padX+x*cell+5,padY+y*cell+5,cell-10,cell-10,4); ctx.fill();
  }
  if(selected){
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
    for(const [x,y] of b.cells){roundRect(padX+x*cell+1.5,padY+y*cell+1.5,cell-3,cell-3,6);ctx.stroke();}
    ctx.setLineDash([]);
  }
  if(b.elem!=='plain'&&(b.kind==='lane'||b.kind==='cone')){ // only directional shapes show a chevron
    const [ex,ey]=b.cells[b.em];
    drawChevron(px(ex),py(ey),b.dir,el.color,alpha,b.role);
    if(b.role==='idle'){ // lane blocked: red mark where it dies
      const [dx,dy]=DIRS[b.dir];
      const bx=px(ex)+dx*cell*0.55, by=py(ey)+dy*cell*0.55;
      ctx.strokeStyle='rgba(255,93,143,.85)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bx-4,by-4);ctx.lineTo(bx+4,by+4);
      ctx.moveTo(bx+4,by-4);ctx.lineTo(bx-4,by+4);ctx.stroke();
    }
  }
  if(b.elem!=='plain'&&b.tier>1){ // tier pips: 0-2 dots in the first cell's corner
    const [fx,fy]=b.cells[0];
    ctx.fillStyle=el.color;
    for(let i=0;i<b.tier-1;i++){
      ctx.beginPath();ctx.arc(padX+fx*cell+9+i*8,padY+fy*cell+9,2.6,0,7);ctx.fill();
    }
  }
  ctx.restore();
}
function drawCoverage(b,color){ // circle for nova/turret/mortar, tinted cells for lane/cone
  ctx.save();
  if(b.kind==='lane'||b.kind==='cone'){
    ctx.fillStyle=hexA(color,0.2);
    for(const [x,y] of b.coverage) ctx.fillRect(padX+x*cell+1,padY+y*cell+1,cell-2,cell-2);
  }else{
    ctx.beginPath();ctx.arc(px(b.center[0]),py(b.center[1]),b.radius*cell,0,7);
    ctx.fillStyle=hexA(color,0.1); ctx.fill();
    ctx.strokeStyle=hexA(color,0.6); ctx.lineWidth=1.5; ctx.stroke();
  }
  ctx.restore();
}
function drawChevron(x,y,dir,color,alpha,role){
  ctx.save();
  ctx.translate(x,y); ctx.rotate(dir*Math.PI/2);
  ctx.globalAlpha=alpha;
  const s=cell*0.22;
  const dim=role==='idle';
  ctx.shadowColor=color; ctx.shadowBlur=dim?0:9;
  ctx.fillStyle=dim?'rgba(255,255,255,.35)':color;
  ctx.beginPath();
  ctx.moveTo(0,-s*1.3); ctx.lineTo(s,s*0.5); ctx.lineTo(0,s*0.05); ctx.lineTo(-s,s*0.5);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawGhostG(g){
  const el=ELEMS[g.elem];
  const ok=g.ok;
  drawBlockCells(g.cellsAbs, ok?(g.elem==='plain'?'#4a5566':shade(el.color,-30)):'#7a2733', 0.8);
  if(g.elem==='plain') return;
  const P=PATTERNS[g.shape], [ex,ey]=g.cellsAbs[g.em], col=el.color;
  if(P.kind==='lane'||P.kind==='cone')
    drawChevron(px(ex),py(ey),g.dir,ok?col:'#ff5d8f',0.95,'tower');
  if(!ok) return;
  if(P.kind==='lane'){
    ctx.fillStyle=hexA(col,0.22);
    for(const [x,y] of traceAbs(g.cellsAbs,g.em,g.dir).cells.slice(0,P.range))
      ctx.fillRect(padX+x*cell+1,padY+y*cell+1,cell-2,cell-2);
  }else if(P.kind==='cone'){
    const own=new Set(g.cellsAbs.map(([x,y])=>x+','+y));
    ctx.fillStyle=hexA(col,0.22);
    for(const [x,y] of coneCellsAbs([ex,ey],g.dir,P.depth,own))
      ctx.fillRect(padX+x*cell+1,padY+y*cell+1,cell-2,cell-2);
  }else{
    const c=bboxCenter(g.cellsAbs);
    ctx.save();
    ctx.beginPath();ctx.arc(px(c[0]),py(c[1]),P.radius*cell,0,7);
    ctx.fillStyle=hexA(col,0.1); ctx.fill();
    ctx.strokeStyle=hexA(col,0.6); ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
  }
}
function traceAbs(cellsAbs,em,dir){ // beam trace for a not-yet-placed piece
  const mine=new Set(cellsAbs.map(([x,y])=>x+','+y));
  const [ex,ey]=cellsAbs[em], [dx,dy]=DIRS[dir];
  const cells=[]; let x=ex+dx, y=ey+dy;
  while(inGrid(x,y)&&cells.length<COLS+ROWS){
    if(mine.has(x+','+y)) break;
    const oid=S.grid[idx(x,y)];
    if(oid!==null) return {cells, hit:S.blocks.get(oid), hitCell:[x,y]};
    cells.push([x,y]); x+=dx; y+=dy;
  }
  return {cells, hit:null, hitCell:null};
}
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,Math.min(255,(n>>16)+amt)),g=Math.max(0,Math.min(255,((n>>8)&255)+amt)),b=Math.max(0,Math.min(255,(n&255)+amt));
  return 'rgb('+r+','+g+','+b+')';
}
function hexA(hex,a){
  const n=parseInt(hex.slice(1),16);
  return 'rgba('+(n>>16)+','+((n>>8)&255)+','+(n&255)+','+a+')';
}

/* ---------------- main loop ---------------- */
let last=performance.now(), acc=0;
function stepSim(dt){ // advance the fixed-timestep sim by dt real seconds
  if(S.phase!=='wave') return;
  acc+=dt*S.speed*((drag&&drag.active)?BULLET_TIME:1);
  while(acc>=STEP&&S.phase==='wave'){simTick(STEP);acc-=STEP;}
}
function frame(now){
  const dt=Math.min(0.1,(now-last)/1000); last=now;
  stepSim(dt);
  render(dt);
  requestAnimationFrame(frame);
}

/* ---------------- drag input (shipshape-style) ---------------- */
let drag=null; // {slot,piece,cells,em,dir,ptrId,sx,sy,fx,fy,active,snap,waveOk}
function beginDrag(e,slot){
  if(S.phase==='over') return;
  const p=S.shop[slot];
  const o=orient(p.shape,p.rot);
  drag={slot, piece:p, cells:o.cells, em:o.em, dir:o.dir,
    ptrId:e.pointerId, sx:e.clientX, sy:e.clientY, fx:e.clientX, fy:e.clientY,
    active:false, snap:null, waveOk:true};
  S.selected=null;
  syncUI();
}
function rotateDrag(){
  if(!drag) return;
  const p=drag.piece;
  p.rot=(p.rot+1)%4;
  const o=orient(p.shape,p.rot);
  drag.cells=o.cells; drag.em=o.em; drag.dir=o.dir;
  recomputeSnap();
  drawSlots();
}
function recomputeSnap(){
  if(!drag||!drag.active) return;
  const key=drag.piece.shape+'|'+drag.dir+'|'+S.structVer;
  if(!placeCache||placeCache.key!==key)
    placeCache={key, list:legalPositions(drag.cells)};
  const r=cv.getBoundingClientRect();
  const tx=(drag.fx-r.left-padX)/cell, ty=(drag.fy-r.top-GHOST_OFFSET-padY)/cell;
  const w=Math.max(...drag.cells.map(c=>c[0]))+1, h=Math.max(...drag.cells.map(c=>c[1]))+1;
  let best=null,bd=SNAP_R2;
  for(const cand of placeCache.list){
    const dx=cand.x+w/2-tx, dy=cand.y+h/2-ty;
    const d=dx*dx+dy*dy;
    if(d<bd){bd=d;best=cand;}
  }
  drag.snap=best;
  drag.waveOk=true;
  if(best&&S.phase==='wave'){
    const abs=drag.cells.map(([cx,cy])=>[best.x+cx,best.y+cy]);
    drag.waveOk=waveSafe(abs);
  }
}
function dragGhost(){ // render/query model of the active drag
  if(!drag||!drag.active) return null;
  const r=cv.getBoundingClientRect();
  let x,y,snapped=!!drag.snap;
  if(drag.snap){x=drag.snap.x;y=drag.snap.y;}
  else{
    const w=Math.max(...drag.cells.map(c=>c[0]))+1, h=Math.max(...drag.cells.map(c=>c[1]))+1;
    x=Math.round((drag.fx-r.left-padX)/cell-w/2);
    y=Math.round((drag.fy-r.top-GHOST_OFFSET-padY)/cell-h/2);
    x=Math.max(0,Math.min(COLS-w,x)); y=Math.max(0,Math.min(ROWS-h,y));
  }
  const cellsAbs=drag.cells.map(([cx,cy])=>[x+cx,y+cy]);
  const ok=snapped&&drag.waveOk&&S.gold>=drag.piece.cost;
  return {cellsAbs, em:drag.em, dir:drag.dir, elem:drag.piece.elem, shape:drag.piece.shape, ok};
}
function releaseDrag(){
  if(!drag) return;
  if(drag.active) recomputeSnap(); // enemies may have moved since the last pointermove
  if(drag.active&&drag.snap&&drag.waveOk&&S.gold>=drag.piece.cost){
    S.gold-=drag.piece.cost;
    placePiece(drag.piece.shape,drag.piece.elem,drag.piece.cost,drag.snap.x,drag.snap.y,drag.piece.rot);
    S.shop[drag.slot]=rollPiece();
  }else if(!drag.active){
    // tap on the tray card: pre-rotate the offer
    drag.piece.rot=(drag.piece.rot+1)%4;
  }
  drag=null;
  syncUI();
}
function cancelDrag(){drag=null;}
window.addEventListener('pointermove',e=>{
  if(!drag||e.pointerId!==drag.ptrId) return;
  drag.fx=e.clientX; drag.fy=e.clientY;
  if(!drag.active&&Math.abs(e.clientX-drag.sx)+Math.abs(e.clientY-drag.sy)>10){
    drag.active=true; syncUI();
  }
  if(drag.active) recomputeSnap();
});
window.addEventListener('pointerup',e=>{
  if(drag&&e.pointerId===drag.ptrId) releaseDrag();
});
window.addEventListener('pointercancel',e=>{
  if(drag&&e.pointerId===drag.ptrId){drag=null;syncUI();}
});
window.addEventListener('pointerdown',e=>{
  // second finger while dragging = rotate
  if(drag&&drag.active&&e.pointerId!==drag.ptrId){rotateDrag();e.preventDefault();}
},{capture:true});
window.addEventListener('keydown',e=>{
  if(S.phase==='over') return;
  if(drag){
    if(e.key==='r'||e.key==='R') rotateDrag();
    if(e.key==='Escape'){drag=null;syncUI();}
  }else if((e.key===' '||e.key==='Enter')&&S.phase==='build') startWave();
});

// tap a placed block to inspect it
let cvTap=null;
cv.addEventListener('pointerdown',e=>{
  if(drag) return;
  const r=cv.getBoundingClientRect();

function drawSlot(c,p){
  const g=c.getContext('2d');
  g.setTransform(2,0,0,2,0,0);
  g.clearRect(0,0,52,48);
  const o=orient(p.shape,p.rot), el=ELEMS[p.elem];
  const w=Math.max(...o.cells.map(cc=>cc[0]))+1,h=Math.max(...o.cells.map(cc=>cc[1]))+1;
  const s=Math.min(46/Math.max(w,h,2)/1.05,14);
  const ox=(52-w*s)/2, oy=(48-h*s)/2;
  g.fillStyle=p.elem==='plain'?'#4a5566':el.color;
  for(const [x,y] of o.cells){
    g.beginPath();
    const rx=ox+x*s,ry=oy+y*s;
    g.roundRect?g.roundRect(rx+1,ry+1,s-2,s-2,3):g.rect(rx+1,ry+1,s-2,s-2);
    g.fill();
  }
  const pk=PATTERNS[p.shape].kind;
  if(p.elem!=='plain'&&(pk==='lane'||pk==='cone')){
    const [emx,emy]=o.cells[o.em];
    g.fillStyle='#0e1116';
    g.save();
    g.translate(ox+emx*s+s/2,oy+emy*s+s/2);
    g.rotate(o.dir*Math.PI/2);
    g.beginPath();g.moveTo(0,-s*0.28);g.lineTo(s*0.22,s*0.14);g.lineTo(-s*0.22,s*0.14);
    g.closePath();g.fill();
    g.restore();
  }
}

/* ---------------- balance harness (T4) ---------------- */
// Reference builds. Coords assume SPAWN(3,0)/GOAL(4,11). See TASKS.md T4.
const BUILDS={
  // ~130 gold of towers, no walls: the "tower spam, no maze" strawman
  open: [ ['P','frost',2,1,0],['P','volt',5,1,0],['P','fire',2,2,0],['P','frost',5,2,0],
          ['P','volt',2,3,0],['P','fire',5,3,0],['P','frost',2,4,0],['P','volt',5,4,0] ],
  // serpentine walls (3 switchbacks) + mixed towers hugging the path
  maze: [ ['I','plain',0,2,0],['P','plain',4,2,0],['P','plain',5,2,0],   // gap right
          ['I','plain',4,5,0],['P','plain',2,5,0],['P','plain',3,5,0],   // gap left
          ['I','plain',0,8,0],['P','plain',4,8,0],['P','plain',5,8,0],   // gap right
          ['P','frost',5,3,0],['P','frost',2,3,0],['P','volt',1,6,0],['P','fire',5,9,0] ],
};
// mono variants (I4) & reinvest (I3) are generated: walls + N single-element pebbles,
// counts chosen so tower spend lands within +-5 of the mixed maze (~63g).
const MONO_N={frost:5, volt:4, fire:3};
function buildCost(entries){return entries.reduce((s,[sh,el])=>s+SHAPES[sh].cost+ELEMS[el].cost,0);}
function mazeWalls(){return BUILDS.maze.filter(e=>e[1]==='plain');}
function benchPlace(sh,el,x,y,rot){
  const o=orient(sh,rot), cells=o.cells.map(([cx,cy])=>[x+cx,y+cy]);
  if(!cellsFree(cells)||bfsPath(cells)===null) throw new Error('bench: illegal '+sh+'/'+el+' @'+x+','+y+' r'+(rot||0));
  const cost=SHAPES[sh].cost+ELEMS[el].cost;
  S.gold-=cost; placePiece(sh,el,cost,x,y,rot||0);
  if(S.gold<0) throw new Error('bench: gold<0 placing '+sh);
}
function pathAdjFree(){ // free cells adjacent to the current path, deterministic scan order
  const onPath=new Set(S.path.map(([x,y])=>x+','+y)), out=[];
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(S.grid[idx(x,y)]!==null) continue;
    if((x===SPAWN.x&&y===SPAWN.y)||(x===GOAL.x&&y===GOAL.y)) continue;
    for(const [dx,dy] of DIRS) if(onPath.has((x+dx)+','+(y+dy))){out.push([x,y]);break;}
  }
  return out;
}
function placeMonoPebble(elem){ // one P[elem] on the first free path-adjacent cell; null if broke/no room
  const cost=SHAPES.P.cost+ELEMS[elem].cost;
  if(S.gold<cost) return null;
  for(const [x,y] of pathAdjFree()){
    if(bfsPath([[x,y]])===null) continue;
    S.gold-=cost; return placePiece('P',elem,cost,x,y,0);
  }
  return null;
}
function pebbleToTierCost(elem,tier){ // total upgrade gold to lift a P[elem] from tier 1 to `tier`
  const base=SHAPES.P.cost+ELEMS[elem].cost; let c=0;
  for(let t=1;t<tier;t++) c+=t===1?base:base*2;   // t2=base, t3=2x base
  return c;
}
function reinvestSpend(){ // spend current gold, cycling frost/volt/fire, until no element fits
  let ci=0, misses=0;
  while(misses<3){ if(placeMonoPebble(['frost','volt','fire'][ci%3])) misses=0; else misses++; ci++; }
}
// spec -> {entries, fill?:{elem,n,tier?}, reinvest?}. fill = greedy path-adjacent P pebbles,
// optionally upgraded to `tier`. mazeUpgraded (2 tier-3) & mazeSprawl (8 tier-1) cost the same 104g.
function benchSpec(name){
  if(name==='open'||name==='maze') return {entries:BUILDS[name]};
  if(name==='mazeReinvest') return {entries:BUILDS.maze, reinvest:true};
  if(name==='mazeFrost') return {entries:mazeWalls(), fill:{elem:'frost',n:MONO_N.frost}};
  if(name==='mazeVolt')  return {entries:mazeWalls(), fill:{elem:'volt', n:MONO_N.volt}};
  if(name==='mazeFire')  return {entries:mazeWalls(), fill:{elem:'fire', n:MONO_N.fire}};
  if(name==='mazeUpgraded') return {entries:mazeWalls(), fill:{elem:'frost',n:2,tier:3}}; // 2*(13+39)=104
  if(name==='mazeSprawl')   return {entries:mazeWalls(), fill:{elem:'frost',n:8}};         // 8*13=104
  throw new Error('bench: unknown build '+name);
}
function runBench(name){
  const spec=benchSpec(name);
  S=newState(); placeCache=null;
  const wallCost=buildCost(spec.entries);
  let fillCost=0;
  if(spec.fill){
    const pebble=SHAPES.P.cost+ELEMS[spec.fill.elem].cost;
    fillCost=spec.fill.n*(pebble+(spec.fill.tier?pebbleToTierCost(spec.fill.elem,spec.fill.tier):0));
  }
  S.gold=wallCost+fillCost;
  for(const [sh,el,x,y,rot] of spec.entries) benchPlace(sh,el,x,y,rot);
  if(spec.fill){
    for(let i=0;i<spec.fill.n;i++){
      const b=placeMonoPebble(spec.fill.elem);
      if(!b) throw new Error('bench: no room for fill '+name+' #'+i);
      if(spec.fill.tier) while(b.tier<spec.fill.tier) upgradeBlock(b.id);
    }
  }
  refreshPath();
  const path=S.path.length;
  if(name==='open' && path>14) throw new Error('bench: open path too long ('+path+') - constants drifted');
  if(name.startsWith('maze') && path<26) throw new Error('bench: maze path too short ('+path+') - constants drifted');
  if(spec.fill) S.gold=0; // spent to build; no reinvestment
  let guard=0;
  while(S.phase!=='over' && guard++<5000){
    if(S.phase==='build'){ if(spec.reinvest) reinvestSpend(); startWave(); if(S.phase!=='wave') break; }
    for(let i=0;i<18000 && S.phase==='wave';i++) simTick(STEP);
  }
  const won=S.wave>=N_WAVES;
  return {died:won?N_WAVES+1:S.wave+1, won, path, spent:wallCost+fillCost, kills:S.kills};
}
const BENCH_NAMES=['open','maze','mazeReinvest','mazeFrost','mazeVolt','mazeFire','mazeUpgraded','mazeSprawl'];

/* ---------------- debug hook ---------------- */
window.__dbg={
  get s(){return S;},
  place(shape,elem,x,y,rot){placePiece(shape,elem,0,x,y,rot||0);syncUI();return S.grid[idx(x,y)];},
  upgrade(id){upgradeBlock(id);},
  spec(id,key){chooseSpec(id,key);},
  gold(n){S.gold=n;syncUI();},
  go(){startWave();},
  tick(sec){for(let i=0;i<sec*60&&S.phase==='wave';i++)simTick(STEP);syncUI();},
  frame(dt){stepSim(dt);},   // drive the real accumulator (exercises S.speed) - unlike tick()
  aimCheck(){ // every non-P shape, every rot: coverage must be nonempty and never hit its own cells
    const fails=[];
    for(const shape of Object.keys(SHAPES)){
      if(shape==='P') continue;
      for(let rot=0;rot<4;rot++){
        S=newState();
        placePiece(shape,'frost',0,2,4,rot);
        const b=[...S.blocks.values()][0], own=new Set(b.cells.map(([x,y])=>x+','+y));
        if(b.kind==='lane'||b.kind==='cone'){
          if(!b.coverage.length){fails.push(shape+' r'+rot+': empty coverage');continue;}
          if(b.coverage.some(([x,y])=>own.has(x+','+y))) fails.push(shape+' r'+rot+': covers own cell');
        }else if(!(b.radius>0)) fails.push(shape+' r'+rot+': no radius');
      }
    }
    S=newState(); placeCache=null; refreshPath(); syncUI();
    return fails;
  },
  waveSafe, legalPositions, orient,
  builds:BUILDS,
  bench:runBench,
  benchAll(){
    const rows={};
    for(const n of BENCH_NAMES) rows[n]=runBench(n);
    const R=n=>rows[n].died, mono=['mazeFrost','mazeVolt','mazeFire'].map(R);
    const inv={
      I1_mazePremium: R('maze')-R('open')>=4,                       // maze beats open by >=4 waves
      I2_anchor:      R('maze')>=10 && R('maze')<=14,               // maze falls wave 10-14
      I3_winnable:    rows.mazeReinvest.won || R('mazeReinvest')>=18,// reinvest reaches wave 18+
      I4_noDeadElem:  mono.every(x=>x>=8) && mono.every(x=>x-R('maze')<=2),
      I5_neitherDom:  Math.abs(R('mazeUpgraded')-R('mazeSprawl'))<=2, // 2 tier-3 ~= 8 tier-1, same spend
    };
    console.table(rows); console.table(inv);
    S=newState(); placeCache=null; refreshPath(); syncUI();
    return {rows, inv};
  },
};

/* ---------------- boot ---------------- */
S=newState();
resize(); refreshPath(); syncUI();
requestAnimationFrame(frame);
</script>
