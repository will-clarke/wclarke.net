<script>
  (function(){try{
    var t=localStorage.getItem('theme');
    if(t!=='light'&&t!=='dark'){
      t=(window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';
    }
    document.documentElement.setAttribute('data-theme',t);
  }catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
</script>

<style>

  }
  :root[data-theme="light"]{
    --bg:#eef1f6; --bg2:#e4e9f2; --panel:#ffffff; --raised:#f2f5fa;
    --ink:#182234; --muted:#5c6b80; --line:#d0d9e6; --track:#a7b4c9; --rock:#c9d2e0;

  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
       font:16px/1.45 system-ui,-apple-system,sans-serif;overscroll-behavior:none;

<script>
/* ===== KERNEL (extracted verbatim by harness.mjs - keep self-contained) ===== */
const TK = (() => {
  'use strict';
  const DX = { N: 0, E: 1, S: 0, W: -1 };
  const DY = { N: -1, E: 0, S: 1, W: 0 };
  const OPP = { N: 'S', S: 'N', E: 'W', W: 'E' };
  const ORD = { N: 0, E: 1, S: 2, W: 3 };
  const seg = (a, b) => ORD[a] < ORD[b] ? a + b : b + a;
  const MIXBASE = { br: 'p', ry: 'o', by: 'g' };
  const mix = (a, b) => a === b ? a : (MIXBASE[[a, b].sort().join('')] || 'n');
  const key = (x, y) => x + ',' + y;

  function parse(def) {
    const H = def.map.length, W = Math.max(...def.map.map(r => r.length));
    const at = {};
    for (const th of def.things) at[key(th.x, th.y)] = th;
    const lv = {
      def, W, H, budget: def.budget, at: (x, y) => at[key(x, y)] || null,
      ter(x, y) {
        if (x < 0 || y < 0 || x >= W || y >= H) return ' ';
        return (def.map[y] || '')[x] || ' ';
      },
      things: def.things,
      entries: def.things.filter(t => t.k === 'entry'),
      exits: def.things.filter(t => t.k === 'exit').map(t => ({ ...t, key: key(t.x, t.y) })),
    };
    lv.fixed = (x, y) => {
      const th = lv.at(x, y);
      return th && (th.k === 'entry' || th.k === 'exit' || th.k === 'fork' || th.k === 'join');
    };
    lv.canPaint = (x, y) => lv.ter(x, y) === '.' && !lv.fixed(x, y);
    return lv;
  }

  function validate(lv) {
    const errs = [];
    for (const th of lv.things) {
      if (lv.ter(th.x, th.y) !== '.') errs.push(`${th.k} at ${th.x},${th.y} off '.' terrain`);
      if (th.k === 'fork') {
        const m = mix(th.outs[0][1], th.outs[1][1]);
        if (m === 'n') errs.push(`fork at ${th.x},${th.y} outs don't mix`);
      }
    }
    if (!lv.entries.length) errs.push('no entries');
    if (!lv.exits.length) errs.push('no exits');
    if (!lv.budget) errs.push('no budget');
    return errs;
  }

  // ---- paint -----------------------------------------------------------------
  const cost = track => Object.values(track).reduce((n, s) => n + s.length, 0);
  const cloneTrack = track => { const t = {}; for (const k in track) t[k] = track[k].slice(); return t; };

  function addSeg(lv, track, x, y, sg, budget) {
    if (!lv.canPaint(x, y)) return false;
    const k = key(x, y), cur = track[k] || [];
    if (cur.includes(sg)) return true;
    let next;
    if (cur.length === 1 && ((cur[0] === 'NS' && sg === 'EW') || (cur[0] === 'EW' && sg === 'NS')))
      next = [cur[0], sg];
    else next = [sg];
    if (budget != null && cost(track) - cur.length + next.length > budget) return false;
    track[k] = next;
    return true;
  }

  const dirTo = (c, o) => o.x < c.x ? 'W' : o.x > c.x ? 'E' : o.y < c.y ? 'N' : 'S';

  // cells: [{x,y}] consecutive 4-adjacent. Returns true iff nothing was rejected.
  function stroke(lv, track, cells, budget) {
    let ok = true;
    for (let i = 0; i < cells.length; i++) {
      const c = cells[i], prev = cells[i - 1], next = cells[i + 1];
      if (!lv.canPaint(c.x, c.y)) continue;
      let a, b;
      if (prev && next) {
        a = dirTo(c, prev); b = dirTo(c, next);
        if (a === b) continue;
      } else if (prev || next) {
        if ((track[key(c.x, c.y)] || []).length) continue;  // resume: leave alone
        b = dirTo(c, prev || next); a = OPP[b];
      } else continue;
      if (!addSeg(lv, track, c.x, c.y, seg(a, b), budget)) ok = false;
    }
    return ok;
  }

  const parseStroke = s => s.trim().split(/\s+/).map(p => {
    const [x, y] = p.split(',').map(Number); return { x, y };
  });

  function paintSol(lv) {
    const track = {};
    for (const s of lv.def.sol || []) stroke(lv, track, parseStroke(s), null);
    return track;
  }

  // ---- simulation --------------------------------------------------------------
  function initWorld(lv, track) {
    return { tick: 0, trains: [], nid: 1, taken: {}, done: {}, status: 'running',
             seen: new Set(), failAt: null, track };
  }

  function accepts(lv, track, x, y, inPort) {
    if (lv.ter(x, y) !== '.') return false;
    const th = lv.at(x, y);
    if (th) {
      if (th.k === 'entry') return false;
      if (th.k === 'exit') return inPort === th.p;
      if (th.k === 'fork') return inPort === th.in;
      if (th.k === 'join') return th.ins.includes(inPort);
    }
    return (track[key(x, y)] || []).some(s => s.includes(inPort));
  }

  function step(lv, w, ev) {
    ev = ev || [];
    if (w.status !== 'running') return w.status;
    const track = w.track;
    const fail = (st, x, y) => { w.status = st; w.failAt = x != null ? { x, y } : null;
                                 ev.push({ t: st, x, y }); return st; };
    // 1. spawns
    const born = new Set();
    for (const en of lv.entries) {
      if ((en.t0 || 0) !== w.tick) continue;
      if (w.trains.some(t => t.alive && t.x === en.x && t.y === en.y))
        return fail('crash', en.x, en.y);
      const tr = { id: w.nid++, x: en.x, y: en.y, in: null, c: en.c, man: [],
                   pend: en.p, wait: false, alive: true, exited: false };
      w.trains.push(tr); born.add(tr.id);
      ev.push({ t: 'spawn', id: tr.id, x: en.x, y: en.y });
    }
    // 2. compute moves
    const moves = [];
    for (const t of w.trains) {
      if (!t.alive || t.wait || t.exited || born.has(t.id)) continue;
      let ex = t.pend;
      if (!ex) {
        const s = (track[key(t.x, t.y)] || []).find(s => s.includes(t.in));
        if (!s) return fail('derail', t.x, t.y);
        ex = s[0] === t.in ? s[1] : s[0];
      }
      const nx = t.x + DX[ex], ny = t.y + DY[ex];
      if (!accepts(lv, track, nx, ny, OPP[ex])) return fail('derail', t.x, t.y);
      moves.push({ t, ex, nx, ny });
    }
    // 3. conflicts
    for (let i = 0; i < moves.length; i++) for (let j = i + 1; j < moves.length; j++) {
      const a = moves[i], b = moves[j];
      if (a.nx === b.nx && a.ny === b.ny) {
        const th = lv.at(a.nx, a.ny);
        if (!(th && th.k === 'join' && OPP[a.ex] !== OPP[b.ex]))
          return fail('crash', a.nx, a.ny);
      }
      if (a.nx === b.t.x && a.ny === b.t.y && b.nx === a.t.x && b.ny === a.t.y &&
          a.ex === OPP[b.ex])
        return fail('crash', a.nx, a.ny);
    }
    for (const m of moves) {
      const st = w.trains.find(t => t.alive && !t.exited && t !== m.t &&
        !moves.some(o => o.t === t) && t.x === m.nx && t.y === m.ny);
      if (st) {
        const th = lv.at(m.nx, m.ny);
        if (!(th && th.k === 'join' && st.wait && st.in !== OPP[m.ex]))
          return fail('crash', m.nx, m.ny);
      }
    }
    // 4. apply
    const movedNow = new Set();
    for (const m of moves) {
      ev.push({ t: 'move', id: m.t.id, fx: m.t.x, fy: m.t.y, x: m.nx, y: m.ny });
      m.t.x = m.nx; m.t.y = m.ny; m.t.in = OPP[m.ex]; m.t.pend = null;
      movedNow.add(m.t.id);
    }
    // 5. arrivals
    for (const m of moves) {
      const t = m.t;
      if (!t.alive || t.exited) continue;
      const th = lv.at(t.x, t.y), k = key(t.x, t.y);
      if (!th) continue;
      if (th.k === 'ball') {
        if (!w.taken[k]) { w.taken[k] = 1; t.man.push(th.c);
                           ev.push({ t: 'pickup', x: t.x, y: t.y, c: th.c }); }
      } else if (th.k === 'gate') {
        const i = t.man.lastIndexOf(th.c);
        if (i < 0) return fail('locked', t.x, t.y);
        t.man.splice(i, 1);
        ev.push({ t: 'consume', x: t.x, y: t.y, c: th.c });
      } else if (th.k === 'exit') {
        if (w.done[k] || t.c !== th.c) return fail('wrongStation', t.x, t.y);
        if (th.want && t.man.join() !== th.want.join()) return fail('wrongCargo', t.x, t.y);
        if (!th.want && t.man.length) return fail('wrongCargo', t.x, t.y);
        t.alive = false; t.exited = true; w.done[k] = 1;
        ev.push({ t: 'arrive', x: t.x, y: t.y, c: th.c });
      } else if (th.k === 'fork') {
        const [[p1, c1], [p2, c2]] = th.outs;
        if (mix(c1, c2) !== t.c) return fail('jam', t.x, t.y);
        t.c = c1; t.pend = p1;
        w.trains.push({ id: w.nid++, x: t.x, y: t.y, in: t.in, c: c2, man: [],
                        pend: p2, wait: false, alive: true, exited: false });
        ev.push({ t: 'split', x: t.x, y: t.y });
      } else if (th.k === 'join') {
        const other = w.trains.find(o => o !== t && o.alive && o.wait &&
                                    o.x === t.x && o.y === t.y);
        if (other) {
          if (other.in === t.in) return fail('crash', t.x, t.y);
          let wtr = other, arr = t;
          if (movedNow.has(other.id) && t.in === th.ins[0]) { wtr = t; arr = other; }
          wtr.c = mix(wtr.c, arr.c);
          wtr.man = wtr.man.concat(arr.man);
          wtr.wait = false; wtr.pend = th.out;
          arr.alive = false;
          ev.push({ t: 'merge', x: t.x, y: t.y, id: wtr.id, gone: arr.id });
        } else { t.wait = true; ev.push({ t: 'wait', id: t.id }); }
      }
    }
    // 6. end checks
    w.tick++;
    const alive = w.trains.filter(t => t.alive);
    const pending = lv.entries.some(en => (en.t0 || 0) >= w.tick);
    const allDone = lv.exits.every(x => w.done[x.key]);
    if (allDone && !alive.length && !pending) { w.status = 'win'; return 'win'; }
    if (!pending && (!alive.length || alive.every(t => t.wait)))
      return fail('lost', null, null);
    const h = w.tick > Math.max(0, ...lv.entries.map(e => e.t0 || 0)) ? 'T' : w.tick;
    const state = h + '|' + w.trains.filter(t => t.alive).map(t =>
      [t.id, t.x, t.y, t.in, t.c, t.man.join(''), t.wait ? 1 : 0, t.pend || ''].join(':')
    ).join(';') + '|' + Object.keys(w.taken).join(',') + '|' + Object.keys(w.done).join(',');
    if (w.seen.has(state) || w.tick > 500) return fail('loop', null, null);
    w.seen.add(state);
    return 'running';
  }

  function run(lv, track) {
    const w = initWorld(lv, track);
    while (w.status === 'running') step(lv, w);
    return { status: w.status, ticks: w.tick, world: w };
  }

  return { DX, DY, OPP, seg, mix, key, parse, validate, cost, cloneTrack, addSeg,
           dirTo, stroke, parseStroke, paintSol, initWorld, accepts, step, run };
})();
/* ===== END KERNEL ===== */

/* ===== LEVELS (extracted verbatim by harness.mjs) ===== */
const LEVELS = [

    map: [
      '.....',

    ],
    things: [
      { k: 'entry', x: 0, y: 2, p: 'E', c: 'r', t0: 0 },

    ],
    sol: ['0,2 1,2 1,1 2,1 3,1 3,2 4,2'],
  },

    map: [

  ctx.strokeStyle = color; ctx.lineWidth = w; ctx.lineCap = 'round';

function roundRect(x, y, w, h, r) {

function drawBoard(now) {

  for (let y = 0; y < lv.H; y++) for (let x = 0; x < lv.W; x++) {
    const t = lv.ter(x, y);
    const [cx, cy] = px(x, y);

      ctx.fill();

      ctx.stroke(); ctx.globalAlpha = 1;

      ctx.beginPath(); ctx.arc(cx, cy, 1.6, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;

      const d = tr.length ? tr[0].d + Math.hypot(cx - tr[0].x, cy - tr[0].y) : 0;

function startRun(pause) {

  tickStart = performance.now(); tickDur = 1;

}

  world = null; phase = 'edit'; paused = false;

}
function doTick(now) {
  const ev = [];

  anims.clear();
  const P = COL();
  for (const e of ev) {
    if (e.t === 'move') anims.set(e.id, { fx: e.fx, fy: e.fy, tx: e.x, ty: e.y });
    else if (e.t === 'pickup' || e.t === 'consume' || e.t === 'arrive')
      effects.push({ x: e.x, y: e.y, t0: now, kind: 'ring', color: P.c[e.c] });
    else if (e.t === 'split' || e.t === 'merge')
      effects.push({ x: e.x, y: e.y, t0: now, kind: 'ring' });
    else if (e.t === 'crash' || e.t === 'derail' || e.t === 'locked' || e.t === 'jam' ||
             e.t === 'wrongStation' || e.t === 'wrongCargo') {

  phase = 'done';
  hap(status === 'win' ? [15, 30, 15, 30, 50] : [60, 40, 60]);
  const b = $('banner');
  if (status === 'win') {
    const pieces = TK.cost(track);
    const best = solves[def.id] ? Math.min(solves[def.id].pieces, pieces) : pieces;
    solves[def.id] = { pieces: best };
    store.save(solves);
    const i = LEVELS.indexOf(def), next = LEVELS[i + 1];
    b.innerHTML = `<h3>Right on time ✨</h3>
      <p>${pieces} pieces of a ${lv.budget}-piece budget.</p>
      <div class="row">
        <button class="ghostb" id="bAgain">Replay</button>
        <button id="bNext">${next ? 'Next ›' : 'Atlas'}</button>
      </div>`;
    b.hidden = false;
    $('bNext').onclick = () => next ? openLevel(next) : goAtlas();
    $('bAgain').onclick = () => { b.hidden = true; world = null; phase = 'edit'; hud(); };
  } else {
    const [h, p] = FAILS[status] || [status, ''];
    b.innerHTML = `<h3>${h}</h3><p>${p}</p>
      <div class="row"><button id="bRetry">Back to the drawing board</button></div>`;
    b.hidden = false;
    $('bRetry').onclick = () => { b.hidden = true; world = null; phase = 'edit'; hud(); };
  }
  pendingEnd = null; hud();
}
function goAtlas() {
  cancelAnimationFrame(rafId);
  world = null; def = null;
  $('play').hidden = true; $('atlas').hidden = false;
  buildAtlas();
}

// ---- paint input -------------------------------------------------------------
let strokeCells = null, strokeBase = null, gestureStrokes = null, buzzedAt = 0;

function cellAt(e) {
  const r = cv.getBoundingClientRect();
  const x = Math.floor((e.clientX - r.left) / cell);
  const y = Math.floor((e.clientY - r.top) / cell);
  if (x < 0 || y < 0 || x >= lv.W || y >= lv.H) return null;
  return { x, y };
}
function applyGesture() {
  const t = TK.cloneTrack(strokeBase);
  let ok = true;
  for (const s of gestureStrokes) if (!TK.stroke(lv, t, s, lv.budget)) ok = false;
  if (!TK.stroke(lv, t, strokeCells, lv.budget)) ok = false;
  track = t;
  if (!ok && performance.now() - buzzedAt > 350) {
    buzzedAt = performance.now();
    const last = strokeCells[strokeCells.length - 1];
    effects.push({ x: last.x, y: last.y, t0: buzzedAt, kind: 'buzz' });
    hap(30);
  }
  hud();
}
cv.addEventListener('pointerdown', e => {
  if (!lv) return;
  cv.setPointerCapture(e.pointerId);
  if (phase !== 'edit') {
    const c = cellAt(e);
    if (c) effects.push({ x: c.x, y: c.y, t0: performance.now(), kind: 'buzz' });
    return;
  }
  const c = cellAt(e);
  if (!c) return;
  strokeCells = [c]; strokeBase = TK.cloneTrack(track); gestureStrokes = [];
});
cv.addEventListener('pointermove', e => {
  if (!strokeCells || phase !== 'edit') return;
  const c = cellAt(e);
  if (!c) return;
  let last = strokeCells[strokeCells.length - 1];
  if (c.x === last.x && c.y === last.y) return;
  // walk one 4-step at a time toward c
  let guard = 0;
  while ((last.x !== c.x || last.y !== c.y) && guard++ < 24) {
    const dx = c.x - last.x, dy = c.y - last.y;
    const stepc = Math.abs(dx) >= Math.abs(dy)
      ? { x: last.x + Math.sign(dx), y: last.y }
      : { x: last.x, y: last.y + Math.sign(dy) };
    const prev = strokeCells[strokeCells.length - 2];
    if (prev && prev.x === stepc.x && prev.y === stepc.y) strokeCells.pop();  // backtrack
    else strokeCells.push(stepc);
    last = strokeCells[strokeCells.length - 1] || stepc;
    if (!strokeCells.length) strokeCells = [stepc];
    if (lv.fixed(stepc.x, stepc.y) && strokeCells.length > 1) {
      gestureStrokes.push(strokeCells);
      strokeCells = [stepc];
    }
  }
  applyGesture();
});
function endStroke(e) {
  if (!strokeCells) return;
  if (phase === 'edit') {
    const moved = gestureStrokes.length > 0 || strokeCells.length > 1;
    if (!moved) {
      const c = strokeCells[0], k = TK.key(c.x, c.y);
      if ((strokeBase[k] || []).length) {
        track = TK.cloneTrack(strokeBase);
        delete track[k];
        effects.push({ x: c.x, y: c.y, t0: performance.now(), kind: 'ring' });
        hap(12);
      }
    } else { applyGesture(); hap(8); }
    hud();
  }
  strokeCells = null; strokeBase = null; gestureStrokes = null;
}
cv.addEventListener('pointerup', endStroke);
cv.addEventListener('pointercancel', endStroke);

// ---- buttons -------------------------------------------------------------------
$('go').onclick = () => {
  if (phase === 'done') { $('banner').hidden = true; world = null; phase = 'edit'; hud(); return; }
  if (phase === 'run') {
    if (paused) { paused = false; tickStart = 0; hud(); }
    else stopRun();
    return;
  }
  startRun(false);
};
$('stepb').onclick = () => {
  if (phase === 'done') return;
  if (phase === 'edit') { startRun(true); doTick(performance.now()); return; }
  paused = true; hud();
  if (!pendingEnd) doTick(performance.now());
  else finish(pendingEnd.status);
};
$('clearb').onclick = () => {
  if (phase !== 'edit') return;
  track = {}; hud();
};
$('speed').onclick = () => {
  speed = speed === 1 ? 3 : 1;
  $('speed').textContent = speed + '×';
};
$('back').onclick = goAtlas;

buildAtlas();
})();
</script>
</body>
</html>
