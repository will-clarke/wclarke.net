<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="color-scheme" content="light dark" />
<script>
  (function(){try{
    var t=localStorage.getItem('theme');
    if(t!=='light'&&t!=='dark'){
      t=(window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';
    }
    document.documentElement.setAttribute('data-theme',t);
  }catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
</script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23171b23'/%3E%3Ctext x='16' y='22' font-family='system-ui,sans-serif' font-size='19' font-weight='700' text-anchor='middle' fill='%23ff7ac2'%3EA%3C/text%3E%3C/svg%3E" />
<title>Autobiography</title>
<style>
  :root{
    --accent:#ff7ac2;
    --on-accent:#0e1116;   /* text/ink shown ON top of an accent fill */
    --a:#3ad9ff;            /* stamp A / self */
    --b:#ff7ac2;            /* stamp B */
    --ok:#5cffb0;
  }
  :root[data-theme="dark"]{
    --bg:#171b23; --bg-top:#212734;
    --surface:#232a38; --raised:#2b3342;
    --cell:#1e2531;
    --ink:#eaeef6; --muted:#a2adc0;
    --line:rgba(255,255,255,.14); --line-strong:rgba(255,255,255,.26);
    --shadow:rgba(0,0,0,.45);
  }
  :root[data-theme="light"]{
    --bg:#eef1f7; --bg-top:#ffffff;
    --surface:#ffffff; --raised:#f3f6fb;
    --cell:#f6f8fc;
    --ink:#1b2431; --muted:#5a6575;
    --line:rgba(22,30,48,.15); --line-strong:rgba(22,30,48,.28);
    --shadow:rgba(30,40,70,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 120% at 50% 0%, var(--bg-top) 0%, var(--bg) 62%);
    color:var(--ink);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;padding:60px 12px 40px;gap:13px;
    touch-action:manipulation;
  }

  .topbar{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;
    justify-content:space-between;padding:12px 14px;pointer-events:none}
  .topbar .navbtn{pointer-events:auto}
  .navbtn{display:inline-flex;align-items:center;justify-content:center;
    width:40px;height:40px;padding:0;border-radius:11px;
    background:var(--surface);border:1px solid var(--line);color:var(--ink);
    font-size:18px;line-height:1;cursor:pointer;text-decoration:none;
    box-shadow:0 2px 10px var(--shadow);transition:transform .15s,border-color .15s,background .15s}
  .navbtn:hover{border-color:var(--line-strong);transform:translateY(-1px)}
  .navbtn:active{transform:translateY(0)}
  h1{margin:2px 0 0;font-weight:700;letter-spacing:.22em;font-size:16px;text-transform:uppercase;text-align:center}
  h1 b{color:var(--a);text-shadow:0 0 18px var(--a);font-weight:700}
  .sub{opacity:.5;font-size:12px;letter-spacing:.04em;margin-top:-6px;text-align:center;max-width:440px}

  .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;gap:13px}

  /* level bar */
  .levelbar{display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:34px;flex-wrap:wrap}
  .levelbar .name{font-weight:600;letter-spacing:.04em}
  .levelbar .name small{opacity:.5;font-weight:400;margin-right:6px;letter-spacing:.1em}
  .nav{display:flex;gap:6px}
  button.nb{
    background:var(--surface);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:6px 11px;font-size:14px;cursor:pointer;transition:.15s;white-space:nowrap;
  }
  button.nb:hover{background:var(--raised);border-color:var(--line-strong);color:var(--ink)}
  button.nb:disabled{opacity:.3;cursor:default}
  [hidden]{display:none!important}

  /* dots */
  .dots{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
  .dot{
    width:9px;height:9px;border-radius:50%;cursor:pointer;
    background:var(--line-strong);transition:.15s;
  }
  .dot:hover{background:var(--muted)}
  .dot.solved{background:var(--ok);box-shadow:0 0 8px -1px var(--ok)}
  .dot.cur{transform:scale(1.5);background:var(--a);box-shadow:0 0 9px -1px var(--a)}

  /* pictures */
  .pics{display:flex;gap:12px}
  .pic{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
  .pic .cap{font-size:10px;letter-spacing:.18em;text-transform:uppercase;opacity:.5;text-align:center}
  .frame{
    position:relative;border-radius:14px;overflow:hidden;
    background:var(--raised);border:1px solid var(--line);
    box-shadow:0 16px 46px -22px var(--shadow), inset 0 0 0 1px var(--line);
    aspect-ratio:1;transition:box-shadow .3s,border-color .3s;
  }
  .frame canvas{width:100%;height:100%;display:block}
  .frame.yours.win{border-color:var(--ok);box-shadow:0 0 40px -6px var(--ok), inset 0 0 0 1px rgba(92,255,176,.3)}
  .frame.pop{animation:pop .55s ease}
  @keyframes pop{0%{transform:scale(1)}28%{transform:scale(1.035)}100%{transform:scale(1)}}
  .badge{
    position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:13px;z-index:3;
    background:var(--ok);color:#04120b;font-weight:700;opacity:0;transform:scale(.4);
    transition:.28s cubic-bezier(.3,1.6,.5,1);
  }
  .frame.win .badge{opacity:1;transform:scale(1)}
  .burst{position:absolute;left:50%;top:50%;pointer-events:none;z-index:2}
  .burst.go::after{
    content:"";position:absolute;left:0;top:0;width:14px;height:14px;border-radius:50%;
    transform:translate(-50%,-50%);box-shadow:0 0 0 2.5px var(--ok);
    animation:ring .72s cubic-bezier(.2,.7,.3,1) forwards;
  }
  @keyframes ring{from{width:14px;height:14px;opacity:.85}to{width:150%;height:150%;opacity:0}}

  /* sandbox: one big canvas, no target */
  body.sand #targetPic{display:none}
  body.sand #yoursPic .cap{visibility:hidden}
  body.sand .badge,body.sand #winMsg{display:none}

  /* editors */
  .editwrap{display:flex;flex-direction:column;gap:10px;align-items:center}

  /* brush tray (also the legend) */
  .tray{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .chip{
    display:inline-flex;align-items:center;gap:7px;padding:7px 12px;
    border-radius:11px;background:var(--surface);border:1px solid var(--line);
    color:var(--ink);font-size:13px;cursor:pointer;transition:.14s;
  }
  .chip:hover{border-color:var(--line-strong);background:var(--raised)}
  .chip.armed{border-color:var(--a);box-shadow:0 0 0 1px var(--a),0 0 14px -6px var(--a)}
  .csw{width:16px;height:16px;border-radius:5px;flex:none;border:1px solid var(--line)}
  .csw.erase{background:var(--cell);border-style:dashed;border-color:var(--line-strong)}
  .csw.ink{background:var(--ink);border-color:var(--ink)}
  .csw.a{box-shadow:inset 0 0 0 2px var(--a)}
  .csw.b{box-shadow:inset 0 0 0 2px var(--b)}

  .editors{display:flex;gap:16px;justify-content:center}
  .editor{display:flex;flex-direction:column;gap:6px;align-items:center}
  .editor .elab{font-size:10px;letter-spacing:.16em;text-transform:uppercase;opacity:.65}
  .editor .elab.a{color:var(--a)}
  .editor .elab.b{color:var(--b)}
  .grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:5px;
    padding:7px;border-radius:14px;background:var(--surface);border:1px solid var(--line);
    touch-action:none;
  }
  .grid.two{grid-template-columns:repeat(2,1fr)}
  .cell{
    width:44px;height:44px;border-radius:8px;position:relative;cursor:pointer;
    background:var(--cell);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    transition:background .12s,border-color .12s,transform .06s;
  }
  .grid.two .cell{width:68px;height:68px}
  .cell:active{transform:scale(.92)}
  .cell.ink{background:var(--ink);border-color:var(--ink);box-shadow:0 0 12px -3px var(--ink)}
  .cell canvas{width:100%;height:100%;display:block;pointer-events:none}
  .cell .ring{position:absolute;inset:0;border-radius:8px;pointer-events:none}
  .cell.refa .ring{box-shadow:inset 0 0 0 2px var(--a),0 0 12px -4px var(--a)}
  .cell.refb .ring{box-shadow:inset 0 0 0 2px var(--b),0 0 12px -4px var(--b)}

  /* triangle editor */
  .trigrid{position:relative;width:162px;height:150px;background:var(--surface);
    border:1px solid var(--line);border-radius:14px;touch-action:none}
  .tcell{position:absolute;width:50%;height:50%;cursor:pointer}
  .tcell canvas{width:100%;height:100%;display:block;pointer-events:none}
  .tcell.k0{left:25%;top:0}
  .tcell.k1{left:0;top:50%}
  .tcell.k2{left:50%;top:50%}
  .tcell.k3{left:25%;top:50%}
  .tcell.k0,.tcell.k1,.tcell.k2{clip-path:polygon(50% 0,0 100%,100% 100%)}
  .tcell.k3{clip-path:polygon(0 0,100% 0,50% 100%)}
  .tcell:active{filter:brightness(1.25)}

  .hint{font-size:12.5px;opacity:.62;text-align:center;max-width:420px;min-height:34px;line-height:1.5}
  .hint b{color:var(--a);font-weight:600}
  .tapnote{font-size:11px;opacity:.4;text-align:center;max-width:420px}
  .par{font-size:12px;letter-spacing:.06em;opacity:.85;text-align:center}
  .par b{font-weight:600}
  .par .under{color:var(--ok)}
  .par .over{color:var(--b)}

  .win-msg{
    text-align:center;font-size:13px;letter-spacing:.05em;color:var(--ok);
    height:18px;opacity:0;transition:.3s;font-weight:600;
  }
  .win-msg.show{opacity:1}
</style>

<body>
  <div class="topbar">
    <a class="navbtn" href="../" aria-label="All games" title="All games">&#8592;</a>
    <button class="navbtn" id="themeToggle" type="button" aria-label="Toggle light or dark" title="Light / dark"></button>
  </div>
  <h1><b>A</b>utobiography</h1>
  <div class="sub">Design one tiny mark. It is made of itself. Match the fractal.</div>

  <div class="wrap">
    <div class="levelbar">
      <div class="name"><small id="lvnum">01</small><span id="lvname">Solid</span></div>
      <div class="nav" id="navPlay">
        <button class="nb" id="prev">‹</button>
        <button class="nb" id="reset">reset</button>
        <button class="nb" id="next">›</button>
        <button class="nb" id="toSand" title="Free play">✎</button>
        <button class="nb" id="toRandom" title="Random puzzle">⚄</button>
      </div>
      <div class="nav" id="navSand" hidden>
        <button class="nb" id="rand">⚄ random</button>
        <button class="nb" id="clear">clear</button>
        <button class="nb" id="exitSand">✕ exit</button>
      </div>
      <div class="nav" id="navRandom" hidden>
        <button class="nb" id="rnew">⚄ new</button>
        <button class="nb" id="rreset">reset</button>
        <button class="nb" id="rshare">⧉ link</button>
        <button class="nb" id="rexit">✕ exit</button>
      </div>
    </div>

    <div class="dots" id="dots"></div>

    <div class="pics">
      <div class="pic" id="targetPic">
        <div class="cap">Target</div>
        <div class="frame"><canvas id="target" width="486" height="486"></canvas></div>
      </div>
      <div class="pic" id="yoursPic">
        <div class="cap">Yours</div>
        <div class="frame yours" id="yoursFrame">
          <canvas id="yours" width="486" height="486"></canvas>
          <div class="burst" id="burst"></div>
          <div class="badge">✓</div>
        </div>
      </div>
    </div>

    <div class="win-msg" id="winMsg">solved</div>

    <div class="editwrap">
      <div class="tray" id="tray"></div>
      <div class="editors" id="editors"></div>
      <div class="hint" id="hint"></div>
      <div class="par" id="par" hidden></div>
      <div class="tapnote">tap to paint · drag to paint many · tap a placed self/A/B again to spin it ↻</div>
    </div>
  </div>

<script>
/* ---- cell values -------------------------------------------------
   0 empty · 1 ink · reference = (2=stamp A | 3=stamp B) + rot*4, rot 0..3
   A reference recurses into that stamp, drawn rotated by `rot` quarter-turns.
   Rotation propagates down the recursion, which is what unlocks
   dragon/pinwheel geometry a fixed axis-aligned grid can never reach.

   A stamp also has a geometry, shared by the whole fractal:
     sq3 - 3x3 square (9 cells, 4 rotations)   [the classic]
     sq2 - 2x2 square (4 cells, 4 rotations)   [advanced minimalism]
     tri - triangle   (4 cells, no rotation)   [orientation instead: the
           centre sub-triangle is inherently inverted, and that flip
           propagates - Sierpiński and friends live here]
------------------------------------------------------------------- */
const A=2, B=3;
const rot=(v,r)=> v>=2 ? ((v&3) + ((((v>>2)+r)&3)*4)) : v;   // spin a reference by r quarter-turns
const NCELLS={sq3:9, sq2:4, tri:4};
const BASE={sq3:3, sq2:2};
const GEOMNAME={sq3:'3×3', sq2:'2×2', tri:'triangle'};

const LEVELS=[
  { name:"Solid",
    hint:"Arm <b>ink</b> and fill all nine - a solid block.",
    stamps:[[1,1,1, 1,1,1, 1,1,1]] },

  { name:"Descent",
    hint:"Arm <b>self</b>: a cell becomes the whole mark again, shrunk. Three on the diagonal fall forever into a line.",
    stamps:[[A,0,0, 0,A,0, 0,0,A]] },

  { name:"Cantor Dust",
    hint:"Only the four corners recurse. Each corner holds four corners, holding four corners… a scattering of stars.",
    stamps:[[A,0,A, 0,0,0, A,0,A]] },

  { name:"The Cross",
    hint:"Self-cells in a plus. Each arm holds a smaller plus, holding smaller plusses…",
    stamps:[[0,A,0, A,A,A, 0,A,0]] },

  { name:"Saltire",
    hint:"The plus, turned forty-five degrees: an X of X's of X's.",
    stamps:[[A,0,A, 0,A,0, A,0,A]] },

  { name:"Diamond",
    hint:"A ring of self with a hollow centre and hollow corners. Lace all the way down.",
    stamps:[[0,A,0, A,0,A, 0,A,0]] },

  { name:"Triangle",
    hint:"The classic. No ink at all - pure recursion is enough to draw.",
    stamps:[[A,0,0, A,A,0, A,A,A]] },

  { name:"Carpet",
    hint:"Eight self-cells around a hole. Sierpiński's carpet.",
    stamps:[[A,A,A, A,0,A, A,A,A]] },

  { name:"Seeds",
    hint:"Now mix them: solid <b>ink</b> in the middle, <b>self</b> in the corners. A seed inside a scatter of smaller seeds.",
    stamps:[[A,0,A, 0,1,0, A,0,A]] },

  { name:"Ink & Echo",
    hint:"Solid corners; the centre keeps echoing the whole pattern inward.",
    stamps:[[1,0,1, 0,A,0, 1,0,1]] },

  { name:"Plus-Flower",
    hint:"A plus of self around a solid <b>ink</b> heart.",
    stamps:[[0,A,0, A,1,A, 0,A,0]] },

  { name:"Sprout",
    hint:"Asymmetry. Two arms reach up, one stem grows down - and each does it again.",
    stamps:[[A,0,A, 0,A,0, 0,A,0]] },

  { name:"Pinwheel",
    hint:"New trick: tap a placed <b>self</b> again to spin it a quarter-turn ↻. Four corners, each turned further than the last - a pinwheel of pinwheels.",
    stamps:[[rot(A,0),0,rot(A,1), 0,0,0, rot(A,3),0,rot(A,2)]] },

  { name:"Whirl",
    hint:"The diamond, set spinning. Each arm of <b>self</b> is turned to chase the next - lace that swirls as it falls.",
    stamps:[[0,rot(A,0),0, rot(A,3),0,rot(A,1), 0,rot(A,2),0]] },

  { name:"Two Minds",
    hint:"Now two stamps. A cell can hold <b>self</b>, or the <b>other</b> stamp. A is a cross of B; B is corners of A. They dream each other.",
    stamps:[[0,B,0, B,0,B, 0,B,0],
            [A,0,A, 0,0,0, A,0,A]] },

  { name:"Ouroboros",
    hint:"A holds four B-corners; B holds a cross of A. The scale alternates: corners, cross, corners, cross…",
    stamps:[[B,0,B, 0,0,0, B,0,B],
            [0,A,0, A,A,A, 0,A,0]] },

  { name:"Duet",
    hint:"A is an X of B; B is a plus of A. Every X is woven from plusses; every plus from X's.",
    stamps:[[B,0,B, 0,B,0, B,0,B],
            [0,A,0, A,A,A, 0,A,0]] },

  { name:"Scatter",
    hint:"A scatters four B's like dust; each B is a whole carpet of A. Carpets floating in the void.",
    stamps:[[B,0,B, 0,0,0, B,0,B],
            [A,A,A, A,0,A, A,A,A]] },

  { name:"Lattice",
    hint:"A is a diamond of B; B is corners of A. An endless woven grid.",
    stamps:[[0,B,0, B,0,B, 0,B,0],
            [B,0,B, 0,0,0, B,0,B]] },

  { name:"Quarters", geom:"sq2",
    hint:"A new world: the <b>two-by-two</b>. Four quadrants, still four rotations. Recurse three of them and leave one empty - a square Sierpiński.",
    stamps:[[A,A, A,0]] },

  { name:"Twist", geom:"sq2",
    hint:"Two quadrants on the diagonal, the lower one spun half a turn ↻. Minimal parts, restless motion.",
    stamps:[[A,0, 0,rot(A,2)]] },

  { name:"Sierpiński", geom:"tri",
    hint:"The <b>triangle</b> world. It splits into four - three upright, one inverted in the middle. Recurse the three corners for the oldest fractal of all. (No spin here; the middle flips on its own.)",
    stamps:[[A,A,A, 0]] },

  { name:"Steeple", geom:"tri",
    hint:"A solid <b>ink</b> steeple on top; the two lower corners fall into gaskets; the inverted middle stays hollow. Ink and recursion, sharing one triangle.",
    stamps:[[1,A,A, 0]] },
];

/* ---- rendering: the fixed point ---------------------------------- */
function drawStamp(ctx, stamps, geom, x, y, size, color){
  if(geom==='tri') drawTri(ctx, stamps, 0, x+size/2,y, x,y+size, x+size,y+size, color);
  else drawSq(ctx, stamps, 0, BASE[geom], x, y, size, color, 0);
}
function drawSq(ctx, stamps, id, base, x, y, size, color, r){
  if(size < 1.15){                       // pixel limit: recurse cell = a lit dot (IFS attractor)
    ctx.fillStyle=color; ctx.fillRect(x, y, Math.ceil(size), Math.ceil(size)); return;
  }
  const c=size/base, s=stamps[id];
  for(let k=0;k<base*base;k++){
    const v=s[k]; if(!v) continue;
    let i=(k/base)|0, j=k%base;
    for(let n=0;n<r;n++){ const ni=j, nj=base-1-i; i=ni; j=nj; }   // clockwise quarter-turns
    const sx=x+j*c, sy=y+i*c;
    if(v===1){ ctx.fillStyle=color; ctx.fillRect(sx, sy, c+0.6, c+0.6); }
    else drawSq(ctx, stamps, (v&3)-2, base, sx, sy, c, color, ((v>>2)+r)&3);
  }
}
function triPath(ctx, ax,ay,bx,by,cx,cy){ ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.lineTo(cx,cy); ctx.closePath(); }
function drawTri(ctx, stamps, id, ax,ay,bx,by,cx,cy, color){
  const e=Math.max(Math.hypot(bx-ax,by-ay), Math.hypot(cx-bx,cy-by), Math.hypot(ax-cx,ay-cy));
  if(e < 2){ ctx.fillStyle=color; triPath(ctx,ax,ay,bx,by,cx,cy); ctx.fill(); return; }
  const s=stamps[id];
  const px=(ax+bx)/2, py=(ay+by)/2, qx=(ax+cx)/2, qy=(ay+cy)/2, rx=(bx+cx)/2, ry=(by+cy)/2;
  const sub=[
    [ax,ay, px,py, qx,qy],   // 0 top     (upright, apex corner)
    [px,py, bx,by, rx,ry],   // 1 left     (upright)
    [qx,qy, rx,ry, cx,cy],   // 2 right    (upright)
    [rx,ry, qx,qy, px,py],   // 3 centre  (inverted - propagates)
  ];
  for(let k=0;k<4;k++){
    const v=s[k]; if(!v) continue;
    const t=sub[k];
    if(v===1){ ctx.fillStyle=color; triPath(ctx,t[0],t[1],t[2],t[3],t[4],t[5]); ctx.fill(); }
    else drawTri(ctx, stamps, (v&3)-2, t[0],t[1],t[2],t[3],t[4],t[5], color);
  }
}
function renderPic(canvas, stamps, geom){
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawStamp(ctx, stamps, geom, 0, 0, canvas.width, getCss('--ink'));
}

/* ---- fingerprint for win check (deterministic, integer-aligned) --- */
const CMP=document.createElement('canvas'); CMP.width=CMP.height=243;
const CMPX=CMP.getContext('2d',{willReadFrequently:true});
function fingerprint(stamps, geom){
  CMPX.fillStyle='#000'; CMPX.fillRect(0,0,243,243);
  drawStamp(CMPX, stamps, geom, 0, 0, 243, '#fff');
  return CMPX.getImageData(0,0,243,243).data;
}
function pixelDiff(a,b){ let d=0; for(let i=0;i<a.length;i+=4){ if(a[i]!==b[i]) d++; } return d; }

/* ---- state ------------------------------------------------------- */
let mode='play';          // 'play' | 'sand' | 'random'
let geom='sq3';           // geometry of the current stamps
let li=0;                 // level index
let stamps=[];            // player's working stamps
let baseline=[];          // starting state (blank) for reset
let targetStamps=[];      // what the target picture shows
let targetFP=null;
let curPar=0;
let armed=1;              // active brush value: 0 empty, 1 ink, 2 A/self, 3 B
let prevWin=false, advTimer=null;
let solved={};
try{ solved=JSON.parse(localStorage.getItem('auto-solved')||'{}'); }catch(e){}

const $=id=>document.getElementById(id);
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
const cellsUsed=()=> stamps.reduce((n,s)=>n+s.filter(v=>v!==0).length,0);
const parOf=st=> st.reduce((n,s)=>n+s.filter(v=>v!==0).length,0);

/* ---- dots -------------------------------------------------------- */
function buildDots(){
  const host=$('dots'); host.innerHTML='';
  LEVELS.forEach((L,i)=>{
    const d=document.createElement('div'); d.className='dot';
    if(solved[i]) d.classList.add('solved');
    d.title=L.name;
    d.onclick=()=>loadLevel(i);
    host.appendChild(d);
  });
}
function markDots(){
  [...$('dots').children].forEach((d,i)=>{
    d.classList.toggle('cur', mode==='play' && i===li);
    d.classList.toggle('solved', !!solved[i]);
  });
}

/* ---- level / mode entry ------------------------------------------ */
function setNav(m){
  $('navPlay').hidden  = m!=='play';
  $('navSand').hidden  = m!=='sand';
  $('navRandom').hidden= m!=='random';
  document.body.classList.toggle('sand', m==='sand');
}
function clearHash(){ try{ history.replaceState(null,'',location.pathname+location.search); }catch(e){ location.hash=''; } }

function loadLevel(i){
  clearTimeout(advTimer); advTimer=null; prevWin=false;
  if(mode==='random') clearHash();
  mode='play'; setNav('play');
  li=(i+LEVELS.length)%LEVELS.length;
  const L=LEVELS[li];
  geom=L.geom||'sq3';
  targetStamps=L.stamps;
  baseline = targetStamps.map(s=>s.map(_=>0));
  stamps = baseline.map(s=>s.slice());
  targetFP = fingerprint(targetStamps, geom);
  curPar = parOf(targetStamps);
  armed = (li===0)?1:2;
  renderPic($('target'), targetStamps, geom);

  $('lvnum').textContent=String(li+1).padStart(2,'0');
  $('lvname').textContent=L.name;
  $('hint').innerHTML=L.hint;
  $('par').hidden=false;
  $('prev').disabled = li===0;
  $('next').disabled = li===LEVELS.length-1;
  $('yoursFrame').classList.remove('win','pop');
  $('winMsg').classList.remove('show');

  buildTray(); buildEditors(); markDots(); update();
}

/* ---- brush tray -------------------------------------------------- */
function buildTray(){
  const host=$('tray'); host.innerHTML='';
  const multi = stamps.length>1;
  const chips=[{v:0,sw:'erase',label:'erase'},{v:1,sw:'ink',label:'ink'}];
  if(multi){ chips.push({v:2,sw:'a',label:'A'},{v:3,sw:'b',label:'B'}); }
  else chips.push({v:2,sw:'a',label:'self'});
  chips.forEach(c=>{
    const el=document.createElement('button');
    el.className='chip'; el.dataset.v=c.v;
    el.innerHTML='<span class="csw '+c.sw+'"></span>'+c.label;
    el.onclick=()=>{ armed=c.v; markChips(); };
    host.appendChild(el);
  });
  markChips();
}
function markChips(){
  [...$('tray').children].forEach(el=>el.classList.toggle('armed', +el.dataset.v===armed));
}

/* ---- editors ----------------------------------------------------- */
function buildEditors(){
  const host=$('editors'); host.innerHTML='';
  const multi = stamps.length>1;
  stamps.forEach((s,si)=>{
    const ed=document.createElement('div'); ed.className='editor';
    if(multi){
      const lab=document.createElement('div');
      lab.className='elab '+(si===0?'a':'b');
      lab.textContent=si===0?'Stamp A':'Stamp B';
      ed.appendChild(lab);
    }
    ed.appendChild(geom==='tri' ? buildTriGrid(si) : buildSqGrid(si, BASE[geom]));
    host.appendChild(ed);
  });
}
function buildSqGrid(si, base){
  const grid=document.createElement('div'); grid.className='grid'+(base===2?' two':'');
  for(let k=0;k<base*base;k++){
    const cell=document.createElement('div'); cell.className='cell';
    cell.dataset.si=si; cell.dataset.k=k;
    grid.appendChild(cell); bindCell(cell);
  }
  return grid;
}
function buildTriGrid(si){
  const g=document.createElement('div'); g.className='trigrid';
  for(let k=0;k<4;k++){
    const tc=document.createElement('div'); tc.className='tcell k'+k;
    tc.dataset.si=si; tc.dataset.k=k;
    g.appendChild(tc); bindCell(tc);
  }
  return g;
}

/* paint: tap arms-then-paints; tapping a placed reference again spins it
   (squares only - triangles carry orientation structurally, not by hand) */
let painting=false, lastKey=null;
function applyBrush(cell, allowSpin){
  const si=+cell.dataset.si, k=+cell.dataset.k, cur=stamps[si][k], b=armed;
  const canSpin = allowSpin && geom!=='tri' && b>=2 && cur>=2 && (cur&3)===(b&3);
  const nv = canSpin ? rot(cur,1) : b;
  if(nv!==stamps[si][k]){ stamps[si][k]=nv; update(); }
}
function cellFromPoint(x,y){ const el=document.elementFromPoint(x,y); return el?el.closest('.cell,.tcell'):null; }
function bindCell(cell){
  cell.addEventListener('pointerdown', e=>{
    e.preventDefault();
    painting=true; lastKey=cell.dataset.si+':'+cell.dataset.k;
    applyBrush(cell, true);
  });
  cell.addEventListener('contextmenu', e=>e.preventDefault());
}
document.addEventListener('pointermove', e=>{
  if(!painting) return;
  const cell=cellFromPoint(e.clientX,e.clientY); if(!cell) return;
  const key=cell.dataset.si+':'+cell.dataset.k;
  if(key!==lastKey){ lastKey=key; applyBrush(cell, false); }   // drag never spins
});
const endPaint=()=>{ painting=false; lastKey=null; };
document.addEventListener('pointerup', endPaint);
document.addEventListener('pointercancel', endPaint);

function paintSqCell(cell){
  const si=+cell.dataset.si, k=+cell.dataset.k, v=stamps[si][k];
  cell.className='cell'; cell.innerHTML='';
  if(v===1){ cell.classList.add('ink'); return; }
  if(v>=2){
    const refId=(v&3)-2, r=v>>2;
    cell.classList.add(refId===0?'refa':'refb');
    const cv=document.createElement('canvas'); cv.width=cv.height=84;
    cell.appendChild(cv);
    drawSq(cv.getContext('2d'), stamps, refId, BASE[geom], 0,0,84, getCss(refId===0?'--a':'--b'), r);
    const ring=document.createElement('div'); ring.className='ring'; cell.appendChild(ring);
  }
}
function paintTriCell(tc){
  const si=+tc.dataset.si, k=+tc.dataset.k, v=stamps[si][k], up=(k!==3);
  tc.innerHTML='';
  const w=tc.offsetWidth||81, h=tc.offsetHeight||75;
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  const ctx=cv.getContext('2d');
  const V = up ? [w/2,0, 0,h, w,h] : [0,0, w,0, w/2,h];   // upright vs inverted, inscribed in the box
  if(v===0){ ctx.fillStyle=getCss('--cell'); triPath(ctx,...V); ctx.fill(); }
  else if(v===1){ ctx.fillStyle=getCss('--ink'); triPath(ctx,...V); ctx.fill(); }
  else {
    const refId=(v&3)-2, col=getCss(refId===0?'--a':'--b');
    drawTri(ctx, stamps, refId, V[0],V[1],V[2],V[3],V[4],V[5], col);
    ctx.strokeStyle=col; ctx.lineWidth=2; triPath(ctx,...V); ctx.stroke();
  }
  ctx.strokeStyle=getCss('--surface'); ctx.lineWidth=3; ctx.lineJoin='round';
  triPath(ctx,...V); ctx.stroke();                       // carve a gap between the tessellating triangles
  tc.appendChild(cv);
}

function update(){
  if(geom==='tri') document.querySelectorAll('.tcell').forEach(paintTriCell);
  else document.querySelectorAll('.cell').forEach(paintSqCell);
  renderPic($('yours'), stamps, geom);
  if(mode!=='sand'){ updatePar(); checkWin(); }
}
function updatePar(){
  const n=cellsUsed();
  $('par').innerHTML = `cells <b class="${n<=curPar?'under':'over'}">${n}</b> &nbsp;·&nbsp; par <b>${curPar}</b>`;
}

function checkWin(){
  const empty = stamps.every(s=>s.every(v=>v===0));
  const win = !empty && pixelDiff(fingerprint(stamps, geom), targetFP)===0;
  const frame=$('yoursFrame');
  frame.classList.toggle('win', win);
  $('winMsg').classList.toggle('show', win);

  if(win && !prevWin){                       // fresh solve
    const used=cellsUsed();
    celebrate();
    if(mode==='play'){
      solved[li]=1;
      try{ localStorage.setItem('auto-solved', JSON.stringify(solved)); }catch(e){}
      markDots();
      const last = li===LEVELS.length-1;
      $('winMsg').textContent = last ? "every mark solved ✦"
        : (used<=curPar ? `solved · par ${curPar}` : `solved · ${used} cells`);
      if(!last) advTimer=setTimeout(()=>loadLevel(li+1), 1650);
    } else {                                 // random
      $('winMsg').textContent = used<=curPar ? `solved · par ${curPar} ✦` : `solved · ${used} cells`;
    }
  }
  if(!win && prevWin){ clearTimeout(advTimer); advTimer=null; }
  prevWin=win;
}

function celebrate(){
  const frame=$('yoursFrame'), burst=$('burst');
  frame.classList.remove('pop'); void frame.offsetWidth; frame.classList.add('pop');
  burst.classList.remove('go');  void burst.offsetWidth; burst.classList.add('go');
}

/* ---- sandbox ----------------------------------------------------- */
function enterSandbox(){
  clearTimeout(advTimer); advTimer=null; prevWin=false;
  if(mode==='random') clearHash();
  mode='sand'; setNav('sand'); geom='sq3';
  $('lvnum').textContent=''; $('lvname').textContent='Free play';
  $('hint').innerHTML="No target. Build with two stamps at full power - <b>ink</b>, <b>self</b>, the <b>other</b>, and spin ↻. Try ⚄ for a surprise.";
  $('par').hidden=true;
  armed=2;
  stamps=[Array(9).fill(0), Array(9).fill(0)];
  baseline=stamps.map(s=>s.slice());
  buildTray(); buildEditors(); markDots(); update();
}
function randomStamp(){
  const pool=[0,0,0,0,1,2,2,2,3,3];
  stamps=[0,1].map(()=>Array.from({length:9},()=>{
    let v=pool[Math.floor(Math.random()*pool.length)];
    if(v>=2 && Math.random()<0.5) v=rot(v, 1+Math.floor(Math.random()*3));
    return v;
  }));
  if(!stamps.flat().some(v=>v>=2)) stamps[0][4]=2;   // never a dull static block
  update();
}

/* ---- random puzzle (solve a random mark; the URL is the puzzle) --- */
const GEOMS=['sq3','sq2','tri'];
const GEOMCH={sq3:'S', sq2:'s', tri:'t'};
const CHGEOM={S:'sq3', s:'sq2', t:'tri'};
function encodeStamps(g, st){ return GEOMCH[g] + st.map(s=>s.map(v=>v.toString(16)).join('')).join('.'); }
function decodeStamps(str){
  const g=CHGEOM[str[0]]; if(!g) return null;
  const parts=str.slice(1).split('.').filter(Boolean);
  if(!parts.length) return null;
  const st=parts.map(p=>[...p].map(ch=>parseInt(ch,16)));
  const n=NCELLS[g];
  if(st.some(s=>s.length!==n || s.some(v=>isNaN(v)||v<0||v>15))) return null;
  return {geom:g, stamps:st};
}
function fromHash(){
  const m=(location.hash||'').match(/p=([^&]+)/);
  if(!m) return null;
  try{ return decodeStamps(decodeURIComponent(m[1])); }catch(e){ return null; }
}
function genStamp(g){
  const n=NCELLS[g], spin=(g!=='tri'), max = g==='sq3'?6:3;
  const pool = g==='sq3' ? [0,0,0,1,1,2,2,2] : [0,0,1,2,2,2];
  let s, refs, filled, tries=0;
  do{
    s=Array.from({length:n},()=>{
      let v=pool[Math.floor(Math.random()*pool.length)];
      if(v===2 && spin && Math.random()<0.45) v=rot(2, 1+Math.floor(Math.random()*3));
      return v;
    });
    refs=s.filter(v=>v>=2).length; filled=s.filter(v=>v!==0).length;
  }while((refs<1 || filled<2 || filled>max) && ++tries<80);
  if(refs<1) s[0]=2;
  return s;
}
function genRandom(){ const g=GEOMS[Math.floor(Math.random()*GEOMS.length)]; return {geom:g, stamps:[genStamp(g)]}; }

function enterRandom(target){
  clearTimeout(advTimer); advTimer=null; prevWin=false;
  mode='random'; setNav('random');
  geom=target.geom; targetStamps=target.stamps;
  baseline=targetStamps.map(s=>s.map(_=>0));
  stamps=baseline.map(s=>s.slice());
  targetFP=fingerprint(targetStamps, geom);
  curPar=parOf(targetStamps);
  armed=2;
  try{ history.replaceState(null,'','#p='+encodeStamps(geom,targetStamps)); }catch(e){}
  renderPic($('target'), targetStamps, geom);
  $('lvnum').textContent=''; $('lvname').textContent='Random';
  $('hint').innerHTML=`Reverse-engineer this <b>${GEOMNAME[geom]}</b> mark. Match it in as few cells as you can, then <b>⧉ link</b> the exact puzzle to a friend.`;
  $('par').hidden=false;
  $('yoursFrame').classList.remove('win','pop'); $('winMsg').classList.remove('show');
  buildTray(); buildEditors(); markDots(); update();
}

/* ---- controls ---------------------------------------------------- */
$('prev').onclick =()=>loadLevel(li-1);
$('next').onclick =()=>loadLevel(li+1);
$('reset').onclick=()=>{ stamps=baseline.map(s=>s.slice()); update(); };
$('toSand').onclick=enterSandbox;
$('toRandom').onclick=()=>enterRandom(genRandom());
$('exitSand').onclick=()=>loadLevel(li);
$('clear').onclick=()=>{ stamps=stamps.map(s=>s.map(_=>0)); update(); };
$('rand').onclick=randomStamp;
$('rnew').onclick=()=>enterRandom(genRandom());
$('rreset').onclick=()=>{ stamps=baseline.map(s=>s.slice()); update(); };
$('rexit').onclick=()=>loadLevel(li);
$('rshare').onclick=()=>{
  const t=$('rshare');
  const done=()=>{ t.textContent='copied ✓'; setTimeout(()=>t.textContent='⧉ link',1400); };
  try{ navigator.clipboard.writeText(location.href).then(done, done); }catch(e){ done(); }
};
document.addEventListener('keydown',e=>{
  if(mode!=='play') return;
  if(e.key==='ArrowLeft' && li>0) loadLevel(li-1);
  if(e.key==='ArrowRight' && li<LEVELS.length-1) loadLevel(li+1);
});
window.addEventListener('hashchange',()=>{ const h=fromHash(); if(h) enterRandom(h); });

buildDots();
(function(){ const h=fromHash(); if(h) enterRandom(h); else loadLevel(0); })();

/* ---- theme: re-render canvases (fractal ink colour flips) --------- */
function redrawTheme(){
  if(mode!=='sand') renderPic($('target'), targetStamps, geom);
  update();
}
window.addEventListener('themechange', redrawTheme);

(function(){
  var btn=document.getElementById('themeToggle');
  if(!btn)return;
  function glyph(){btn.textContent=
    document.documentElement.getAttribute('data-theme')==='dark'?'☀':'☾';}
  glyph();
  btn.addEventListener('click',function(){
    var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    try{localStorage.setItem('theme',next);}catch(e){}
    glyph();
    window.dispatchEvent(new Event('themechange'));
  });
})();
</script>
</body>
