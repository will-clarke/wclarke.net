<script>
"use strict";
/* ===================================================================
   SEED - a visual L-system growth puzzle.

   The player builds ONE small "twig-shape" (the gene) by tapping buds
   to sprout sticks left / straight / right. That shape is compiled to
   a single rewrite rule  F -> <shape>  and the axiom "F" is expanded
   `season` times, then a turtle draws the result. Every stick in the
   plant becomes a scaled copy of the gene, so branching, bending and
   growth are all authored by direct manipulation - no bracket algebra.

   Turtle alphabet (generated, never shown to the player):
     F draw forward   + turn left   - turn right   [ push   ] pop
   World is 0..100 on both axes, y up, base at the bottom.
=================================================================== */

const MAXLEN = 50000;

/* ---- levels -------------------------------------------------------
   base:[x,y] heading(deg,90=up) angle(deg) len maxGen startGen
   editor:{turn,branch,max}  turn=allow L/R · branch=allow >1 stick per
   joint · max=stick budget. suns/thorns/walls define the puzzle.
------------------------------------------------------------------- */
const LEVELS = [
  {
    name:"Sprout",
    hint:"Tap the <b>+</b> bud to make your twig taller. Every twig becomes your shape, so a 2-tall twig <b>doubles</b> every season. Press <b>grow</b> and reach the sun.",
    base:[50,3], heading:90, angle:25, len:5, maxGen:6, startGen:3,
    editor:{turn:false, branch:false, max:3},
    suns:[{x:50,y:44,r:7}], thorns:[], walls:[],
  },
  {
    name:"Lean",
    hint:"The sun drifted to the side. Sprout your twigs <b>angled</b> - tap the slanted buds. A little bend, repeated every season, curves the whole plant over.",
    base:[50,3], heading:90, angle:11, len:5, maxGen:6, startGen:4,
    editor:{turn:true, branch:false, max:4},
    suns:[{x:71,y:40,r:8}], thorns:[], walls:[],
  },
  {
    name:"Fork",
    hint:"Now a twig can <b>split</b>. On one tip, sprout a left AND a right AND a straight bud - a little Y. Two suns, one each side: let the plant branch to both.",
    base:[50,3], heading:90, angle:33, len:5, maxGen:5, startGen:3,
    editor:{turn:true, branch:true, max:6},
    suns:[{x:37,y:34,r:7},{x:63,y:34,r:7}], thorns:[], walls:[],
  },
  {
    name:"Ceiling",
    hint:"A low cave roof. Reach the sun but don't grow through the rock. Same shape, fewer <b>seasons</b> - dial the season down until it fits.",
    base:[50,3], heading:90, angle:25, len:5, maxGen:6, startGen:2,
    editor:{turn:false, branch:false, max:4},
    suns:[{x:50,y:40,r:6}], thorns:[],
    walls:[{x1:6,y1:52,x2:94,y2:52}],
  },
  {
    name:"Needle",
    hint:"A thorn on the left, the sun on the right. Branch <b>only</b> toward the sun - sprout to the right and straight, never left. Sometimes growing well means not growing everywhere.",
    base:[50,3], heading:90, angle:28, len:5, maxGen:5, startGen:3,
    editor:{turn:true, branch:true, max:6},
    suns:[{x:64,y:34,r:6}], thorns:[{x:36,y:30,r:7}], walls:[],
  },
  {
    name:"Thicket",
    hint:"Three suns to light at once. A <b>bushy</b> twig - splits stacked on splits - fills the most space. Build a full little shape, then find the season that covers all three.",
    base:[50,3], heading:90, angle:26, len:3.4, maxGen:5, startGen:3,
    editor:{turn:true, branch:true, max:8},
    suns:[{x:35,y:52,r:8},{x:65,y:52,r:8},{x:50,y:78,r:8}], thorns:[], walls:[],
  },
];

/* ---- the gene: a tree of sticks -----------------------------------
   node = {id, dir:'L'|'S'|'R', children:[node]}.  state.gene is the
   base joint: {children:[...]}; its children sprout from the ground.
   A stick's children sprout from that stick's tip.
------------------------------------------------------------------- */
let gid = 0;
const stick = dir => ({id:++gid, dir, children:[]});
const defaultGene = () => ({children:[stick('S')]});   // one straight twig
function countSticks(node){ let n=0; for(const c of node.children) n += 1 + countSticks(c); return n; }
function findParent(node, target){
  for(const c of node.children){ if(c===target) return node; const r=findParent(c,target); if(r) return r; }
  return null;
}

/* ---- compile the gene tree into a rewrite rule --------------------
   Each stick -> (turn?) F (children). One straight child per joint is
   the "spine" and stays unbracketed so the trunk continues; every
   other child is wrapped in [ ] so the turtle springs back to the fork.
------------------------------------------------------------------- */
function compile(children){
  if(!children.length) return "";
  let spine = -1;
  for(let i=0;i<children.length;i++) if(children[i].dir==='S') spine = i;
  if(spine<0) spine = children.length-1;
  let out = "";
  children.forEach((c,i)=>{
    const turn = c.dir==='L' ? '+' : c.dir==='R' ? '-' : '';
    const body = turn + 'F' + compile(c.children);
    out += (i===spine) ? body : ('['+body+']');
  });
  return out;
}

/* ---- expansion (the rewrite) ------------------------------------- */
function expand(rules, axiom, gen){
  let s = axiom;
  for(let g=0; g<gen; g++){
    let out = "";
    for(let i=0;i<s.length;i++){
      const ch = s[i];
      out += (rules[ch] !== undefined) ? rules[ch] : ch;
      if(out.length > MAXLEN) return out.slice(0, MAXLEN);
    }
    s = out;
  }
  return s;
}

/* ---- turtle interpretation --------------------------------------- */
function interpret(str, lv){
  const segs = [];
  let x = lv.base[0], y = lv.base[1];
  let a = lv.heading * Math.PI/180;
  const da = lv.angle * Math.PI/180;
  let depth = 0, fd = 0;
  const stack = [];
  for(let i=0;i<str.length;i++){
    const ch = str[i];
    if(ch === 'F'){
      const nx = x + Math.cos(a)*lv.len;
      const ny = y + Math.sin(a)*lv.len;
      fd++;
      segs.push({x1:x,y1:y,x2:nx,y2:ny,depth,grow:fd});
      x = nx; y = ny;
    } else if(ch === '+'){ a += da; }
    else if(ch === '-'){ a -= da; }
    else if(ch === '['){ stack.push({x,y,a,depth,fd}); depth++; }
    else if(ch === ']'){ const s = stack.pop(); if(s){ x=s.x; y=s.y; a=s.a; depth=s.depth; fd=s.fd; } }
  }
  return segs;
}

/* ---- geometry ---------------------------------------------------- */
function distSegPt(sg, px, py){
  const dx = sg.x2-sg.x1, dy = sg.y2-sg.y1;
  const l2 = dx*dx + dy*dy;
  let t = l2 ? ((px-sg.x1)*dx + (py-sg.y1)*dy)/l2 : 0;
  t = t<0?0:t>1?1:t;
  const cx = sg.x1 + t*dx, cy = sg.y1 + t*dy;
  return Math.hypot(px-cx, py-cy);
}
function segCross(a, w){
  const o=(ax,ay,bx,by,cx,cy)=>(by-ay)*(cx-bx)-(bx-ax)*(cy-by);
  const d1=o(w.x1,w.y1,w.x2,w.y2,a.x1,a.y1), d2=o(w.x1,w.y1,w.x2,w.y2,a.x2,a.y2);
  const d3=o(a.x1,a.y1,a.x2,a.y2,w.x1,w.y1), d4=o(a.x1,a.y1,a.x2,a.y2,w.x2,w.y2);
  return ((d1>0)!==(d2>0)) && ((d3>0)!==(d4>0));
}
function outOfBounds(sg){
  const bad = v => v < 1 || v > 99;
  return bad(sg.x1)||bad(sg.x2)||sg.y1>99||sg.y2>99||sg.y1<0||sg.y2<0;
}

/* ---- evaluation (win check) -------------------------------------- */
function evaluate(segs, lv){
  const suns = lv.suns.map(s=>({...s, lit:false}));
  let thornHit=false, wallHit=false, oob=false;
  for(const sg of segs){
    if(outOfBounds(sg)) oob = true;
    for(const s of suns) if(!s.lit && distSegPt(sg,s.x,s.y) <= s.r) s.lit = true;
    if(!thornHit) for(const t of lv.thorns) if(distSegPt(sg,t.x,t.y) <= t.r){ thornHit=true; break; }
    if(!wallHit)  for(const w of lv.walls)  if(segCross(sg,w)){ wallHit=true; break; }
  }
  const allLit = suns.every(s=>s.lit);
  const win = allLit && !thornHit && !wallHit && !oob && segs.length>0;
  return {suns, thornHit, wallHit, oob, allLit, win};
}

/* expose for dev / self-test */
window.SEED = {LEVELS, compile, expand, interpret, evaluate,
  run(i, gene, gen){ const L=LEVELS[i]; const r={F:compile(gene.children)||'F'};
    return evaluate(interpret(expand(r,'F',gen),L), L); }};

/* ===================================================================
   state
=================================================================== */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const gpad = document.getElementById('gpad');
const gctx = gpad.getContext('2d');
let W=380, H=380, PW=380, PH=250, DPR=1;

let li = 0;
let state = null;   // {lv, gene, gen, segs, order, maxDepth, result}
let anim = {t0:0, dur:0, raf:0, on:false};
let solved = {};
try{ solved = JSON.parse(localStorage.getItem('seed-solved')||'{}'); }catch(e){}
let padHits = {ghosts:[], sticks:[]};   // hit-test cache (device px)

function cssv(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
const X = wx => wx/100*W;
const Y = wy => (1 - wy/100)*H;
const S = u => u/100*W;

function layout(){
  DPR = Math.min(window.devicePixelRatio||1, 2.5);
  const c = cv.clientWidth || 380;
  W = H = Math.round(c*DPR);
  cv.width = W; cv.height = H;
  PW = Math.round((gpad.clientWidth||380)*DPR);
  PH = Math.round((gpad.clientHeight||250)*DPR);
  gpad.width = PW; gpad.height = PH;
  if(state){ draw(); renderPad(); }
}

function loadLevel(i){
  li = (i + LEVELS.length) % LEVELS.length;
  const lv = LEVELS[li];
  state = { lv, gene: defaultGene(), gen: lv.startGen,
            segs:[], order:[], maxDepth:1, result:null };
  document.getElementById('lvnum').textContent = String(li+1).padStart(2,'0');
  document.getElementById('lvname').textContent = lv.name;
  document.getElementById('genMax').textContent = '/'+lv.maxGen;
  document.getElementById('hint').innerHTML = lv.hint;
  document.getElementById('prev').disabled = li===0;
  document.getElementById('padnote').innerHTML = lv.editor.branch
    ? 'tap a <b>+</b> bud to sprout · tap a twig to remove it'
    : (lv.editor.turn ? 'tap a slanted <b>+</b> bud to bend · tap a twig to remove'
                      : 'tap the <b>+</b> bud to grow taller · tap a twig to remove');
  recompute(false);
  syncGen();
}

/* --- compute plant from gene + season --- */
function recompute(animate){
  const lv = state.lv;
  const rules = { F: compile(state.gene.children) || 'F' };
  const segs = interpret(expand(rules,'F',state.gen), lv);
  state.segs = segs;
  state.maxDepth = segs.reduce((m,s)=>Math.max(m,s.grow),1);
  state.order = segs.map((_,i)=>i).sort((a,b)=> segs[a].grow-segs[b].grow || a-b);
  state.result = evaluate(segs, lv);
  document.getElementById('rule').innerHTML = 'F → <b>'+(rules.F)+'</b>';
  updateStatus();
  renderPad();
  if(animate) startGrow(); else draw();
}

/* --- growth animation --- */
function startGrow(){
  cancelAnimationFrame(anim.raf);
  const n = state.segs.length;
  anim.dur = n ? Math.min(1100, 380 + n*0.9) : 200;
  anim.t0 = performance.now();
  anim.on = true;
  const tick = now =>{
    const p = Math.min(1, (now-anim.t0)/anim.dur);
    draw(easeOut(p));
    if(p<1) anim.raf = requestAnimationFrame(tick);
    else anim.on = false;
  };
  anim.raf = requestAnimationFrame(tick);
}
const easeOut = p => 1-Math.pow(1-p,3);

/* ===================================================================
   garden drawing
=================================================================== */
/* the playfield is always a dark glowy "screen", regardless of page theme */
function paintBackdrop(c, w, h, cyFrac, inner, outer){
  const g = c.createRadialGradient(w*0.5, h*cyFrac, 0, w*0.5, h*cyFrac, Math.hypot(w,h)*0.9);
  g.addColorStop(0, inner); g.addColorStop(0.72, outer); g.addColorStop(1, outer);
  c.fillStyle = g; c.fillRect(0,0,w,h);
}
function draw(progress){
  const p = progress===undefined ? 1 : progress;
  const lv = state.lv;
  paintBackdrop(ctx, W, H, 0.08, '#10151b', '#070a0e');
  drawGround();
  drawWalls(lv);
  const revealF = p*(state.maxDepth);
  drawPlant(revealF);
  drawThorns(lv);
  drawSuns(lv, revealF);
}
function drawGround(){
  const g = ctx.createLinearGradient(0,H*0.9,0,H);
  g.addColorStop(0,'rgba(87,224,138,0)');
  g.addColorStop(1,'rgba(87,224,138,.08)');
  ctx.fillStyle=g; ctx.fillRect(0,H*0.9,W,H*0.1);
  ctx.strokeStyle='rgba(87,224,138,.18)';
  ctx.lineWidth=Math.max(1,S(0.4));
  ctx.beginPath(); ctx.moveTo(0,Y(state.lv.base[1])); ctx.lineTo(W,Y(state.lv.base[1])); ctx.stroke();
}
function drawWalls(lv){
  if(!lv.walls.length) return;
  ctx.strokeStyle=cssv('--stone'); ctx.lineCap='round';
  ctx.lineWidth=Math.max(3,S(2.6)); ctx.globalAlpha=.85;
  for(const w of lv.walls){ ctx.beginPath(); ctx.moveTo(X(w.x1),Y(w.y1)); ctx.lineTo(X(w.x2),Y(w.y2)); ctx.stroke(); }
  ctx.globalAlpha=1;
}
function drawPlant(revealF){
  const segs = state.segs, md = state.maxDepth;
  ctx.lineCap='round'; ctx.lineJoin='round';
  for(const idx of state.order){
    const sg = segs[idx];
    if(sg.grow-1 >= revealF) continue;
    const frac = Math.min(1, revealF-(sg.grow-1));
    const ex = sg.x1 + (sg.x2-sg.x1)*frac;
    const ey = sg.y1 + (sg.y2-sg.y1)*frac;
    const t = md>1 ? (sg.grow-1)/(md-1) : 1;
    const hue = 96 + t*46, lig = 40 + t*20;
    ctx.strokeStyle = `hsl(${hue} 70% ${lig}%)`;
    ctx.lineWidth = Math.max(S(0.35), S(1.5)*Math.pow(0.72, sg.depth));
    ctx.beginPath(); ctx.moveTo(X(sg.x1),Y(sg.y1)); ctx.lineTo(X(ex),Y(ey)); ctx.stroke();
  }
  const starts = new Set(segs.map(s=>s.x1.toFixed(2)+','+s.y1.toFixed(2)));
  for(const sg of segs){
    if(sg.grow-1 >= revealF-0.05) continue;
    if(starts.has(sg.x2.toFixed(2)+','+sg.y2.toFixed(2))) continue;
    ctx.fillStyle='rgba(64,196,120,.95)';
    ctx.beginPath(); ctx.arc(X(sg.x2),Y(sg.y2), Math.max(1.4,S(0.7)), 0, 7); ctx.fill();
  }
}
function drawSuns(lv, revealF){
  for(const s of lv.suns){
    let lit=false;
    for(const sg of state.segs){ if(sg.grow-1<revealF && distSegPt(sg,s.x,s.y)<=s.r){ lit=true; break; } }
    const cx=X(s.x), cy=Y(s.y), r=S(s.r);
    if(lit){
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*2.4);
      g.addColorStop(0,'rgba(255,207,92,.55)'); g.addColorStop(1,'rgba(255,207,92,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r*2.4,0,7); ctx.fill();
    }
    ctx.beginPath(); ctx.arc(cx,cy,r,0,7);
    ctx.fillStyle = lit ? 'rgba(255,222,130,.95)' : 'rgba(255,207,92,.16)';
    ctx.fill();
    ctx.lineWidth=Math.max(1.4,S(0.6));
    ctx.strokeStyle = lit ? cssv('--sun') : 'rgba(255,207,92,.6)';
    ctx.stroke();
    if(lit){ ctx.strokeStyle='rgba(255,240,190,.9)'; ctx.lineWidth=Math.max(1,S(0.35));
      ctx.beginPath(); ctx.arc(cx,cy,r*0.5,0,7); ctx.stroke(); }
  }
}
function drawThorns(lv){
  for(const t of lv.thorns){
    const cx=X(t.x), cy=Y(t.y), r=S(t.r);
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,'rgba(255,90,110,.28)'); g.addColorStop(1,'rgba(255,90,110,.05)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.fill();
    ctx.strokeStyle='rgba(255,90,110,.5)'; ctx.lineWidth=Math.max(1,S(0.4));
    ctx.setLineDash([S(1.2),S(1.2)]); ctx.beginPath(); ctx.arc(cx,cy,r,0,7); ctx.stroke(); ctx.setLineDash([]);
    ctx.strokeStyle=cssv('--thorn'); ctx.lineWidth=Math.max(1.4,S(0.7)); ctx.lineCap='round';
    for(let k=0;k<8;k++){ const an=k/8*Math.PI*2, ir=r*0.32, or_=r*0.7;
      ctx.beginPath(); ctx.moveTo(cx+Math.cos(an)*ir,cy+Math.sin(an)*ir);
      ctx.lineTo(cx+Math.cos(an)*or_,cy+Math.sin(an)*or_); ctx.stroke(); }
  }
}

/* --- status line + win --- */
function updateStatus(){
  const r = state.result, lit = r.suns.filter(s=>s.lit).length, tot = r.suns.length;
  const msg = document.getElementById('msg');
  const garden = document.getElementById('garden');
  document.getElementById('sunsLeft').textContent = '☀ '+lit+'/'+tot;
  garden.classList.remove('win','bad'); msg.className='msg';
  if(r.win){
    msg.textContent='grown - beautiful'; msg.classList.add('ok'); garden.classList.add('win');
    if(!solved[li]){ solved[li]=1; try{localStorage.setItem('seed-solved',JSON.stringify(solved));}catch(e){} }
  } else if(r.oob){ msg.textContent='outside the cave'; msg.classList.add('warn'); garden.classList.add('bad'); }
  else if(r.thornHit){ msg.textContent='caught on a thorn'; msg.classList.add('warn'); garden.classList.add('bad'); }
  else if(r.wallHit){ msg.textContent='hit the rock'; msg.classList.add('warn'); garden.classList.add('bad'); }
  else msg.textContent='';
}

/* ===================================================================
   gene pad - build the twig-shape by tapping buds
=================================================================== */
const EANG = 27*Math.PI/180;     // schematic bend angle in the pad

/* walk the gene tree into screen-space sticks + joints (device px) */
function geneLayout(){
  const bx = PW*0.5, by = PH*0.88;
  const len = PH*0.20;
  const sticks=[], joints=[];
  (function walk(node,x,y,heading){
    joints.push({node,x,y,heading,base:node===state.gene});
    for(const c of node.children){
      const h = heading + (c.dir==='L'? EANG : c.dir==='R'? -EANG : 0);
      const nx = x + Math.cos(h)*len, ny = y - Math.sin(h)*len;
      sticks.push({node:c, x1:x,y1:y,x2:nx,y2:ny, dir:c.dir, depth:depthOf(node)});
      walk(c,nx,ny,h);
    }
  })(state.gene, bx, by, Math.PI/2);
  return {sticks, joints, len};
}
function depthOf(node){ let d=0,p=findParent(state.gene,node); while(p){ d++; p=findParent(state.gene,p);} return d; }

function renderPad(){
  const lv = state.lv;
  paintBackdrop(gctx, PW, PH, 1.0, '#0f1720', '#0a0e14');
  // ground
  const by = PH*0.88;
  const gg = gctx.createLinearGradient(0,by-2,0,PH);
  gg.addColorStop(0,'rgba(87,224,138,.10)'); gg.addColorStop(1,'rgba(87,224,138,0)');
  gctx.fillStyle=gg; gctx.fillRect(0,by,PW,PH-by);
  gctx.strokeStyle='rgba(87,224,138,.16)'; gctx.lineWidth=Math.max(1,DPR);
  gctx.beginPath(); gctx.moveTo(0,by); gctx.lineTo(PW,by); gctx.stroke();

  const {sticks, joints, len} = geneLayout();
  padHits = {ghosts:[], sticks:[]};

  // ghost buds (available sprouts)
  const total = countSticks(state.gene);
  const dirs = lv.editor.turn ? ['L','S','R'] : ['S'];
  const canGrow = total < lv.editor.max;
  if(canGrow){
    for(const j of joints){
      if(j.base) continue;                 // never sprout new trunks from the ground
      if(!lv.editor.branch && j.node.children.length>=1) continue;
      const used = j.node.children.map(c=>c.dir);
      for(const d of dirs){
        if(used.includes(d)) continue;
        const off = d==='L'? EANG : d==='R'? -EANG : 0;
        const h = j.heading + off, gl = len*0.5;
        const gx = j.x + Math.cos(h)*gl, gy = j.y - Math.sin(h)*gl;
        // faint ghost stick
        gctx.strokeStyle='rgba(87,224,138,.18)'; gctx.lineWidth=Math.max(1.2,DPR*1.2);
        gctx.setLineDash([DPR*2.5,DPR*2.5]); gctx.lineCap='round';
        gctx.beginPath(); gctx.moveTo(j.x,j.y); gctx.lineTo(gx,gy); gctx.stroke(); gctx.setLineDash([]);
        // + bud
        const br = Math.max(7, DPR*8);
        gctx.beginPath(); gctx.arc(gx,gy,br,0,7);
        gctx.fillStyle='rgba(87,224,138,.16)'; gctx.fill();
        gctx.strokeStyle='rgba(87,224,138,.65)'; gctx.lineWidth=Math.max(1.4,DPR*1.3); gctx.stroke();
        gctx.strokeStyle='rgba(64,196,120,.95)'; gctx.lineWidth=Math.max(1.6,DPR*1.6); gctx.lineCap='round';
        const p=br*0.5;
        gctx.beginPath(); gctx.moveTo(gx-p,gy); gctx.lineTo(gx+p,gy);
        gctx.moveTo(gx,gy-p); gctx.lineTo(gx,gy+p); gctx.stroke();
        padHits.ghosts.push({x:gx,y:gy,joint:j.node,dir:d,r:br+DPR*8});
      }
    }
  }

  // real sticks
  gctx.lineCap='round'; gctx.lineJoin='round';
  for(const s of sticks){
    gctx.strokeStyle = `hsl(${132 - s.depth*8} 62% ${58 - s.depth*4}%)`;
    gctx.lineWidth = Math.max(DPR*2, DPR*5*Math.pow(0.74,s.depth));
    gctx.beginPath(); gctx.moveTo(s.x1,s.y1); gctx.lineTo(s.x2,s.y2); gctx.stroke();
    padHits.sticks.push({x1:s.x1,y1:s.y1,x2:s.x2,y2:s.y2,node:s.node});
  }
  // base node + leaf buds
  gctx.fillStyle='rgba(120,150,175,.5)';
  gctx.beginPath(); gctx.arc(PW*0.5,by,Math.max(2.5,DPR*3),0,7); gctx.fill();
  const parents = new Set(sticks.map(s=>findParent(state.gene,s.node)));
  for(const s of sticks){
    if(s.node.children.length) continue;    // has children -> not a tip
    gctx.fillStyle='rgba(64,196,120,.95)';
    gctx.beginPath(); gctx.arc(s.x2,s.y2,Math.max(2.5,DPR*3),0,7); gctx.fill();
  }
}

function padTap(clientX, clientY){
  const rect = gpad.getBoundingClientRect();
  const px = (clientX-rect.left)/rect.width*PW;
  const py = (clientY-rect.top)/rect.height*PH;
  // ghosts win (they sit just past the tips)
  let g=null, gd=1e9;
  for(const h of padHits.ghosts){ const d=Math.hypot(px-h.x,py-h.y); if(d<h.r && d<gd){gd=d; g=h;} }
  if(g){ g.joint.children.push(stick(g.dir)); recompute(true); return; }
  // else remove a stick (and its subtree)
  let s=null, sd=1e9;
  for(const h of padHits.sticks){ const d=distSegPt(h,px,py); if(d<sd){sd=d; s=h;} }
  if(s && sd < Math.max(14,DPR*15)){
    const parent = findParent(state.gene, s.node);
    if(parent){ parent.children = parent.children.filter(c=>c!==s.node);
      if(countSticks(state.gene)===0) state.gene = defaultGene();
      recompute(true); }
  }
}
gpad.addEventListener('pointerdown', e=>{ e.preventDefault(); padTap(e.clientX, e.clientY); });

/* ===================================================================
   controls
=================================================================== */
document.getElementById('genUp').onclick=()=>{ if(state.gen<state.lv.maxGen){ state.gen++; syncGen(); recompute(true);} };
document.getElementById('genDown').onclick=()=>{ if(state.gen>0){ state.gen--; syncGen(); recompute(true);} };
document.getElementById('replay').onclick=()=> startGrow();
document.getElementById('prev').onclick=()=> loadLevel(li-1);
document.getElementById('next').onclick=()=> loadLevel(li+1);
document.getElementById('reset').onclick=()=>{ state.gene=defaultGene(); state.gen=state.lv.startGen; syncGen(); recompute(true); };
function syncGen(){
  document.getElementById('genN').textContent=state.gen;
  document.getElementById('genUp').disabled = state.gen>=state.lv.maxGen;
  document.getElementById('genDown').disabled = state.gen<=0;
}

window.addEventListener('resize', layout);
/* repaint both canvases when the theme flips (bg tokens + stone/sun colors) */
window.addEventListener('themechange', ()=>{ if(state){ draw(); renderPad(); } });
loadLevel(0);
requestAnimationFrame(()=>{ layout(); });

/* --- light / dark toggle --- */
(function(){
  var btn=document.getElementById('themeToggle');
  if(!btn)return;
  function glyph(){btn.textContent=
    document.documentElement.getAttribute('data-theme')==='dark'?'☀':'☾';}
  glyph();
  btn.addEventListener('click',function(){
    var next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    try{localStorage.setItem('theme',next);}catch(e){}
    glyph();
    window.dispatchEvent(new Event('themechange'));
  });
})();
</script>
