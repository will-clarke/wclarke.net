<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="darkreader-lock">
  <title>Will Clarke</title>
  <meta name="description" content="Small things Will Clarke makes for fun: puzzle games, toys, and experiments.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
  <script>
  (function () {
    var t = localStorage.getItem("theme");
    if (t) document.documentElement.dataset.theme = t;
    window.toggleTheme = function () {
      var el = document.documentElement;
      var dark = el.dataset.theme
        ? el.dataset.theme === "dark"
        : matchMedia("(prefers-color-scheme: dark)").matches;
      el.dataset.theme = dark ? "light" : "dark";
      localStorage.setItem("theme", el.dataset.theme);
    };
  })();
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/vt.js"></script>
  <style>
    /* zoom this page into the writing honeycomb, and back (see writing-hex.html) */
    @view-transition { navigation: auto; }
    .hex.portal { view-transition-name: writing-portal; }
    @media (prefers-reduced-motion: reduce) { @view-transition { navigation: none; } }
  </style>
</head>
<body class="hexhome">

<div id="field"></div>

<nav class="mark" aria-label="site">
  <a class="wordmark" href="/about.html">will clarke</a>
  <span class="controls">
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="toggle dark mode" title="toggle dark mode">◐</button>
  </span>
</nav>

<!-- prefetch the cabinet the moment a pointer lands on the games hex, so the
     fly-in morph starts promptly. NB: prerender (not prefetch) would activate
     the page without a navigation, which SKIPS the cross-document view
     transition - so the morph is deliberately a prefetch. -->
<script type="speculationrules">
{
  "prefetch": [
    { "where": { "href_matches": "/games/" }, "eagerness": "moderate" }
  ]
}
</script>

<script src="/js/toys.js" defer></script>
<script src="/js/hexfield.js" defer></script>
<script src="/js/hex.js" defer></script>
</body>
</html>
