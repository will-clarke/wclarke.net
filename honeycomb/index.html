<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>⬡ recursive comb</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='-1.1 -1.1 2.2 2.2'%3E%3Cpath d='M0-1 .866-.5v1L0 1-.866.5v-1z' fill='none' stroke='%23e8b558' stroke-width='.14'/%3E%3C/svg%3E">
<style>
  html, body { margin:0; height:100%; overflow:hidden; background:#0b0806; }
  body {
    font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    user-select:none; -webkit-user-select:none;
  }
  #c { position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  #vignette {
    position:fixed; inset:0; pointer-events:none;
    background: radial-gradient(ellipse 90% 80% at 50% 42%, transparent 55%, rgba(0,0,0,.5) 100%);
  }
  #ui {
    position:fixed; top:16px; left:18px; right:18px;
    display:flex; align-items:baseline; gap:14px;
    color:#d8b06a; font-size:13px; letter-spacing:.08em;
    pointer-events:none; opacity:0; transition:opacity 1.6s ease .3s;
  }
  body.ready #ui { opacity:1; }
  #crumbs { display:flex; align-items:center; flex-wrap:wrap; pointer-events:auto; }
  #crumbs button {
    all:unset; cursor:pointer; padding:3px 8px; border-radius:7px; color:#c49c58;
    transition: background .18s ease, color .18s ease; font:inherit; line-height:1;
  }
  #crumbs button:hover { background:rgba(255,190,90,.13); color:#ffdd96; }
  #crumbs .sep { opacity:.32; padding:0 1px; }
  #crumbs .here { color:#ffe6ac; }
  #depth { opacity:.45; font-size:11px; white-space:nowrap; }
  #hint {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    color:#8f7444; font-size:12px; letter-spacing:.12em; pointer-events:none;
    white-space:nowrap; opacity:0; transition:opacity 1.4s ease;
  }
  body.ready #hint { opacity:.9; }
  body.dived #hint { opacity:0; }
  @media (max-width:640px){ #hint { font-size:10px; } #depth { display:none; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vignette"></div>
<div id="ui">
  <nav id="crumbs" aria-label="depth"></nav>
  <span id="depth"></span>
</div>
<div id="hint"></div>

<script>
'use strict';

/* ================================================================
   recursive comb - an infinitely nested honeycomb.
   Every "deep" cell contains a whole smaller honeycomb, forever.
   One continuous camera; coordinates renormalize as you cross
   levels, so the zoom never runs out of float precision.
   ================================================================ */

// ---------------- tunables ----------------
const ZF = 6;              // zoom factor between levels (comb radius, in child-cell units)
const RIM_INSET = 1.08;    // nested cells fit inside a hex of radius ZF - RIM_INSET
const REVEAL_LO = 26;      // px cell radius where a nested comb starts fading in
const REVEAL_HI = 96;      // px cell radius where it is fully revealed
const DIVE_FRAC = 0.44;    // a clicked cell flies to this fraction of the short viewport side
const ENTER_FRAC = 0.32;   // a cell bigger than this fraction counts as "entered"
const INTERACT_MIN = 12;   // px cell radius below which cells ignore the pointer

// Which cells contain a nested comb. `key` is the cell's full path
// from the root, e.g. "2,-1|0,3|1,0". Swap this out to hand-place
// nests: e.g. `return key === '0,0' || key.endsWith('|1,-1');`
function isDeep(key, q, r){
  if (q === 0 && r === 0) return true;            // every comb centre nests
  return (hash32(key) & 1023) / 1023 < 0.46;      // plus a scattering
}

// ---------------- boring setup ----------------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const crumbsEl = document.getElementById('crumbs');
const depthEl = document.getElementById('depth');
const hintEl = document.getElementById('hint');
const MOTION = matchMedia('(prefers-reduced-motion: reduce)').matches ? 0.25 : 1;
const COARSE = matchMedia('(pointer: coarse)').matches;
hintEl.textContent = COARSE
  ? 'drag to pan · pinch to zoom · tap a dark cell to dive'
  : 'drag to pan · scroll to zoom · click a dark cell to dive · esc rises';

let vw = 0, vh = 0, dpr = 1;
function resize(){
  dpr = Math.min(devicePixelRatio || 1, 2.5);
  vw = innerWidth; vh = innerHeight;
  canvas.width = Math.round(vw * dpr);
  canvas.height = Math.round(vh * dpr);
}
addEventListener('resize', resize);
resize();

const minVp = () => Math.min(vw, vh);
const maxVp = () => Math.max(vw, vh);

// ---------------- hex geometry (pointy-top, circumradius 1) ----------------
const SQ3 = Math.sqrt(3);
const cellX = (q, r) => SQ3 * (q + r / 2);
const cellY = (q, r) => 1.5 * r;

function axialRound(x, y){
  const qf = (SQ3 / 3) * x - y / 3, rf = (2 / 3) * y, sf = -qf - rf;
  let q = Math.round(qf), r = Math.round(rf), s = Math.round(sf);
  const dq = Math.abs(q - qf), dr = Math.abs(r - rf), ds = Math.abs(s - sf);
  if (dq > dr && dq > ds) q = -r - s; else if (dr > ds) r = -q - s;
  return { q, r };
}

function insideHex(x, y, rad){   // pointy-top hex, flat sides at |x| = rad*sqrt3/2
  return Math.abs(x) <= rad * SQ3 / 2 && Math.abs(y) <= rad - Math.abs(x) / SQ3;
}

const HEX = new Path2D();
for (let i = 0; i < 6; i++){
  const a = (-90 + 60 * i) * Math.PI / 180;
  const x = Math.cos(a), y = Math.sin(a);
  i ? HEX.lineTo(x, y) : HEX.moveTo(x, y);
}
HEX.closePath();

// the fixed cell layout of every nested comb
const CELLS = [], CELL_SET = new Set();
for (let q = -ZF; q <= ZF; q++) for (let r = -ZF; r <= ZF; r++){
  if (insideHex(cellX(q, r), cellY(q, r), ZF - RIM_INSET)){
    CELLS.push({ q, r });
    CELL_SET.add(q + ',' + r);
  }
}

// ---------------- deterministic cell traits ----------------
function hash32(str){
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++){
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = h << 13 | h >>> 19;
  }
  h = Math.imul(h ^ h >>> 16, 2246822507);
  h = Math.imul(h ^ h >>> 13, 3266489909);
  return (h ^= h >>> 16) >>> 0;
}

const trCache = new Map();
function traits(key, q, r){
  let t = trCache.get(key);
  if (t) return t;
  const h = hash32(key);
  const a = ((h >>> 10) & 1023) / 1023, b = ((h >>> 20) & 1023) / 1023;
  const deep = isDeep(key, q, r);
  const kind = deep ? 0 : (a < 0.68 ? 1 : 2);   // 0 deep, 1 honey, 2 empty
  const jewel = kind === 1 && b > 0.975;
  // hue/lum quantized so cells share baked sprites
  const hue = 2 * Math.round((jewel ? 168 + a * 14 : 30 + (b - 0.5) * 16) / 2);
  const lum = jewel ? 40 : 2 * Math.round((42 + (a - 0.5) * 12) / 2);
  t = {
    deep, kind, jewel,
    base: kind === 0 ? '#150e07'
        : kind === 1 ? `hsl(${hue}, ${jewel ? 52 : 64}%, ${lum}%)`
        : `hsl(${hue}, 26%, 11%)`,
    micro: kind === 0 ? '#1a1108'
         : kind === 1 ? `hsl(${hue}, 55%, ${lum - 7}%)`
         : '#1a1209',
    ph: ((h >>> 3) & 255) / 255 * Math.PI * 2,
  };
  if (trCache.size > 40000) trCache.clear();
  trCache.set(key, t);
  return t;
}

// ---------------- shared unit-space paints ----------------
const GLOSS = ctx.createRadialGradient(-0.33, -0.38, 0.02, 0, 0, 1.25);
GLOSS.addColorStop(0.00, 'rgba(255,241,205,0.85)');
GLOSS.addColorStop(0.18, 'rgba(255,221,140,0.32)');
GLOSS.addColorStop(0.46, 'rgba(255,180,70,0.04)');
GLOSS.addColorStop(0.80, 'rgba(80,30,0,0.28)');
GLOSS.addColorStop(1.00, 'rgba(35,10,0,0.5)');

const INSET = ctx.createRadialGradient(0, 0, 0.45, 0, 0, 1.05);
INSET.addColorStop(0, 'rgba(0,0,0,0)');
INSET.addColorStop(1, 'rgba(0,0,0,0.6)');

const DEEPGLOW = ctx.createRadialGradient(0, 0, 0, 0, 0, 1);
DEEPGLOW.addColorStop(0.0, 'rgba(255,166,58,0.13)');
DEEPGLOW.addColorStop(0.6, 'rgba(255,166,58,0.03)');
DEEPGLOW.addColorStop(1.0, 'rgba(255,166,58,0)');

const WAX = 'hsl(40, 40%, 33%)';
const WAX_HI = 'hsl(45, 55%, 62%)';
const BG = '#0b0806';

// ---------------- baked sprites for small cells ----------------
// Below this screen radius, cells are stamped from a prerendered
// bitmap instead of vector-painted; ~10x faster when zoomed out.
const SPRITE_MAX = 64;
const SPRITE_PAD = 1.12;
const spriteCache = new Map();
function cellSprite(tr){
  const R = 72 * Math.min(dpr, 2);
  let c = spriteCache.get(tr.base);
  if (c && c._r === R) return c;
  c = document.createElement('canvas');
  c.width = c.height = Math.ceil(R * SPRITE_PAD * 2);
  const g = c.getContext('2d');
  g.setTransform(R * 0.94, 0, 0, R * 0.94, c.width / 2, c.height / 2);
  g.fillStyle = tr.base;
  g.fill(HEX);
  if (tr.kind === 1){
    const gl = g.createRadialGradient(-0.33, -0.38, 0.02, 0, 0, 1.25);
    gl.addColorStop(0.00, 'rgba(255,241,205,0.85)');
    gl.addColorStop(0.18, 'rgba(255,221,140,0.32)');
    gl.addColorStop(0.46, 'rgba(255,180,70,0.04)');
    gl.addColorStop(0.80, 'rgba(80,30,0,0.28)');
    gl.addColorStop(1.00, 'rgba(35,10,0,0.5)');
    g.globalAlpha = 0.78;
    g.fillStyle = gl;
    g.fill(HEX);
  } else if (tr.kind === 2){
    const ins = g.createRadialGradient(0, 0, 0.45, 0, 0, 1.05);
    ins.addColorStop(0, 'rgba(0,0,0,0)');
    ins.addColorStop(1, 'rgba(0,0,0,0.6)');
    g.globalAlpha = 1;
    g.fillStyle = ins;
    g.fill(HEX);
  } else {
    const dg = g.createRadialGradient(0, 0, 0, 0, 0, 1);
    dg.addColorStop(0.0, 'rgba(255,166,58,0.13)');
    dg.addColorStop(0.6, 'rgba(255,166,58,0.03)');
    dg.addColorStop(1.0, 'rgba(255,166,58,0)');
    g.globalAlpha = 1;
    g.fillStyle = dg;
    g.fill(HEX);
  }
  g.globalAlpha = 0.9;
  g.lineWidth = 0.09;
  g.strokeStyle = WAX;
  g.stroke(HEX);
  if (tr.deep){
    g.globalAlpha = 0.34;
    g.strokeStyle = '#e0a94f';
    g.lineWidth = 0.05;
    g.save(); g.scale(0.58, 0.58); g.stroke(HEX); g.restore();
    g.globalAlpha = 0.18;
    g.save(); g.scale(0.3, 0.3); g.stroke(HEX); g.restore();
  }
  c._r = R;
  spriteCache.set(tr.base, c);
  return c;
}

// ---------------- camera ----------------
// `path` is the chain of deep cells we are inside; the "current space"
// is that comb's coordinate frame, where its own cells have radius 1.
// view/goal: x,y = world point at the viewport centre, z = px per unit.
let path = [];
const view = { x: 0, y: 0, z: 60 };
const goal = { x: 0, y: 0, z: 60 };
let anim = null;                     // {t0,dur,from:{x,y,z},to:{x,y,z}}
let inert = null;                    // {vx,vy} px/s

const homeZ = () => Math.min(118, Math.max(16, minVp() / 8.5));
const keyOf = cells => cells.map(c => c.q + ',' + c.r).join('|');

function camObjs(){
  const l = [view, goal];
  if (anim){ l.push(anim.from, anim.to); }
  return l;
}
function pushLevel(cell){
  path.push(cell);
  const px = cellX(cell.q, cell.r), py = cellY(cell.q, cell.r);
  for (const o of camObjs()){
    o.x = (o.x - px) * ZF; o.y = (o.y - py) * ZF; o.z /= ZF;
  }
}
function popLevel(){
  const cell = path.pop();
  const px = cellX(cell.q, cell.r), py = cellY(cell.q, cell.r);
  for (const o of camObjs()){
    o.x = px + o.x / ZF; o.y = py + o.y / ZF; o.z *= ZF;
  }
}

function renormalize(){
  // rise while the whole comb fits comfortably on screen
  while (path.length && ZF * view.z < 0.6 * minVp()) popLevel();
  // dive while the deep cell under the viewport centre swallows the screen
  for (let guard = 0; guard < 8; guard++){
    if (view.z <= 0.95 * maxVp()) break;
    const cell = axialRound(view.x, view.y);
    if (path.length && !CELL_SET.has(cell.q + ',' + cell.r)) break;
    const key = keyOf(path) ? keyOf(path) + '|' + cell.q + ',' + cell.r
                            : cell.q + ',' + cell.r;
    if (!traits(key, cell.q, cell.r).deep) break;
    pushLevel(cell);
  }
}

function clampZoom(){
  if (anim) return;
  if (!path.length && goal.z < 14){ goal.z = 14; view.z = Math.max(view.z, 13.5); }
  // over a leaf (or a wall gap) there is nothing further down: cap the zoom
  const cell = axialRound(goal.x, goal.y);
  const exists = !path.length || CELL_SET.has(cell.q + ',' + cell.r);
  const key = keyOf(path) ? keyOf(path) + '|' + cell.q + ',' + cell.r
                          : cell.q + ',' + cell.r;
  if (!exists || !traits(key, cell.q, cell.r).deep){
    const cap = 1.45 * maxVp();
    if (goal.z > cap) goal.z = cap;
    if (view.z > cap * 1.02) view.z = cap * 1.02;
  }
}

// ---------------- flight ----------------
function flyTo(x, y, z, durMul = 1){
  const levels = Math.abs(Math.log(z / view.z)) / Math.log(ZF);
  anim = {
    t0: nowMs,
    dur: Math.min(2600, (500 + 330 * levels)) * MOTION * durMul,
    from: { x: view.x, y: view.y, z: view.z },
    to: { x, y, z },
  };
  inert = null;
}
function stepAnim(){
  const u = Math.min(1, (nowMs - anim.t0) / anim.dur);
  const e = u * u * u * (u * (u * 6 - 15) + 10);          // smootherstep
  const { from: f, to: t } = anim;
  const lz = Math.log(f.z), lt = Math.log(t.z);
  const z = Math.exp(lz + (lt - lz) * e);
  let w = e;
  if (Math.abs(lt - lz) > 1e-4) w = (1 / f.z - 1 / z) / (1 / f.z - 1 / t.z);
  view.x = f.x + (t.x - f.x) * w;
  view.y = f.y + (t.y - f.y) * w;
  view.z = z;
  goal.x = view.x; goal.y = view.y; goal.z = view.z;
  if (u >= 1) anim = null;
}

// ---------------- semantic chain ----------------
// The renorm `path` only changes on extreme zoom; where you *are* is the
// chain of deep cells whose interiors currently dominate the viewport.
// Everything below is expressed in current-space coordinates.
function virtualChain(){
  let px = view.x, py = view.y, s = view.z;
  let bx = 0, by = 0, f = 1;
  let combKey = keyOf(path), isRoot = !path.length;
  const out = [];
  for (let d = 0; d < 26; d++){
    if (s <= ENTER_FRAC * minVp()) break;
    const cell = axialRound(px, py);
    if (!isRoot && !CELL_SET.has(cell.q + ',' + cell.r)) break;
    const key = combKey ? combKey + '|' + cell.q + ',' + cell.r
                        : cell.q + ',' + cell.r;
    if (!traits(key, cell.q, cell.r).deep) break;
    const cx = cellX(cell.q, cell.r), cy = cellY(cell.q, cell.r);
    out.push({ q: cell.q, r: cell.r, x: bx + cx * f, y: by + cy * f, ru: f, key });
    bx += cx * f; by += cy * f; f /= ZF;
    px = (px - cx) * ZF; py = (py - cy) * ZF; s /= ZF;
    combKey = key; isRoot = false;
  }
  return out;
}

function chainAll(){   // real renorm cells + virtual cells, current-space coords
  const n = path.length, out = [];
  for (let i = 0; i < n; i++){
    let px = cellX(path[i].q, path[i].r), py = cellY(path[i].q, path[i].r);
    let ru = 1;
    for (let j = i; j < n; j++){
      px = (px - cellX(path[j].q, path[j].r)) * ZF;
      py = (py - cellY(path[j].q, path[j].r)) * ZF;
      ru *= ZF;
    }
    out.push({ q: path[i].q, r: path[i].r, x: px, y: py, ru });
  }
  return out.concat(virtualChain());
}

// fly to the overview of room `j` (0 = the root surface)
function goRoom(j){
  const ch = chainAll();
  if (j <= 0){
    if (ch.length) flyTo(ch[0].x, ch[0].y, homeZ());
    else flyTo(0, 0, homeZ());
    return;
  }
  const c = ch[Math.min(j, ch.length) - 1];
  flyTo(c.x, c.y, 0.55 * minVp() / c.ru);
}

// ---------------- picking ----------------
// Walk down from the rendered ancestor to the cell under a screen point.
// Stops at the first cell that is a leaf, or a deep cell still small
// enough to be a dive target rather than an open room.
function pickCell(sx, sy){
  const n = path.length, k = Math.min(n, 2);
  let ax = view.x, ay = view.y, az = view.z;
  for (let i = 1; i <= k; i++){
    const c = path[n - i];
    ax = cellX(c.q, c.r) + ax / ZF;
    ay = cellY(c.q, c.r) + ay / ZF;
    az *= ZF;
  }
  let px = (sx - vw / 2) / az + ax, py = (sy - vh / 2) / az + ay;
  let combCells = path.slice(0, n - k);
  let isRoot = combCells.length === 0;
  let combKey = keyOf(combCells);
  let s = az;
  let bx = 0, by = 0, f = 1;          // picked-cell centre + radius, ancestor space
  const descendT = ENTER_FRAC * minVp();
  for (let d = 0; d < 26; d++){
    const cell = axialRound(px, py);
    if (!isRoot && !CELL_SET.has(cell.q + ',' + cell.r)) return null;
    const cx = cellX(cell.q, cell.r), cy = cellY(cell.q, cell.r);
    if (!insideHex(px - cx, py - cy, 0.94)) return null;   // wall gap
    const key = combKey ? combKey + '|' + cell.q + ',' + cell.r
                        : cell.q + ',' + cell.r;
    const tr = traits(key, cell.q, cell.r);
    const CX = bx + cx * f, CY = by + cy * f;
    if (!tr.deep || s <= descendT){
      if (s < INTERACT_MIN) return null;
      // convert centre + radius from ancestor space to current space
      let wx = CX, wy = CY, ru = f;
      const tail = path.slice(n - k);
      for (const c of tail){
        wx = (wx - cellX(c.q, c.r)) * ZF;
        wy = (wy - cellY(c.q, c.r)) * ZF;
        ru *= ZF;
      }
      return { key, tr, sr: s, wx, wy, ru };
    }
    // the cell is already an open room: interact with its children
    bx = CX; by = CY; f /= ZF;
    px = (px - cx) * ZF; py = (py - cy) * ZF;
    s /= ZF;
    combKey = key; isRoot = false;
  }
  return null;
}

// ---------------- hover / press / pulse state ----------------
let hoverKey = null, hovered = null;
const hoverAmts = new Map();
const pulses = new Map();
let pressKey = null;

// ---------------- rendering ----------------
let nowMs = 0, drawn = 0;
const MAX_DRAW = 9000;

function render(){
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, vw, vh);
  drawn = 0;

  const n = path.length, k = Math.min(n, 2);
  let ax = view.x, ay = view.y, az = view.z;
  for (let i = 1; i <= k; i++){
    const c = path[n - i];
    ax = cellX(c.q, c.r) + ax / ZF;
    ay = cellY(c.q, c.r) + ay / ZF;
    az *= ZF;
  }
  drawComb(vw / 2 - ax * az, vh / 2 - ay * az, az,
           keyOf(path.slice(0, n - k)), n - k === 0, 1);

  // warm light that follows the pointer
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (mouseOn && !COARSE){
    const g = ctx.createRadialGradient(mx, my, 0, mx, my, minVp() * 0.55);
    g.addColorStop(0, 'rgba(255,196,96,0.075)');
    g.addColorStop(1, 'rgba(255,196,96,0)');
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 1;
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, vw, vh);
    ctx.globalCompositeOperation = 'source-over';
  }
}

function drawComb(ox, oy, s, combKey, isRoot, alpha){
  if (drawn > MAX_DRAW || s < 2.2) return;
  const m = s * 1.35;
  if (isRoot){
    const r0 = Math.floor((-m - oy) / (1.5 * s)), r1 = Math.ceil((vh + m - oy) / (1.5 * s));
    for (let r = r0; r <= r1; r++){
      const q0 = Math.floor((-m - ox) / (SQ3 * s) - r / 2);
      const q1 = Math.ceil((vw + m - ox) / (SQ3 * s) - r / 2);
      for (let q = q0; q <= q1; q++) cellPass(ox, oy, s, q, r, combKey, isRoot, alpha, m);
    }
  } else {
    for (const c of CELLS) cellPass(ox, oy, s, c.q, c.r, combKey, isRoot, alpha, m);
  }
}

function cellPass(ox, oy, s, q, r, combKey, isRoot, alpha, m){
  const px = ox + s * cellX(q, r), py = oy + s * cellY(q, r);
  if (px < -m || px > vw + m || py < -m || py > vh + m) return;
  drawn++;
  const key = combKey ? combKey + '|' + q + ',' + r : q + ',' + r;
  const tr = traits(key, q, r);
  drawCell(px, py, s, key, tr, alpha);
  if (tr.deep && s > REVEAL_LO){
    const cs = s / ZF;
    if (cs > 2.2){
      const t = Math.min(1, Math.max(0, (s - REVEAL_LO) / (REVEAL_HI - REVEAL_LO)));
      const rev = t * t * (3 - 2 * t);
      if (alpha * rev > 0.02) drawComb(px, py, cs, key, false, alpha * rev);
    }
  }
}

function drawCell(px, py, s, key, tr, alpha){
  if (s < 4){
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = tr.micro;
    const w = s * 1.55;
    ctx.fillRect(px - w / 2, py - w / 2, w, w);
    return;
  }
  const hov = hoverAmts.get(key) || 0;
  const pu0 = pulses.get(key);
  if (s < SPRITE_MAX && hov < 0.01 && pu0 === undefined && key !== pressKey){
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.globalAlpha = alpha;
    const w = s * SPRITE_PAD;
    ctx.drawImage(cellSprite(tr), px - w, py - w, w * 2, w * 2);
    return;
  }
  let sc = s * 0.94 * (1 + 0.045 * hov) * (key === pressKey ? 0.965 : 1);
  const pu = pu0;
  if (pu !== undefined){
    const t = (nowMs - pu) / 450;
    if (t >= 1) pulses.delete(key);
    else sc *= 1 + 0.05 * Math.sin(t * Math.PI) * (1 - 0.5 * t);
  }
  ctx.setTransform(dpr * sc, 0, 0, dpr * sc, dpr * px, dpr * py);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = tr.base;
  ctx.fill(HEX);

  if (s > 7){
    if (tr.kind === 1){          // honey: glossy overlay with a slow shimmer
      const tw = MOTION < 1 ? 0 : 0.12 * Math.sin(nowMs * 0.0011 + tr.ph);
      ctx.globalAlpha = alpha * (0.78 + tw);
      ctx.fillStyle = GLOSS;
      ctx.fill(HEX);
    } else if (tr.kind === 2){   // empty: recessed
      ctx.globalAlpha = alpha;
      ctx.fillStyle = INSET;
      ctx.fill(HEX);
    } else {                     // deep: faint warmth from below
      ctx.globalAlpha = alpha;
      ctx.fillStyle = DEEPGLOW;
      ctx.fill(HEX);
    }
    ctx.globalAlpha = alpha * 0.9;
    ctx.lineWidth = 0.09;
    ctx.strokeStyle = WAX;
    ctx.stroke(HEX);
    if (s > 15){
      ctx.save();
      ctx.scale(0.9, 0.9);
      ctx.globalAlpha = alpha * 0.16;
      ctx.lineWidth = 0.045;
      ctx.strokeStyle = WAX_HI;
      ctx.stroke(HEX);
      ctx.restore();
    }
  }

  if (tr.deep && s > 8){
    const t = Math.min(1, Math.max(0, (s - REVEAL_LO) / (REVEAL_HI - REVEAL_LO)));
    if (t < 1){                  // depth hint: nested rings before the comb resolves
      ctx.globalAlpha = alpha * (1 - t) * 0.34;
      ctx.strokeStyle = '#e0a94f';
      ctx.lineWidth = 0.05;
      ctx.save(); ctx.scale(0.58, 0.58); ctx.stroke(HEX); ctx.restore();
      ctx.globalAlpha = alpha * (1 - t) * 0.18;
      ctx.save(); ctx.scale(0.3, 0.3); ctx.stroke(HEX); ctx.restore();
    }
  }

  if (hov > 0.01){
    ctx.globalAlpha = alpha * hov * 0.9;
    ctx.shadowColor = 'rgba(255,190,80,0.9)';
    ctx.shadowBlur = 24 * dpr * hov;
    ctx.lineWidth = 0.1;
    ctx.strokeStyle = '#ffd98a';
    ctx.stroke(HEX);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = alpha * hov * 0.06;
    ctx.fillStyle = '#fff';
    ctx.fill(HEX);
  }
}

// ---------------- breadcrumbs ----------------
let semKey = null;
function refreshCrumbs(ch){
  crumbsEl.replaceChildren();
  const root = document.createElement('button');
  root.textContent = '⬡';
  root.title = 'surface';
  root.addEventListener('click', () => goRoom(0));
  if (!ch.length) root.classList.add('here');
  crumbsEl.appendChild(root);
  ch.forEach((c, i) => {
    const sep = document.createElement('span');
    sep.className = 'sep';
    sep.textContent = '›';
    crumbsEl.appendChild(sep);
    const b = document.createElement('button');
    b.textContent = c.q + ',' + c.r;
    if (i === ch.length - 1) b.classList.add('here');
    b.addEventListener('click', () => goRoom(i + 1));
    crumbsEl.appendChild(b);
  });
  depthEl.textContent = ch.length ? 'depth ' + ch.length : 'surface';
}

// ---------------- input ----------------
let mx = vw / 2, my = vh / 2, mouseOn = false;
const pointers = new Map();
let dragging = false, downAt = null, vx = 0, vy = 0, lastMoveT = 0;
let pinchPrev = null;

canvas.addEventListener('pointerdown', e => {
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  anim = null; inert = null;
  if (pointers.size === 1){
    downAt = { x: e.clientX, y: e.clientY, t: performance.now() };
    dragging = false; vx = 0; vy = 0; lastMoveT = performance.now();
    const p = pickCell(e.clientX, e.clientY);
    pressKey = p ? p.key : null;
  } else {
    downAt = null; pressKey = null; dragging = false;
    pinchPrev = null;
  }
});

canvas.addEventListener('pointermove', e => {
  mx = e.clientX; my = e.clientY; mouseOn = true;
  const pt = pointers.get(e.pointerId);
  if (!pt) return;
  const dx = e.clientX - pt.x, dy = e.clientY - pt.y;
  pt.x = e.clientX; pt.y = e.clientY;

  if (pointers.size === 1){
    if (downAt && !dragging &&
        Math.hypot(e.clientX - downAt.x, e.clientY - downAt.y) > 5){
      dragging = true; pressKey = null; hoverKey = null;
    }
    if (dragging){
      view.x -= dx / view.z; view.y -= dy / view.z;
      goal.x = view.x; goal.y = view.y;
      const t = performance.now(), dt = Math.max(1, t - lastMoveT);
      vx = 0.75 * vx + 0.25 * (dx / dt * 1000);
      vy = 0.75 * vy + 0.25 * (dy / dt * 1000);
      lastMoveT = t;
    }
  } else if (pointers.size === 2){
    const ps = [...pointers.values()];
    const cur = {
      x: (ps[0].x + ps[1].x) / 2, y: (ps[0].y + ps[1].y) / 2,
      d: Math.hypot(ps[0].x - ps[1].x, ps[0].y - ps[1].y),
    };
    if (pinchPrev){
      const f = pinchPrev.d > 0 ? cur.d / pinchPrev.d : 1;
      const wxp = (cur.x - vw / 2) / view.z + view.x;
      const wyp = (cur.y - vh / 2) / view.z + view.y;
      view.z *= f;
      view.x = wxp - (cur.x - vw / 2) / view.z;
      view.y = wyp - (cur.y - vh / 2) / view.z;
      view.x -= (cur.x - pinchPrev.x) / view.z;
      view.y -= (cur.y - pinchPrev.y) / view.z;
      goal.x = view.x; goal.y = view.y; goal.z = view.z;
    }
    pinchPrev = cur;
  }
});

canvas.addEventListener('pointerup', e => {
  pointers.delete(e.pointerId);
  pinchPrev = null;
  if (dragging){
    if (Math.hypot(vx, vy) > 60) inert = { vx, vy };
    dragging = false;
  } else if (downAt && performance.now() - downAt.t < 500){
    handleTap(e.clientX, e.clientY);
  }
  downAt = null; pressKey = null;
});
canvas.addEventListener('pointercancel', e => {
  pointers.delete(e.pointerId);
  pinchPrev = null; dragging = false; downAt = null; pressKey = null;
});
canvas.addEventListener('pointerleave', () => { mouseOn = false; });

function handleTap(sx, sy){
  const p = pickCell(sx, sy);
  if (!p) return;
  if (p.tr.deep){
    flyTo(p.wx, p.wy, DIVE_FRAC * minVp() / p.ru);
  } else {
    pulses.set(p.key, nowMs);
  }
}

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  anim = null; inert = null;
  const f = Math.exp(-e.deltaY * (e.ctrlKey ? 0.0085 : 0.0016));
  const wxp = (e.clientX - vw / 2) / goal.z + goal.x;
  const wyp = (e.clientY - vh / 2) / goal.z + goal.y;
  goal.z *= f;
  goal.x = wxp - (e.clientX - vw / 2) / goal.z;
  goal.y = wyp - (e.clientY - vh / 2) / goal.z;
}, { passive: false });

function riseOne(){
  const sem = chainAll().length;
  if (sem) goRoom(sem - 1);
  else flyTo(0, 0, homeZ());
}
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  riseOne();
});

addEventListener('keydown', e => {
  if (e.key === 'Escape' || e.key === 'Backspace'){
    e.preventDefault();
    riseOne();
  }
});

// ---------------- main loop ----------------
let lastT = performance.now();
function frame(t){
  nowMs = t;
  const dt = Math.min(0.05, (t - lastT) / 1000);
  lastT = t;

  if (anim){
    stepAnim();
  } else {
    if (inert){
      goal.x -= inert.vx * dt / view.z;
      goal.y -= inert.vy * dt / view.z;
      const k = Math.exp(-dt * 3.2);
      inert.vx *= k; inert.vy *= k;
      if (Math.hypot(inert.vx, inert.vy) < 25) inert = null;
    }
    const a = 1 - Math.exp(-dt * 14);
    view.z = Math.exp(Math.log(view.z) + (Math.log(goal.z) - Math.log(view.z)) * a);
    view.x += (goal.x - view.x) * a;
    view.y += (goal.y - view.y) * a;
  }

  renormalize();
  clampZoom();

  const ch = chainAll();
  const key = ch.map(c => c.q + ',' + c.r).join('|');
  if (key !== semKey){ semKey = key; refreshCrumbs(ch); }
  if (ch.length) document.body.classList.add('dived');

  // hover
  if (!dragging && !COARSE && mouseOn && pointers.size === 0){
    hovered = pickCell(mx, my);
    hoverKey = hovered ? hovered.key : null;
  } else if (dragging || pointers.size){
    hovered = null; hoverKey = null;
  }
  canvas.style.cursor = dragging ? 'grabbing'
                      : hovered && hovered.tr.deep ? 'pointer' : 'default';
  if (hoverKey && !hoverAmts.has(hoverKey)) hoverAmts.set(hoverKey, 0);
  for (const [k, v] of hoverAmts){
    const target = k === hoverKey ? 1 : 0;
    const nv = v + (target - v) * (1 - Math.exp(-dt * 13));
    if (target === 0 && nv < 0.006) hoverAmts.delete(k);
    else hoverAmts.set(k, nv);
  }

  render();
  requestAnimationFrame(frame);
}

// ---------------- go ----------------
refreshCrumbs([]);
view.z = homeZ() * 0.42; goal.z = view.z;
requestAnimationFrame(t => {
  nowMs = t; lastT = t;
  flyTo(0, 0, homeZ(), 1.9);
  document.body.classList.add('ready');
  requestAnimationFrame(frame);
});
</script>
</body>
</html>
