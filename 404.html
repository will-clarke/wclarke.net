<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Will Clarke</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
  <script>
  (function () {
    var t = localStorage.getItem("theme");
    if (t) document.documentElement.dataset.theme = t;
    window.toggleTheme = function () {
      var el = document.documentElement;
      var dark = el.dataset.theme
        ? el.dataset.theme === "dark"
        : matchMedia("(prefers-color-scheme: dark)").matches;
      el.dataset.theme = dark ? "light" : "dark";
      localStorage.setItem("theme", el.dataset.theme);
    };
  })();
  </script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="wrap">
  <header class="site">
    <span class="brand"><a href="/">Will Clarke</a></span>
    <nav>
      <a href="/">home</a>
      <a href="/projects.html">projects</a>
      <a href="/writing.html">writing</a>
      <a href="/about.html">about</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="toggle dark mode" title="toggle dark mode">◐</button>
    </nav>
  </header>
  <main>
    <h1>404</h1>
    <p class="lede">There's no page at this address. It may have moved, or never
    existed. <a href="/">Back home.</a></p>
  </main>
</div>
</body>
</html>
